<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>MLEA POS v5 — Full Feature (Customers, Loyalty, Cash Drawer, Transfers, etc.)</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080b14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ========== RESPONSIVE STYLES (same as before, with minor additions) ========== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg-void:#080b14;--bg-deep:#0d1220;--bg-surface:#111827;--bg-elevated:#161f33;
  --bg-glass:rgba(255,255,255,0.04);--bg-glass-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border-bright:rgba(255,255,255,0.15);
  --gold:#d4a853;--gold-soft:rgba(212,168,83,0.15);--gold-glow:rgba(212,168,83,0.35);
  --emerald:#2dd4a0;--emerald-soft:rgba(45,212,160,0.12);
  --rose:#f06577;--rose-soft:rgba(240,101,119,0.12);
  --blue:#6fa3ef;--blue-soft:rgba(111,163,239,0.12);
  --purple:#a78bfa;--purple-soft:rgba(167,139,250,0.12);
  --text:#f0f0f5;--text2:#8892a4;--text3:#4a5568;
  --ff:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --r1:8px;--r2:14px;--r3:20px;--r4:28px;
}
body{font-family:var(--fb);background:var(--bg-void);color:var(--text);overflow-x:hidden;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg-deep);position:relative;overflow-x:hidden}
@media (min-width:768px) and (max-width:1023px){.wrap{max-width:768px}}
@media (min-width:1024px){
  .wrap{max-width:1200px}
  .prod-grid{grid-template-columns:repeat(3,1fr) !important}
  .card{padding:24px}
  .metrics{gap:12px}
}
@media (min-width:1600px){.prod-grid{grid-template-columns:repeat(4,1fr) !important}}
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.amb::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(212,168,83,0.06),transparent 70%);top:-100px;right:-100px;animation:drift 20s ease-in-out infinite}
.amb::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,160,0.04),transparent 70%);bottom:-100px;left:-100px;animation:drift 25s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-20px)}66%{transform:translate(-10px,15px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sync-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-elevated);border-top:1px solid var(--border);padding:5px 16px;display:none;align-items:center;justify-content:space-between;z-index:200;font-size:.68em;color:var(--text3)}
@media(min-width:768px){.sync-bar{max-width:768px}}
@media(min-width:1024px){.sync-bar{max-width:1200px}}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.sdot.local{background:var(--blue)}.sdot.cloud{background:var(--emerald)}.sdot.offline{background:var(--rose)}.sdot.syncing{background:var(--gold);animation:pulse 1s infinite}
#licenseGate{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.lic-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r4);padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,.4);animation:slideUp .5s cubic-bezier(.22,1,.36,1)}
.lic-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--gold),#f0c060);border-radius:var(--r2);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 30px var(--gold-glow)}
.lic-card h2{font-family:var(--ff);font-size:1.5em;font-weight:700;letter-spacing:-.02em}
.lic-card p{color:var(--text2);font-size:.82em;margin:6px 0 24px;font-weight:300}
.lic-input{width:100%;padding:14px 18px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);font-size:1.05em;text-align:center;letter-spacing:4px;color:var(--text);outline:none;font-family:var(--fm);transition:all .25s;margin-bottom:12px}
.lic-input:focus{border-color:var(--gold);background:rgba(212,168,83,.06);box-shadow:0 0 0 3px var(--gold-glow)}
.lic-status{font-size:.75em;margin-top:12px;min-height:18px;font-weight:500}
.lic-status.ok{color:var(--emerald)}.lic-status.err{color:var(--rose)}
#loginScreen{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.log-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r4);padding:28px 22px;width:100%;max-width:360px;box-shadow:0 4px 40px rgba(0,0,0,.4);animation:slideUp .5s cubic-bezier(.22,1,.36,1)}
.log-logo{text-align:center;margin-bottom:24px}
.log-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--gold),#f0c060);border-radius:var(--r2);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 25px var(--gold-glow)}
.log-logo h1{font-family:var(--ff);font-size:1.6em;font-weight:800;letter-spacing:-.03em}
.log-logo p{color:var(--text2);font-size:.78em;font-weight:300;margin-top:3px;letter-spacing:.04em}
.sec-label{font-size:.65em;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;font-family:var(--ff);margin-bottom:8px}
.usr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;max-height:190px;overflow-y:auto;scrollbar-width:none}
.usr-grid::-webkit-scrollbar{display:none}
.usr-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
.usr-card.sel{border-color:var(--gold);background:var(--gold-soft);box-shadow:0 0 20px var(--gold-glow)}
.usr-card .av{font-size:1.6em;display:block}
.usr-card .nm{font-size:.68em;color:var(--text);margin-top:4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbadge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.6em;font-weight:600;font-family:var(--ff);letter-spacing:.04em;margin-top:3px}
.rb-admin{background:rgba(212,168,83,.2);color:var(--gold)}
.rb-manager{background:var(--emerald-soft);color:var(--emerald)}
.rb-cashier{background:var(--blue-soft);color:var(--blue)}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:14px 0 8px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bg-glass);border:1.5px solid var(--border);transition:all .25s}
.pin-dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow);transform:scale(1.15)}
.pin-dot.err{background:var(--rose);border-color:var(--rose);animation:shake .3s ease}
.lockout-bar{background:rgba(240,101,119,.1);border:1px solid rgba(240,101,119,.3);border-radius:var(--r2);padding:10px 14px;text-align:center;font-size:.78em;color:var(--rose);margin-bottom:8px;font-weight:600;display:none}
.err-msg{color:var(--rose);text-align:center;font-size:.78em;min-height:18px;margin-bottom:8px;font-weight:500}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.pbn{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);padding:16px;font-size:1.25em;cursor:pointer;color:var(--text);font-family:var(--ff);font-weight:600;transition:all .15s}
.pbn:active{transform:scale(.94)}
.pbn:hover{border-color:var(--border-bright);background:var(--bg-glass-hover)}
.pbn:disabled{opacity:.3;pointer-events:none}
.pbn.clr{background:var(--rose-soft);color:var(--rose);border-color:rgba(240,101,119,.25);font-size:.8em}
.pbn.sub{background:linear-gradient(135deg,var(--gold),#e8b850);color:#1a0f00;border-color:transparent;font-size:.95em}
#mainApp{display:none;position:relative;z-index:10;padding-bottom:36px}
.hdr{background:rgba(13,18,32,.9);backdrop-filter:blur(20px);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.hdr-logo{font-family:var(--ff);font-size:1.05em;font-weight:700;letter-spacing:-.02em}
.hdr-r{display:flex;align-items:center;gap:8px}
.hbtn{background:var(--rose-soft);color:var(--rose);border:1px solid rgba(240,101,119,.2);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.75em;font-weight:600;font-family:var(--ff);transition:all .2s}
.hambg{background:var(--bg-glass);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;width:38px;height:38px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center}
.br-chip{background:var(--emerald-soft);color:var(--emerald);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--ff);border:1px solid rgba(45,212,160,.2)}
.adm-chip{background:var(--gold-soft);color:var(--gold);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--ff);border:1px solid rgba(212,168,83,.25)}
#mainContent{padding:14px;min-height:60vh}
.card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r3);padding:18px;margin:10px 0;backdrop-filter:blur(10px);transition:border-color .2s}
.card:hover{border-color:var(--border-bright)}
.card h4,.card h5{font-family:var(--ff);font-weight:600;letter-spacing:-.01em;margin-bottom:10px}
.card h5{font-size:.88em;color:var(--text2)}
.bir-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(212,168,83,.2),rgba(212,168,83,.08));border:1px solid rgba(212,168,83,.35);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;color:var(--gold);font-family:var(--ff);letter-spacing:.06em;text-transform:uppercase}
.fb-on{display:inline-flex;align-items:center;gap:5px;background:rgba(45,212,160,.15);color:var(--emerald);border:1px solid rgba(45,212,160,.3);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;font-family:var(--ff)}
.fb-off{display:inline-flex;align-items:center;gap:5px;background:var(--blue-soft);color:var(--blue);border:1px solid rgba(111,163,239,.25);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;font-family:var(--ff)}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.met{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r2);padding:16px;text-align:center;position:relative;overflow:hidden}
.met::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
.met-v{font-family:var(--ff);font-size:1.2em;font-weight:700;color:var(--gold);letter-spacing:-.02em}
.met-l{font-size:.66em;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.btn{padding:11px 22px;border:none;border-radius:var(--r2);cursor:pointer;font-size:.83em;font-weight:600;font-family:var(--ff);letter-spacing:.03em;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.4;pointer-events:none}
.bp{background:linear-gradient(135deg,var(--gold),#e8b850);color:#1a0f00;box-shadow:0 4px 15px var(--gold-glow)}
.bp:hover{transform:translateY(-1px)}
.bs{background:var(--emerald-soft);color:var(--emerald);border:1px solid rgba(45,212,160,.25)}
.bd{background:var(--rose-soft);color:var(--rose);border:1px solid rgba(240,101,119,.2)}
.bw{background:rgba(251,189,35,.12);color:#fbb923;border:1px solid rgba(251,189,35,.2)}
.bpu{background:var(--purple-soft);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.bb{background:var(--blue-soft);color:var(--blue);border:1px solid rgba(111,163,239,.2)}
.bsm{padding:7px 14px;font-size:.72em;border-radius:var(--r1)}
.bxs{padding:4px 10px;font-size:.66em;border-radius:6px}
.bbl{width:100%;margin-bottom:8px}
input[type=text],input[type=number],input[type=tel],input[type=email],input[type=password],input[type=file],select,textarea{width:100%;padding:11px 16px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);font-size:.87em;color:var(--text);outline:none;font-family:var(--fb);margin-bottom:8px;transition:all .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold);background:rgba(212,168,83,.05);box-shadow:0 0 0 3px rgba(212,168,83,.12)}
select{cursor:pointer}select option{background:var(--bg-surface);color:var(--text)}
textarea{resize:vertical;min-height:70px}
.inp-label{font-size:.7em;color:var(--text2);display:block;margin-bottom:4px;font-family:var(--ff);letter-spacing:.04em}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.78em}
th{background:var(--bg-elevated);color:var(--text2);padding:10px 12px;text-align:left;font-family:var(--ff);font-size:.7em;text-transform:uppercase;letter-spacing:.08em;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text2);vertical-align:middle}
tr:hover td{background:var(--bg-glass);color:var(--text)}
.stock-low{color:var(--rose);font-weight:700}
.sidebar{position:fixed;left:-300px;top:0;bottom:0;width:270px;background:rgba(13,18,32,.97);backdrop-filter:blur(30px);z-index:1000;transition:left .3s cubic-bezier(.22,1,.36,1);overflow-y:auto;border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar.on{left:0}
.sb-hdr{padding:24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sb-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),#f0c060);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-hdr-txt h3{font-family:var(--ff);font-size:1.05em;font-weight:700}
.sb-hdr-txt p{color:var(--text3);font-size:.68em;margin-top:2px}
.sb-nav{padding:12px 10px;flex:1}
.sb-sec{font-size:.58em;color:var(--text3);text-transform:uppercase;letter-spacing:.15em;padding:12px 10px 5px;font-weight:700;font-family:var(--ff)}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--r2);cursor:pointer;color:var(--text2);font-size:.83em;font-weight:400;transition:all .18s;margin-bottom:2px;position:relative}
.sb-item:hover{background:var(--bg-glass);color:var(--text)}
.sb-item.on{background:var(--gold-soft);color:var(--gold);font-weight:600}
.sb-item.on::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.sb-icon{font-size:1em;width:22px;text-align:center}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:999}
.sb-ov.on{display:block}
.sb-ft{padding:12px 10px;border-top:1px solid var(--border)}
.sb-ft-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:var(--r2);cursor:pointer;color:var(--rose);font-size:.82em;font-weight:500;border:none;background:none;font-family:var(--fb);transition:all .2s}
.sb-ft-btn:hover{background:var(--rose-soft)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:2000;justify-content:center;align-items:center;padding:16px}
.modal.on{display:flex}
.modal-box{background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:var(--r4);padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 4px 40px rgba(0,0,0,.5);animation:slideUp .25s cubic-bezier(.22,1,.36,1)}
.modal-box h4{font-family:var(--ff);font-size:1.1em;font-weight:700;letter-spacing:-.02em;margin-bottom:16px}
.modal-box::-webkit-scrollbar{width:3px}.modal-box::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}
.dlg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:3000;display:flex;justify-content:center;align-items:center;padding:20px;animation:fadeIn .15s ease}
.dlg-box{background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:var(--r3);padding:24px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.5);animation:slideUp .2s cubic-bezier(.22,1,.36,1)}
.dlg-icon{font-size:2em;text-align:center;margin-bottom:12px}
.dlg-title{font-family:var(--ff);font-size:1em;font-weight:700;text-align:center;margin-bottom:8px}
.dlg-msg{font-size:.82em;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.5}
.dlg-input{margin-bottom:16px}
.dlg-btns{display:flex;gap:8px}
.dlg-btns .btn{flex:1}
.toast-wrap{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:2500;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:320px}
.toast{padding:11px 18px;border-radius:var(--r2);font-size:.82em;font-weight:600;font-family:var(--ff);text-align:center;animation:slideUp .3s ease;pointer-events:all;box-shadow:0 8px 30px rgba(0,0,0,.4);width:100%}
.pos-search{position:relative;margin-bottom:8px}
.pos-search::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;z-index:1}
.pos-search input{padding-left:40px;margin-bottom:0}
.cat-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-btn{background:var(--bg-glass);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.72em;cursor:pointer;color:var(--text2);font-family:var(--ff);font-weight:600;white-space:nowrap;transition:all .18s;flex-shrink:0}
.cat-btn.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.prod-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.prod-card:hover{border-color:rgba(212,168,83,.4);transform:translateY(-1px)}
.prod-card:active{transform:scale(.96)}
.prod-card.oos{opacity:.35;pointer-events:none}
.prod-card strong{font-family:var(--ff);font-size:.85em;display:block;margin-bottom:4px}
.prod-card .pc-price{color:var(--gold);font-weight:700;font-size:.95em;font-family:var(--ff)}
.prod-card small{color:var(--text3);font-size:.67em}
.scan-wrap{position:relative;margin-bottom:8px}
.scan-wrap::before{content:'⚡';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;z-index:1;opacity:.6}
#scanInput{padding-left:40px;font-size:.95em;border-color:var(--emerald);font-family:var(--fm);margin-bottom:0}
.scan-hint{color:var(--emerald);font-size:.68em;text-align:center;margin-top:3px;font-weight:500;letter-spacing:.04em}
.cart-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);gap:8px}
.cart-item:last-of-type{border-bottom:none}
.qty-ctl{display:flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.qb{background:var(--bg-elevated);border:none;color:var(--text);width:28px;height:28px;cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-weight:700;transition:all .15s}
.qb:hover{background:var(--gold-soft);color:var(--gold)}
.qv{background:var(--bg-glass);color:var(--text);width:32px;height:28px;text-align:center;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);font-family:var(--fm);font-size:.82em;outline:none}

function fmtLic(inp){let v=inp.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();if(v.length>16)v=v.slice(0,16);let p=[];for(let i=0;i<v.length;i+=4)p.push(v.slice(i,i+4));inp.value=p.join('-');}
function isActiv(){return localStorage.getItem('mlea_activated')==='true';}
function setActiv(key,info){localStorage.setItem('mlea_activated','true');localStorage.setItem('mlea_lic',key);if(info)localStorage.setItem('mlea_lic_info',JSON.stringify(info));showLicGate();}
function clrActiv(){localStorage.removeItem('mlea_activated');localStorage.removeItem('mlea_lic');localStorage.removeItem('mlea_lic_info');currentUser=null;cart=[];showLicGate();}
function getStoredLic(){return localStorage.getItem('mlea_lic')||'';}
function showLicGate(){if(isActiv()){document.getElementById('licenseGate').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';document.getElementById('licenseInput').value=getStoredLic();document.getElementById('activateBtn').style.display='none';document.getElementById('deactivateBtn').style.display='block';document.getElementById('validateBtn').style.display='block';const info=localStorage.getItem('mlea_lic_info');const s=document.getElementById('licStatus');try{const i=info?JSON.parse(info):null;s.textContent=i?'✓ Activated · Device '+i.d+' of '+i.m:'✓ System Activated';}catch{s.textContent='✓ Activated';}s.className='lic-status ok';initApp();}else{document.getElementById('licenseGate').style.display='flex';document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='none';document.getElementById('activateBtn').style.display='block';document.getElementById('deactivateBtn').style.display='none';document.getElementById('validateBtn').style.display='none';document.getElementById('licStatus').textContent='';document.getElementById('licenseInput').value='';}}
async function doActivate(){const inp=document.getElementById('licenseInput'),s=document.getElementById('licStatus'),btn=document.getElementById('activateBtn');const key=inp.value.trim();if(!key){s.textContent='⚠ Enter license key';s.className='lic-status err';return;}btn.disabled=true;s.innerHTML='<span class="spinner"></span> Verifying…';s.className='lic-status';try{const r=await fetch(LIC_SRV+'?action=activate&licenseKey='+encodeURIComponent(key)+'&deviceId='+encodeURIComponent(devId()));const d=await r.json();if(d.success)setActiv(key,{d:d.deviceCount,m:d.maxDevices});else{s.textContent='✗ '+d.message;s.className='lic-status err';}}catch(e){if(key===DEMO_KEY){setActiv(key);s.textContent='✓ Demo activated (offline)';s.className='lic-status ok';}else{s.textContent='✗ Cannot reach server';s.className='lic-status err';}}btn.disabled=false;}
async function doValidate(){const s=document.getElementById('licStatus'),key=getStoredLic();if(!key){s.textContent='No license';s.className='lic-status err';return;}s.innerHTML='<span class="spinner"></span> Checking…';try{const r=await fetch(LIC_SRV+'?action=validate&licenseKey='+encodeURIComponent(key)+'&deviceId='+encodeURIComponent(devId()));const d=await r.json();s.textContent=d.success?'✓ Valid · Device '+(d.deviceCount||'?')+' of '+(d.maxDevices||'?'):'✗ '+d.message;s.className='lic-status '+(d.success?'ok':'err');}catch{s.textContent='Cannot reach server';s.className='lic-status err';}}
async function doDeactivate(){const ok=await confirm2('Deactivate this license on this device?','🔑');if(!ok)return;try{await fetch(LIC_SRV+'?action=deactivate&licenseKey='+encodeURIComponent(getStoredLic())+'&deviceId='+encodeURIComponent(devId()));}catch{}clrActiv();}
function initApp(){if(!LocalDB.getAll('branches').length)LocalDB.add('branches',{name:'Main Branch',address:'Head Office',phone:'555-0000'});if(!LocalDB.getAll('users').length)LocalDB.add('users',{name:'Admin',role:'admin',active:true,pin:'1234',branchId:null});if(!LocalDB.getAll('products').length)LocalDB.add('products',{sku:'SKU001',name:'Sample Product',price:99.99,cost:50,stock:50,category:'General',unit:'pcs',active:true,barcode:'123456789',branchId:null,supplierId:null,vatExempt:false,zeroRated:false,taxRate:0.12});if(!LocalDB.getAll('suppliers').length)LocalDB.add('suppliers',{name:'Sample Supplier',contact:'John Doe',phone:'555-0001',email:'supplier@email.com',address:'123 Supplier St'});LocalDB.getAll('settings').forEach(s=>{if(s.key==='currency')cur=s.value;if(s.key==='taxRate')taxRate=parseFloat(s.value)||0.12;if(s.key==='lowStockThresh')lowStockThresh=parseInt(s.value)||10;if(s.key==='printMode')printMode=s.value||'ask';if(s.key==='rcptFooter')rcptFooter=s.value||'Thank you for your purchase!';if(s.key==='storageMode')storageMode=s.value||'local';});held=LocalDB.getAll('heldSales');updateSyncBar();renderLogin();}
function renderLogin(){document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';document.getElementById('syncBar').style.display='none';const users=LocalDB.getAll('users');document.getElementById('usrGrid').innerHTML=users.filter(u=>u.active).map(u=>`<div class="usr-card ${selUserId===u.id?'sel':''}" onclick="selUser(${u.id})"><span class="av">${u.role==='admin'?'👑':u.role==='manager'?'🎯':'👤'}</span><div class="nm">${escapeHtml(u.name)}</div><span class="rbadge rb-${u.role}">${u.role}</span></div>`).join('');pinEntry='';updPinDots();document.getElementById('errMsg').textContent='';if(Date.now()<pinLockUntil)chkLock();}
function selUser(id){selUserId=id;pinEntry='';pinFails=0;pinLockUntil=0;updPinDots();document.getElementById('errMsg').textContent='';const lb=document.getElementById('lockoutBar');if(lb)lb.style.display='none';document.querySelectorAll('.pbn').forEach(b=>b.disabled=false);renderLogin();}
function ePin(d){if(chkLock())return;if(!selUserId){document.getElementById('errMsg').textContent='Select a user first';return;}if(pinEntry.length<4){pinEntry+=d;updPinDots();if(pinEntry.length===4)setTimeout(subPin,180);}}
function clrPin(){pinEntry='';updPinDots();document.getElementById('errMsg').textContent='';}
function updPinDots(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.toggle('on',i<pinEntry.length);d.classList.remove('err');});}
function subPin(){if(chkLock())return;if(!selUserId)return;const users=LocalDB.getAll('users');const user=users.find(u=>u.id===selUserId);if(!user||!user.active){document.getElementById('errMsg').textContent=!user?'User not found':'Account deactivated';pinEntry='';updPinDots();return;}if(user.pin===pinEntry){pinFails=0;pinLockUntil=0;currentUser=user;document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';document.getElementById('syncBar').style.display='flex';const b=user.branchId?LocalDB.getById('branches',user.branchId):null;document.getElementById('hdrBranch').innerHTML=user.branchId?`<span class="br-chip">🏢 ${b?escapeHtml(b.name):'Branch'}</span>`:`<span class="adm-chip">👑 Admin</span>`;document.getElementById('hdrTitle').textContent=user.branchId?(b?b.name:'Branch')+' POS':'MLEA HQ';renderSidebar();pinEntry='';selUserId=null;updPinDots();document.getElementById('errMsg').textContent='';resetSesTimer();sw('dashboard');setTimeout(showLowStockToast,700);const lastBackup=parseInt(getSetting('last_backup_ts','0'))||0;const daysSince=Math.floor((Date.now()-lastBackup)/(1000*60*60*24));if(daysSince>=7||!lastBackup)setTimeout(()=>toast('💾 No backup in '+(lastBackup?daysSince+'':'many')+' days. Download one from Backup & Export.','gold',6000),3000);}else{pinFails++;document.getElementById('errMsg').textContent='Incorrect PIN ('+pinFails+'/5)';pinEntry='';updPinDots();document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('err'));setTimeout(()=>document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('err')),500);if(pinFails>=5){pinLockUntil=Date.now()+60000;logAct('PIN Lockout','User '+selUserId);chkLock();}}}
function renderSidebar(){const nav=document.getElementById('sbNav');if(!currentUser)return;const low=getMyData('products').filter(p=>p.active&&p.stock<=lowStockThresh).length;const heldCnt=held.length;document.getElementById('sbSub').textContent='v5.0 Full · '+(storageMode==='firebase'?'☁️ Firebase':'💾 Local');const nb=(n,c)=>n>0?` <span style="color:var(--${c});font-size:.72em;font-weight:700">(${n})</span>`:'';let adminNav=`<div class="sb-sec">Main</div><div class="sb-item" onclick="sw('dashboard')"><span class="sb-icon">📊</span>Dashboard</div><div class="sb-sec">Sales</div><div class="sb-item" onclick="sw('pos')"><span class="sb-icon">💳</span>POS Terminal${nb(heldCnt,'gold')}</div><div class="sb-item" onclick="sw('allSales')"><span class="sb-icon">💰</span>Sales History</div><div class="sb-item" onclick="sw('returns')"><span class="sb-icon">↩️</span>Returns & Refunds</div><div class="sb-item" onclick="sw('voidedSales')"><span class="sb-icon">🚫</span>Voided</div><div class="sb-item" onclick="sw('quotations')"><span class="sb-icon">📄</span>Quotations</div><div class="sb-item" onclick="sw('layaways')"><span class="sb-icon">⏳</span>Layaway / Deposits</div><div class="sb-sec">Customers</div><div class="sb-item" onclick="sw('customers')"><span class="sb-icon">👥</span>Customer Database</div><div class="sb-item" onclick="sw('giftCards')"><span class="sb-icon">🎁</span>Gift Cards</div><div class="sb-sec">Inventory</div><div class="sb-item" onclick="sw('allProducts')"><span class="sb-icon">📦</span>Products${nb(low,'rose')}</div><div class="sb-item" onclick="sw('suppliers')"><span class="sb-icon">🚚</span>Suppliers</div><div class="sb-item" onclick="sw('purchaseOrders')"><span class="sb-icon">📋</span>Purchase Orders</div><div class="sb-item" onclick="sw('supplierReturns')"><span class="sb-icon">🔄</span>Supplier Returns</div><div class="sb-item" onclick="sw('stockTransfers')"><span class="sb-icon">🚛</span>Stock Transfers</div><div class="sb-sec">Finance</div><div class="sb-item" onclick="sw('expenses')"><span class="sb-icon">📉</span>Expenses</div><div class="sb-item" onclick="sw('profitLoss')"><span class="sb-icon">📈</span>Profit & Loss</div><div class="sb-sec">Cash Drawer</div><div class="sb-item" onclick="sw('cashDrawer')"><span class="sb-icon">💰</span>Cash Drawer Mgmt</div><div class="sb-sec">BIR Compliance</div><div class="sb-item" onclick="sw('xReading')"><span class="sb-icon">📑</span>X-Reading</div><div class="sb-item" onclick="sw('zReading')"><span class="sb-icon">📋</span>Z-Reading</div><div class="sb-item" onclick="sw('birSetup')"><span class="sb-icon">🏛️</span>BIR Setup</div><div class="sb-sec">Reports</div><div class="sb-item" onclick="sw('reports')"><span class="sb-icon">📈</span>Reports & Analytics</div><div class="sb-item" onclick="sw('actLog')"><span class="sb-icon">📝</span>Activity Log</div><div class="sb-item" onclick="sw('backup')"><span class="sb-icon">📁</span>Backup & Export</div><div class="sb-sec">System</div><div class="sb-item" onclick="sw('settings')"><span class="sb-icon">⚙️</span>Settings</div><div class="sb-item" onclick="sw('permissions')"><span class="sb-icon">🔐</span>Permissions</div><div class="sb-item" onclick="sw('fbSetup')"><span class="sb-icon">☁️</span>Firebase Setup</div>`;let manNav=`<div class="sb-sec">Main</div><div class="sb-item" onclick="sw('dashboard')"><span class="sb-icon">📊</span>Dashboard</div><div class="sb-item" onclick="sw('pos')"><span class="sb-icon">💳</span>POS Terminal${nb(heldCnt,'gold')}</div><div class="sb-item" onclick="sw('branchSales')"><span class="sb-icon">💰</span>Sales</div><div class="sb-item" onclick="sw('customers')"><span class="sb-icon">👥</span>Customers</div><div class="sb-item" onclick="sw('allProducts')"><span class="sb-icon">📦</span>Products</div><div class="sb-item" onclick="sw('purchaseOrders')"><span class="sb-icon">📋</span>Purchase Orders</div><div class="sb-item" onclick="sw('stockTransfers')"><span class="sb-icon">🚛</span>Stock Transfers</div><div class="sb-item" onclick="sw('expenses')"><span class="sb-icon">📉</span>Expenses</div><div class="sb-item" onclick="sw('cashDrawer')"><span class="sb-icon">💰</span>Cash Drawer</div><div class="sb-item" onclick="sw('xReading')"><span class="sb-icon">📑</span>X-Reading</div><div class="sb-item" onclick="sw('zReading')"><span class="sb-icon">📋</span>Z-Reading</div><div class="sb-item" onclick="sw('reports')"><span class="sb-icon">📈</span>Reports</div><div class="sb-item" onclick="sw('settings')"><span class="sb-icon">⚙️</span>Settings</div>`;let cashNav=`<div class="sb-sec">Main</div><div class="sb-item" onclick="sw('dashboard')"><span class="sb-icon">📊</span>Dashboard</div><div class="sb-item" onclick="sw('pos')"><span class="sb-icon">💳</span>POS Terminal${nb(heldCnt,'gold')}</div><div class="sb-item" onclick="sw('customers')"><span class="sb-icon">👥</span>Customers</div>`;nav.innerHTML=currentUser.role==='admin'?adminNav:currentUser.role==='manager'?manNav:cashNav;}

function renderDashboard(el){const today=new Date().toISOString().split('T')[0],thisMonth=today.substring(0,7);const mySales=getMyData('sales').filter(s=>!s.voided);const todaySales=mySales.filter(s=>s.date===today);const todayRev=todaySales.reduce((a,s)=>a+s.total,0);const monthRev=mySales.filter(s=>s.date.startsWith(thisMonth)).reduce((a,s)=>a+s.total,0);const myProds=getMyData('products');const totalCost=myProds.reduce((s,p)=>s+(p.cost||0)*p.stock,0);const totalVal=myProds.reduce((s,p)=>s+p.price*p.stock,0);const hour=new Date().getHours();const greeting=hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';const roleColor=currentUser.role==='admin'?'var(--gold)':currentUser.role==='manager'?'var(--emerald)':'var(--blue)';const lowItems=getLowStock();const gat=getGAT();const bir=getBIR();const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0]);}const dayTots=days.map(d=>mySales.filter(s=>s.date===d).reduce((a,s)=>a+s.total,0));const maxD=Math.max(...dayTots,1);const allItems=mySales.flatMap(s=>s.items||[]);const pMap={};allItems.forEach(i=>{pMap[i.name]=(pMap[i.name]||0)+i.quantity;});const topP=Object.entries(pMap).sort((a,b)=>b[1]-a[1]).slice(0,3);const reorderSuggestions = lowItems.filter(p=>p.reorderPoint && p.stock <= p.reorderPoint).slice(0,5);el.innerHTML=`<div class="welcome"><p style="color:var(--text3);font-size:.75em;margin-bottom:4px;font-family:var(--ff);letter-spacing:.06em;text-transform:uppercase">${greeting}</p><h3>${escapeHtml(currentUser.name)}</h3><p style="color:var(--text2);font-size:.82em">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><span style="background:rgba(0,0,0,.3);color:${roleColor};border:1px solid ${roleColor}30;border-radius:20px;padding:4px 12px;font-size:.7em;font-weight:600;font-family:var(--ff)">${currentUser.role==='admin'?'👑 Administrator':currentUser.role==='manager'?'🎯 Manager':'👤 Cashier'}</span><span class="bir-badge">🏛️ BIR v5</span><span class="${storageMode==='firebase'?'fb-on':'fb-off'}">${storageMode==='firebase'?'☁️ Firebase':'💾 Local'}</span></div></div><div class="metrics"><div class="met"><div class="met-v">${fc(todayRev)}</div><div class="met-l">Today's Sales</div></div><div class="met"><div class="met-v">${todaySales.length}</div><div class="met-l">Transactions</div></div></div><div class="metrics" style="margin-top:8px"><div class="met"><div class="met-v">${fc(monthRev)}</div><div class="met-l">Monthly Revenue</div></div><div class="met"><div class="met-v" style="color:var(--emerald)">${fc(totalVal-totalCost)}</div><div class="met-l">Potential Profit</div></div></div><div class="card" style="margin-top:12px"><h5>📊 Last 7 Days</h5><div class="bar-chart">${days.map((d,i)=>`<div class="bar-wrap"><div class="bar" style="height:${Math.max(4,(dayTots[i]/maxD)*76)}px" title="${fc(dayTots[i])}"></div><div class="bar-lbl">${d.slice(5)}</div></div>`).join('')}</div></div>${topP.length?`<div class="card"><h5>🏆 Top Products (All Time)</h5>${topP.map((p,i)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-size:.82em">${['🥇','🥈','🥉'][i]} ${escapeHtml(p[0])}</span><span style="font-family:var(--fm);font-size:.78em;color:var(--gold)">${p[1]} sold</span></div>`).join('')}</div>`:''}<div class="card" style="border-left:3px solid var(--gold)"><h5 style="color:var(--gold)">🏛️ BIR Status</h5><div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.78em"><span style="color:var(--text2)">TIN</span><span style="font-family:var(--fm)">${bir.tin}</span></div><div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.78em"><span style="color:var(--text2)">PTU No.</span><span style="font-family:var(--fm)">${bir.ptu}</span></div><div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.78em"><span style="color:var(--text2)">Grand Accum. Total</span><span style="font-family:var(--ff);color:var(--gold);font-weight:700">${fc(gat)}</span></div><div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.78em"><span style="color:var(--text2)">VAT Type</span><span style="color:var(--emerald);font-weight:600">${bir.vatType==='vat'?'VAT-Registered (12%)':'Non-VAT'}</span></div></div>${reorderSuggestions.length?`<div class="card" style="border-left:3px solid var(--rose)"><div style="display:flex;justify-content:space-between;align-items:center"><h5 style="margin-bottom:0;color:var(--rose)">📦 Reorder Suggestions</h5><button class="btn bs bxs" onclick="sw('purchaseOrders')">Create PO</button></div>${reorderSuggestions.map(p=>`<div style="display:flex;justify-content:space-between;margin-top:8px"><span>${escapeHtml(p.name)}</span><span>Stock: ${p.stock} / Min: ${p.reorderPoint}</span></div>`).join('')}</div>`:''}${lowItems.length?`<div class="card" style="border-left:3px solid var(--rose)"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><h5 style="margin-bottom:0;color:var(--rose)">⚠️ Low Stock (${lowItems.length})</h5>${currentUser.role!=='cashier'?`<button class="btn bd bxs" onclick="sw('${currentUser.role==='admin'?'allProducts':'inventory'}')">View All</button>`:''}</div>${lowItems.slice(0,4).map(p=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-size:.78em">${escapeHtml(p.name)}</span><span style="font-family:var(--fm);font-size:.75em;color:${p.stock===0?'var(--rose)':'#fbb923'};font-weight:700">${p.stock===0?'OUT':p.stock}</span></div>`).join('')}</div>`:''}<div style="margin-top:14px"><button class="btn bp bbl" onclick="sw('pos')" style="font-size:1em;padding:16px">💳 Start New Sale</button>${currentUser.role!=='cashier'?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button class="btn bs" onclick="sw('xReading')">📑 X-Reading</button><button class="btn bw" onclick="sw('zReading')">📋 Z-Reading</button></div>`:''}</div>`;}

function renderCustomers(el){const customers=getMyData('customers');el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h4 style="margin:0">👥 Customers</h4><button class="btn bp bsm" onclick="showCustomerModal()">+ Add Customer</button></div>${customers.map(c=>`<div class="card"><div><strong>${escapeHtml(c.name)}</strong><p>${c.phone||''} ${c.email||''}</p><p>Points: ${c.loyaltyPoints||0}</p></div><div style="display:flex;gap:6px;margin-top:8px"><button class="btn bs bxs" onclick="editCustomer(${c.id})">Edit</button><button class="btn bd bxs" onclick="deleteCustomer(${c.id})">Delete</button><button class="btn bw bxs" onclick="showCustomerHistory(${c.id})">History</button></div></div>`).join('')}${!customers.length?'<div class="empty-st"><div class="ei">👥</div><p>No customers yet</p></div>':''}`;}
function showCustomerModal(id=null){const c=id?DB.getById('customers',id):null;openModal(`<h4>${c?'Edit':'Add'} Customer</h4><input type="text" id="custName" placeholder="Full Name" value="${c?escapeHtml(c.name):''}"><input type="text" id="custPhone" placeholder="Phone" value="${c?escapeHtml(c.phone||''):''}"><input type="email" id="custEmail" placeholder="Email" value="${c?escapeHtml(c.email||''):''}"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px"><button class="btn bd" onclick="closeModal()">Cancel</button><button class="btn bp" onclick="saveCustomer(${id||'null'})">Save</button></div>`);}
function saveCustomer(id){const name=document.getElementById('custName').value.trim();if(!name){toast('Name required','rose');return;}const data={name,phone:document.getElementById('custPhone').value,email:document.getElementById('custEmail').value,loyaltyPoints:0};if(id){const c=DB.getById('customers',id);Object.assign(c,data);DB.update('customers',c);}else DB.add('customers',data);closeModal();sw('customers');toast('Customer saved','emerald');}
function deleteCustomer(id){confirm2('Delete customer?','👥',true).then(ok=>{if(ok){DB.delete('customers',id);sw('customers');}});}
function showCustomerHistory(id){const sales=getMyData('sales').filter(s=>s.customerId===id);openModal(`<h4>Purchase History</h4>${sales.map(s=>`<div>${s.date} - ${fc(s.total)} - ${s.orNumber}</div>`).join('')||'<div>No purchases</div>'}<button class="btn bd" onclick="closeModal()">Close</button>`);}

function renderGiftCards(el){const cards=getMyData('giftCards');el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h4 style="margin:0">🎁 Gift Cards</h4><button class="btn bp bsm" onclick="issueGiftCard()">Issue Card</button></div>${cards.map(c=>`<div class="card"><div><strong>${escapeHtml(c.code)}</strong><div>Balance: ${fc(c.balance)}</div><div>Issued: ${c.createdAt?.split('T')[0]}</div></div><div style="display:flex;gap:6px;margin-top:8px"><button class="btn bs bxs" onclick="redeemGiftCard(${c.id})">Redeem</button><button class="btn bd bxs" onclick="deleteGiftCard(${c.id})">Delete</button></div></div>`).join('')}${!cards.length?'<div class="empty-st"><div class="ei">🎁</div><p>No gift cards</p></div>':''}`;}
async function issueGiftCard(){const amount=parseFloat(await prompt2('Initial amount:','0','0','number'))||0;if(amount<=0)return;const code='GC'+Date.now();DB.add('giftCards',{code,balance:amount,createdAt:new Date().toISOString()});toast(`Gift card ${code} issued for ${fc(amount)}`,'emerald');sw('giftCards');}
async function redeemGiftCard(id){const card=DB.getById('giftCards',id);if(!card)return;const amt=parseFloat(await prompt2(`Redeem amount (balance: ${fc(card.balance)}):`,'0','0','number'))||0;if(amt<=0||amt>card.balance){toast('Invalid amount','rose');return;}card.balance-=amt;DB.update('giftCards',card);toast(`Redeemed ${fc(amt)}. New balance: ${fc(card.balance)}`,'emerald');sw('giftCards');}
function deleteGiftCard(id){confirm2('Delete gift card?','🎁',true).then(ok=>{if(ok){DB.delete('giftCards',id);sw('giftCards');}});}

function renderExpenses(el){const expenses=getMyData('expenses').slice().reverse();el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h4 style="margin:0">📉 Expenses</h4><button class="btn bp bsm" onclick="addExpense()">+ Add Expense</button></div>${expenses.map(e=>`<div class="card"><div><strong>${escapeHtml(e.category)}</strong> - ${fc(e.amount)}</div><div>${e.description||''} · ${e.date}</div><button class="btn bd bxs" onclick="deleteExpense(${e.id})">Delete</button></div>`).join('')}${!expenses.length?'<div class="empty-st"><div class="ei">📉</div><p>No expenses recorded</p></div>':''}`;}
async function addExpense(){const category=await prompt2('Category (e.g. Rent, Utilities):','Rent');if(!category)return;const amount=parseFloat(await prompt2('Amount:','0','0','number'));if(isNaN(amount))return;const desc=await prompt2('Description (optional):','');DB.add('expenses',{category,amount,description:desc||'',date:new Date().toISOString().split('T')[0]});sw('expenses');toast('Expense added','emerald');}
function deleteExpense(id){confirm2('Delete expense?','📉',true).then(ok=>{if(ok){DB.delete('expenses',id);sw('expenses');}});}
function renderProfitLoss(el){const sales=getMyData('sales').filter(s=>!s.voided);const expenses=getMyData('expenses');const totalSales=sales.reduce((a,s)=>a+s.total,0);const totalExpenses=expenses.reduce((a,e)=>a+e.amount,0);const cogs=getMyData('products').reduce((a,p)=>a+(p.cost||0)*p.stock,0);const grossProfit=totalSales-cogs;const netProfit=grossProfit-totalExpenses;el.innerHTML=`<h4>Profit & Loss</h4><div class="card"><div class="rrow"><span>Total Sales</span><span>${fc(totalSales)}</span></div><div class="rrow"><span>Cost of Goods Sold (estimated)</span><span>${fc(cogs)}</span></div><div class="rrow"><span>Gross Profit</span><span>${fc(grossProfit)}</span></div><div class="rrow"><span>Expenses</span><span>${fc(totalExpenses)}</span></div><div class="rrow tot"><span>Net Profit</span><span>${fc(netProfit)}</span></div></div><button class="btn bp" onclick="sw('expenses')">Manage Expenses</button>`;}

let currentShift=null;
function renderCashDrawer(el){const shifts=LocalDB.getAll('cashShifts').filter(s=>s.userId===currentUser.id).slice(-10).reverse();const activeShift=LocalDB.getAll('cashShifts').find(s=>s.userId===currentUser.id&&!s.endedAt);el.innerHTML=`<div class="card"><h5>💰 Current Shift</h5>${activeShift?`<div>Opened at: ${new Date(activeShift.startedAt).toLocaleString()}</div><div>Opening balance: ${fc(activeShift.openingBalance)}</div><button class="btn bd bsm" onclick="closeShift()">Close Shift</button>`:`<button class="btn bp bsm" onclick="openShift()">Start Shift</button>`}</div><div class="card"><h5>Shift History</h5>${shifts.map(s=>`<div>${new Date(s.startedAt).toLocaleString()} - ${s.endedAt?new Date(s.endedAt).toLocaleString():'Open'} | Opening: ${fc(s.openingBalance)} | Closing: ${fc(s.closingBalance||0)} | Diff: ${fc((s.closingBalance||0)-s.openingBalance)}</div>`).join('')||'No shifts'}</div>`;}
async function openShift(){const opening=parseFloat(await prompt2('Opening cash balance:','0','0','number'))||0;if(opening<0)return;LocalDB.add('cashShifts',{userId:currentUser.id,openingBalance:opening,startedAt:new Date().toISOString(),endedAt:null});toast('Shift opened','emerald');sw('cashDrawer');}
async function closeShift(){const shifts=LocalDB.getAll('cashShifts');const active=shifts.find(s=>s.userId===currentUser.id&&!s.endedAt);if(!active){toast('No active shift','rose');return;}const closing=parseFloat(await prompt2('Closing cash balance:','0','0','number'))||0;active.endedAt=new Date().toISOString();active.closingBalance=closing;LocalDB.update('cashShifts',active);toast('Shift closed','emerald');sw('cashDrawer');}

// ============================================================
function renderStockTransfers(el){const transfers=getMyData('stockTransfers').slice().reverse();const branches=DB.getAll('branches');el.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h4>🚛 Stock Transfers</h4><button class="btn bp bsm" onclick="requestTransfer()">New Transfer</button></div>${transfers.map(t=>{const from=branches.find(b=>b.id===t.fromBranchId);const to=branches.find(b=>b.id===t.toBranchId);return`<div class="card"><div>${escapeHtml(t.productName)} x ${t.quantity}</div><div>${from?from.name:'?'} → ${to?to.name:'?'}</div><div>Status: ${t.status} | ${t.requestedBy}</div>${t.status==='pending'&&(currentUser.role==='admin'||currentUser.branchId===t.toBranchId)?`<button class="btn bs bxs" onclick="approveTransfer(${t.id})">Approve</button>`:''}</div>`;}).join('')}${!transfers.length?'<div class="empty-st"><div class="ei">🚛</div><p>No transfers</p></div>':''}`;}
async function requestTransfer(){const products=getMyData('products');const branches=DB.getAll('branches').filter(b=>b.id!==currentUser.branchId);if(branches.length===0){toast('No other branches','rose');return;}const prodNames=products.map(p=>p.name).join(',');const prodName=await prompt2('Product name:\n'+prodNames,'');const product=products.find(p=>p.name.toLowerCase()===prodName?.toLowerCase());if(!product){toast('Product not found','rose');return;}const qty=parseInt(await prompt2('Quantity:',String(product.stock),'','number'))||0;if(qty<=0||qty>product.stock){toast('Invalid quantity','rose');return;}const branchList=branches.map(b=>`${b.id}:${b.name}`).join(',');const toBranchId=parseInt(await prompt2('Target branch ID:\n'+branchList,''));if(!branches.find(b=>b.id===toBranchId)){toast('Invalid branch','rose');return;}DB.add('stockTransfers',{productId:product.id,productName:product.name,quantity:qty,fromBranchId:currentUser.branchId,toBranchId,status:'pending',requestedBy:currentUser.name,requestedAt:new Date().toISOString()});toast('Transfer requested','emerald');sw('stockTransfers');}
async function approveTransfer(id){const transfer=DB.getById('stockTransfers',id);if(!transfer||transfer.status!=='pending')return;const product=DB.getById('products',transfer.productId);if(!product){toast('Product missing','rose');return;}if(product.stock<transfer.quantity){toast('Insufficient stock at source','rose');return;}product.stock-=transfer.quantity;DB.update('products',product);const targetProduct=getMyData('products').find(p=>p.id===transfer.productId&&p.branchId===transfer.toBranchId);if(targetProduct){targetProduct.stock+=transfer.quantity;DB.update('products',targetProduct);}else{const newProd={...product,id:undefined,branchId:transfer.toBranchId,stock:transfer.quantity};delete newProd.id;DB.add('products',newProd);}transfer.status='completed';transfer.approvedAt=new Date().toISOString();DB.update('stockTransfers',transfer);toast('Transfer approved','emerald');sw('stockTransfers');}

function renderQuotations(el){const quotes=getMyData('quotations').slice().reverse();el.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h4>📄 Quotations</h4><button class="btn bp bsm" onclick="createQuote()">New Quote</button></div>${quotes.map(q=>`<div class="card"><div>Quote #${q.id} - ${fc(q.total)}</div><div>${q.customerName||'Walk-in'} | ${q.date}</div><button class="btn bs bxs" onclick="convertQuoteToSale(${q.id})">Convert to Sale</button><button class="btn bd bxs" onclick="deleteQuote(${q.id})">Delete</button></div>`).join('')}${!quotes.length?'<div class="empty-st"><div class="ei">📄</div><p>No quotations</p></div>':''}`;}
async function createQuote(){const customerName=await prompt2('Customer name (optional):','');const items=[];let addMore=true;while(addMore){const prodName=await prompt2('Product name (or SKU):');if(!prodName)break;const product=getMyData('products').find(p=>p.name.toLowerCase()===prodName.toLowerCase()||p.sku===prodName);if(!product){toast('Product not found','rose');continue;}const qty=parseInt(await prompt2('Quantity:',String(1),'','number'))||0;if(qty<=0)continue;items.push({productId:product.id,name:product.name,quantity:qty,price:product.price});addMore=await confirm2('Add another item?','➕');}if(!items.length){toast('No items','rose');return;}const total=items.reduce((s,i)=>s+i.price*i.quantity,0);DB.add('quotations',{customerName:customerName||'Walk-in',items,total,date:new Date().toISOString().split('T')[0]});toast('Quote saved','emerald');sw('quotations');}
function convertQuoteToSale(id){const quote=DB.getById('quotations',id);if(!quote)return;quote.items.forEach(i=>{const p=DB.getById('products',i.productId);if(p&&p.stock>=i.quantity){p.stock-=i.quantity;DB.update('products',p);}else toast(`Insufficient stock: ${i.name}`,'rose');});const sale={date:new Date().toISOString().split('T')[0],timestamp:new Date().toISOString(),total:quote.total,subtotal:quote.total,items:quote.items,paymentMethod:'quote',cashierId:currentUser.id,cashierName:currentUser.name,branchId:currentUser.branchId,orNumber:'QUOTE-'+quote.id,voided:false};DB.add('sales',sale);logAct('Quote converted','#'+quote.id);DB.delete('quotations',id);toast('Quote converted to sale','emerald');sw('allSales');}
function deleteQuote(id){confirm2('Delete quote?','📄',true).then(ok=>{if(ok){DB.delete('quotations',id);sw('quotations');}});}
function renderLayaways(el){const layaways=getMyData('layaways').slice().reverse();el.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h4>⏳ Layaway / Deposits</h4><button class="btn bp bsm" onclick="createLayaway()">New Layaway</button></div>${layaways.map(l=>`<div class="card"><div>Layaway #${l.id} - ${fc(l.total)} (Paid: ${fc(l.paid)})</div><div>${l.customerName||'Walk-in'} | Status: ${l.status}</div><button class="btn bs bxs" onclick="addLayawayPayment(${l.id})">Add Payment</button><button class="btn bp bxs" onclick="completeLayaway(${l.id})">Complete</button><button class="btn bd bxs" onclick="cancelLayaway(${l.id})">Cancel</button></div>`).join('')}${!layaways.length?'<div class="empty-st"><div class="ei">⏳</div><p>No layaways</p></div>':''}`;}
async function createLayaway(){const customerName=await prompt2('Customer name:','');const items=[];let addMore=true;while(addMore){const prodName=await prompt2('Product name:');if(!prodName)break;const product=getMyData('products').find(p=>p.name.toLowerCase()===prodName.toLowerCase());if(!product){toast('Product not found','rose');continue;}const qty=parseInt(await prompt2('Quantity:',String(1),'','number'))||0;if(qty<=0)continue;items.push({productId:product.id,name:product.name,quantity:qty,price:product.price});addMore=await confirm2('Add another item?','➕');}if(!items.length){toast('No items','rose');return;}const total=items.reduce((s,i)=>s+i.price*i.quantity,0);const deposit=parseFloat(await prompt2('Deposit amount:',String(total*0.2),'','number'))||0;if(deposit>total){toast('Deposit cannot exceed total','rose');return;}DB.add('layaways',{customerName:customerName||'Walk-in',items,total,paid:deposit,status:'active',createdAt:new Date().toISOString()});toast('Layaway created','emerald');sw('layaways');}
async function addLayawayPayment(id){const layaway=DB.getById('layaways',id);if(!layaway||layaway.status!=='active')return;const amount=parseFloat(await prompt2('Payment amount:',String(layaway.total-layaway.paid),'','number'))||0;if(amount<=0||layaway.paid+amount>layaway.total){toast('Invalid amount','rose');return;}layaway.paid+=amount;if(layaway.paid>=layaway.total)layaway.status='completed';DB.update('layaways',layaway);toast('Payment recorded','emerald');sw('layaways');}
function completeLayaway(id){const layaway=DB.getById('layaways',id);if(!layaway||layaway.status!=='active')return;if(layaway.paid<layaway.total){toast('Balance not fully paid','rose');return;}layaway.status='completed';DB.update('layaways',layaway);toast('Layaway completed','emerald');sw('layaways');}
function cancelLayaway(id){confirm2('Cancel layaway? Items will be returned to stock.','⏳',true).then(ok=>{if(ok){const layaway=DB.getById('layaways',id);if(layaway){layaway.items.forEach(i=>{const p=DB.getById('products',i.productId);if(p)p.stock+=i.quantity;DB.update('products',p);});DB.delete('layaways',id);toast('Layaway cancelled','rose');sw('layaways');}}});}

function renderSupplierReturns(el){const returns=getMyData('supplierReturns').slice().reverse();el.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h4>🔄 Supplier Returns</h4><button class="btn bp bsm" onclick="createSupplierReturn()">New Return</button></div>${returns.map(r=>`<div class="card"><div>PO #${r.poId} - ${escapeHtml(r.productName)} x ${r.quantity}</div><div>Reason: ${r.reason} | Status: ${r.status}</div><button class="btn bd bxs" onclick="deleteSupplierReturn(${r.id})">Delete</button></div>`).join('')}${!returns.length?'<div class="empty-st"><div class="ei">🔄</div><p>No supplier returns</p></div>':''}`;}
async function createSupplierReturn(){const poId=parseInt(await prompt2('Purchase Order ID:'));const po=DB.getById('purchaseOrders',poId);if(!po){toast('PO not found','rose');return;}const productName=await prompt2('Product name to return:');const poItem=po.items.find(i=>i.name.toLowerCase()===productName?.toLowerCase());if(!poItem){toast('Product not in PO','rose');return;}const qty=parseInt(await prompt2(`Quantity (max ${poItem.quantity}):`,String(poItem.quantity),'','number'))||0;if(qty<=0||qty>poItem.quantity){toast('Invalid quantity','rose');return;}const reason=await prompt2('Reason for return:');DB.add('supplierReturns',{poId,productId:poItem.productId,productName:poItem.name,quantity:qty,reason,status:'returned',createdAt:new Date().toISOString()});toast('Supplier return recorded','emerald');sw('supplierReturns');}
function deleteSupplierReturn(id){confirm2('Delete supplier return?','🔄',true).then(ok=>{if(ok){DB.delete('supplierReturns',id);sw('supplierReturns');}});}

function renderPermissions(el){if(currentUser.role!=='admin'){el.innerHTML='<div class="empty-st"><div class="ei">🔒</div><p>Admin only</p></div>';return;}const roles=['admin','manager','cashier'];const modules=['pos','sales','customers','giftCards','products','suppliers','purchaseOrders','stockTransfers','expenses','cashDrawer','xReading','zReading','reports','settings','permissions'];let html=`<h4>🔐 Role Permissions</h4><div class="tbl-wrap"><table><thead><tr><th>Module</th>${roles.map(r=>`<th>${r}</th>`).join('')}</tr></thead><tbody>`;for(const mod of modules){const key=`perm_${mod}`;const saved=JSON.parse(getSetting(key,'{}'));html+=`<tr><td>${mod}</td>${roles.map(r=>`<td><input type="checkbox" id="perm_${mod}_${r}" ${saved[r]!==false?'checked':''} onchange="savePerm('${mod}','${r}',this.checked)"></td>`).join('')}</tr>`;}html+=`</tbody></table></div><button class="btn bp bbl" onclick="resetPerms()">Reset to Default</button>`;el.innerHTML=html;}
function savePerm(module,role,val){const key=`perm_${module}`;const saved=JSON.parse(getSetting(key,'{}'));saved[role]=val;saveSetting(key,JSON.stringify(saved));toast(`Permission updated`,'emerald');}
function resetPerms(){saveSetting('perm_pos','{"admin":true,"manager":true,"cashier":true}');saveSetting('perm_sales','{"admin":true,"manager":true,"cashier":false}');saveSetting('perm_customers','{"admin":true,"manager":true,"cashier":true}');saveSetting('perm_giftCards','{"admin":true,"manager":false,"cashier":false}');saveSetting('perm_products','{"admin":true,"manager":true,"cashier":false}');saveSetting('perm_suppliers','{"admin":true,"manager":false,"cashier":false}');saveSetting('perm_purchaseOrders','{"admin":true,"manager":true,"cashier":false}');saveSetting('perm_stockTransfers','{"admin":true,"manager":true,"cashier":false}');saveSetting('perm_expenses','{"admin":true,"manager":true,"cashier":false}');saveSetting('perm_cashDrawer','{"admin":true,"manager":true,"cashier":true}');saveSetting('perm_xReading','{"admin":true,"manager":true,"cashier":false}');saveSetting('perm_zReading','{"admin":true,"manager":true,"cashier":false}');saveSetting('perm_reports','{"admin":true,"manager":true,"cashier":false}');saveSetting('perm_settings','{"admin":true,"manager":false,"cashier":false}');saveSetting('perm_permissions','{"admin":true,"manager":false,"cashier":false}');toast('Permissions reset','emerald');sw('permissions');}
