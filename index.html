<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MLEA POS - Multi-Branch System</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
        .app-container{max-width:480px;margin:0 auto;min-height:100vh;background:#16213e;position:relative}
        @media(min-width:768px){.app-container{max-width:768px}}
        
        /* LICENSE GATE */
        #licenseGate{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:15px}
        .license-gate-card{background:#1e2a4a;border-radius:20px;padding:25px;width:100%;max-width:380px;border:2px solid #7c6fff;text-align:center}
        .license-gate-card .logo{font-size:2.5em;margin-bottom:8px}
        .license-gate-card h2{color:#9b8fff;margin-bottom:5px;font-size:1.3em}
        .license-gate-card p{color:#a0a0b0;font-size:.8em;margin-bottom:20px}
        .license-gate-card input{width:100%;padding:14px;border:2px solid #2a3a5e;border-radius:12px;font-size:1em;text-align:center;letter-spacing:3px;background:#0f3460;color:#e0e0e0;outline:none;margin-bottom:12px;font-family:'Courier New',monospace}
        .license-gate-card input:focus{border-color:#7c6fff}
        .license-gate-card input::placeholder{color:#6a6a7a;letter-spacing:1px}
        .license-gate-card .btn-activate{width:100%;padding:14px;background:#2ed573;color:#fff;border:none;border-radius:12px;font-size:1em;font-weight:bold;cursor:pointer;margin-bottom:8px}
        .license-gate-card .btn-activate:active{transform:scale(.96)}
        .license-gate-card .btn-deactivate{width:100%;padding:10px;background:transparent;color:#ff4757;border:1px solid #ff4757;border-radius:12px;font-size:.8em;cursor:pointer}
        .license-gate-card .status{font-size:.75em;margin-top:10px;min-height:18px}
        .license-gate-card .status.success{color:#2ed573}
        .license-gate-card .status.error{color:#ff4757}
        .license-gate-card .btn-buy{display:inline-block;margin-top:12px;color:#ffa502;text-decoration:none;font-size:.8em;font-weight:bold}
        
        #loginScreen{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:15px}
        .login-card{background:#1e2a4a;border-radius:20px;padding:20px;width:100%;max-width:360px;border:1px solid #2a3a5e}
        .login-logo{text-align:center;margin-bottom:20px}.login-logo h1{color:#9b8fff;font-size:1.8em}.login-logo p{color:#a0a0b0;font-size:.85em}
        .user-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px;max-height:200px;overflow-y:auto}
        .user-card{background:#16213e;border:2px solid #2a3a5e;border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
        .user-card.selected{border-color:#7c6fff;background:#0f3460}.user-card .avatar{font-size:1.8em}.user-card .name{font-size:.7em;color:#e0e0e0;margin-top:3px}
        .role-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65em;margin-top:3px}
        .admin-badge{background:#7c6fff;color:#fff}.manager-badge{background:#2ed573;color:#fff}.cashier-badge{background:#ffa502;color:#fff}
        .section-label{text-align:center;color:#e0e0e0;font-size:.9em;margin:10px 0}
        .pin-display{display:flex;justify-content:center;gap:12px;margin:15px 0}
        .pin-dot{width:14px;height:14px;border-radius:50%;background:#2a3a5e;transition:all .3s}
        .pin-dot.filled{background:#7c6fff;box-shadow:0 0 8px #7c6fff}.pin-dot.error{background:#ff4757}
        .error-msg{color:#ff4757;text-align:center;font-size:.8em;min-height:18px;margin:5px 0}
        .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .pin-btn{background:#0f3460;border:1px solid #2a3a5e;border-radius:10px;padding:16px;font-size:1.3em;cursor:pointer;color:#e0e0e0}
        .pin-btn:active{background:#7c6fff}.pin-btn.clear{background:#ff4757;color:#fff;font-size:.9em}.pin-btn.submit{background:#2ed573;color:#fff;font-size:.9em}
        #mainApp{display:none}
        .header{background:#1a1a2e;padding:12px 15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a3a5e}
        .header h1{color:#9b8fff;font-size:1.2em}.header-right{display:flex;align-items:center;gap:10px;font-size:.8em;color:#a0a0b0}
        .logout-btn{background:#ff4757;color:#fff;border:none;padding:6px 12px;border-radius:15px;cursor:pointer;font-size:.8em}
        .hamburger{background:none;border:none;color:#e0e0e0;font-size:22px;cursor:pointer}
        .branch-indicator{background:rgba(46,213,115,0.2);color:#2ed573;padding:4px 10px;border-radius:15px;font-size:.75em}
        .admin-indicator{background:rgba(124,111,255,0.2);color:#9b8fff;padding:4px 10px;border-radius:15px;font-size:.75em}
        #mainContent{padding:10px;min-height:60vh}
        .card{background:#1e2a4a;border-radius:10px;padding:15px;margin:8px 0;border:1px solid #2a3a5e}
        .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        .metric-card{background:#16213e;border-radius:8px;padding:12px;text-align:center;border:1px solid #2a3a5e}
        .metric-value{font-size:1.2em;font-weight:bold;color:#9b8fff}.metric-label{font-size:.7em;color:#a0a0b0;margin-top:4px}
        .btn{padding:10px 20px;border:none;border-radius:20px;cursor:pointer;font-size:.85em;font-weight:500}.btn:active{transform:scale(.95)}
        .btn-primary{background:#7c6fff;color:#fff}.btn-success{background:#2ed573;color:#fff}.btn-danger{background:#ff4757;color:#fff}.btn-warning{background:#ffa502;color:#fff}
        .btn-sm{padding:5px 10px;font-size:.7em}.btn-xs{padding:3px 8px;font-size:.65em}.btn-block{width:100%;margin-bottom:5px}
        input,select{width:100%;padding:10px;border:2px solid #2a3a5e;border-radius:20px;font-size:.9em;background:#0f3460;color:#e0e0e0;outline:none;font-family:inherit;margin-bottom:5px}
        input:focus,select:focus{border-color:#7c6fff}input::placeholder{color:#6a6a7a}
        table{width:100%;border-collapse:collapse;font-size:.8em}
        th{background:#0f3460;color:#9b8fff;padding:8px;text-align:left}td{padding:8px;border-bottom:1px solid #2a3a5e;color:#a0a0b0}
        .product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        .product-card{background:#16213e;border-radius:8px;padding:12px;cursor:pointer;border:1px solid #2a3a5e;transition:all .2s}.product-card:active{transform:scale(.96)}
        .cart-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a3a5e;gap:5px}
        .sidebar{position:fixed;left:-300px;top:0;bottom:0;width:280px;background:#1a1a2e;z-index:1000;transition:left .3s;overflow-y:auto;border-right:1px solid #2a3a5e}
        .sidebar.active{left:0}.sidebar-header{padding:20px 15px;background:#0f3460;border-bottom:2px solid #7c6fff}
        .sidebar-header h3{color:#9b8fff;font-size:1.3em}.sidebar-header .sidebar-subtitle{color:#a0a0b0;font-size:.7em;margin-top:4px}
        .sidebar-nav{padding:10px 8px}.sidebar-section-title{font-size:.6em;color:#6a6a7a;text-transform:uppercase;letter-spacing:2px;padding:8px 12px 4px;font-weight:700}
        .sidebar-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:#a0a0b0;font-size:.82em}.sidebar-nav-item:active{transform:scale(.97)}
        .sidebar-nav-item.active{background:rgba(124,111,255,.2);color:#fff;font-weight:600}.sidebar-nav-icon{font-size:1.1em;width:24px;text-align:center}
        .sidebar-footer{padding:10px;border-top:1px solid #2a3a5e;margin-top:auto}
        .sidebar-footer-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:10px;cursor:pointer;color:#ff4757;font-size:.8em;border:none;background:none;font-family:inherit}
        .sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:999}.sidebar-overlay.active{display:block}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;justify-content:center;align-items:center;padding:15px}
        .modal.active{display:flex}.modal-content{background:#1e2a4a;border-radius:15px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;border:1px solid #2a3a5e}
        .stock-low{color:#ff4757;font-weight:bold}.empty-state{text-align:center;padding:40px;color:#a0a0b0}
        .receipt-mini{background:#fff;color:#000;padding:12px;border-radius:8px;font-family:'Courier New',monospace;font-size:.8em;margin-top:10px}
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- LICENSE GATE -->
        <div id="licenseGate">
            <div class="license-gate-card">
                <div class="logo">🔐</div>
                <h2>MLEA POS</h2>
                <p>Enter your license key to unlock the system</p>
                <input type="text" id="licenseInput" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" oninput="formatLicense(this)">
                <button class="btn-activate" id="activateBtn" onclick="handleActivation()">Activate License</button>
                <button class="btn-deactivate" id="deactivateBtn" style="display:none;" onclick="handleDeactivation()">Deactivate License</button>
                <div class="status" id="licenseStatus"></div>
            </div>
        </div>

        <!-- LOGIN SCREEN -->
        <div id="loginScreen" style="display:none;">
            <div class="login-card">
                <div class="login-logo"><h1>🏪 MLEA POS</h1><p>Multi-Branch System v2.2</p></div>
                <div class="section-label">👤 Select User</div>
                <div class="user-selector" id="userSelector"></div>
                <div class="section-label">🔢 Enter PIN</div>
                <div class="pin-display" id="pinDisplay"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
                <div class="error-msg" id="errorMessage"></div>
                <div class="pin-pad">
                    <button class="pin-btn" onclick="enterPin('1')">1</button><button class="pin-btn" onclick="enterPin('2')">2</button><button class="pin-btn" onclick="enterPin('3')">3</button>
                    <button class="pin-btn" onclick="enterPin('4')">4</button><button class="pin-btn" onclick="enterPin('5')">5</button><button class="pin-btn" onclick="enterPin('6')">6</button>
                    <button class="pin-btn" onclick="enterPin('7')">7</button><button class="pin-btn" onclick="enterPin('8')">8</button><button class="pin-btn" onclick="enterPin('9')">9</button>
                    <button class="pin-btn clear" onclick="clearPin()">Clear</button><button class="pin-btn" onclick="enterPin('0')">0</button><button class="pin-btn submit" onclick="submitPin()">→</button>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="mainApp">
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header"><h3>🏪 MLEA POS</h3><p class="sidebar-subtitle">v2.2 Licensed</p></div>
                <div class="sidebar-nav" id="sidebarNav"></div>
                <div class="sidebar-footer"><button class="sidebar-footer-btn" onclick="logout()">🚪 Sign Out</button></div>
            </div>
            <div class="header"><button class="hamburger" onclick="openSidebar()">☰</button><h1 id="headerTitle">MLEA POS</h1><div class="header-right"><span id="headerBranch"></span><span id="headerUser"></span><button class="logout-btn" onclick="logout()">🚪</button></div></div>
            <div id="mainContent"><p style="text-align:center;padding:40px;color:#a0a0b0;">Loading...</p></div>
        </div>
    </div>
    <div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
// ═══════════════════════════════════════════
// LICENSE ACTIVATION
// ═══════════════════════════════════════════
const LICENSE_SERVER = 'https://script.google.com/macros/s/AKfycby1QlCg9jzpXmxtE1N-5w7b4CuGa0TT5gcfwYrx-0yetL4iI5s86ZX8NyLhDwo4tLJX/exec';
const DEMO_KEY = 'MLEA-DEMO-UNLOCK-KEY1';

function getDeviceId(){return btoa(navigator.userAgent.slice(-15)+screen.width+'x'+screen.height+new Date().getTimezoneOffset()).replace(/[^a-zA-Z0-9]/g,'').slice(0,16)}
function formatLicense(input){let v=input.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();if(v.length>16)v=v.slice(0,16);let p=[];for(let i=0;i<v.length;i+=4)p.push(v.slice(i,i+4));input.value=p.join('-')}
function isActivated(){return localStorage.getItem('mlea_pos_activated')==='true'}
function setActivated(key){localStorage.setItem('mlea_pos_activated','true');localStorage.setItem('mlea_pos_license',key);showLicenseGate()}
function clearActivation(){localStorage.removeItem('mlea_pos_activated');localStorage.removeItem('mlea_pos_license');showLicenseGate()}
function getStoredLicense(){return localStorage.getItem('mlea_pos_license')||''}

function showLicenseGate(){
  if(isActivated()){
    document.getElementById('licenseGate').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('mainApp').style.display='none';
    document.getElementById('licenseInput').value=getStoredLicense();
    document.getElementById('activateBtn').style.display='none';
    document.getElementById('deactivateBtn').style.display='block';
    document.getElementById('licenseStatus').textContent='✅ System Activated';
    document.getElementById('licenseStatus').className='status success';
    initApp();
  }else{
    document.getElementById('licenseGate').style.display='flex';
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='none';
    document.getElementById('licenseInput').value='';
    document.getElementById('activateBtn').style.display='block';
    document.getElementById('deactivateBtn').style.display='none';
    document.getElementById('licenseStatus').textContent='';
    document.getElementById('licenseStatus').className='status';
  }
}

async function handleActivation(){
  const input=document.getElementById('licenseInput'),statusEl=document.getElementById('licenseStatus'),btn=document.getElementById('activateBtn'),key=input.value.trim();
  if(!key){statusEl.textContent='⚠️ Please enter your license key';statusEl.className='status error';return}
  btn.disabled=true;statusEl.textContent='⏳ Verifying...';statusEl.className='status';
  const deviceId=getDeviceId(),url=LICENSE_SERVER+'?action=activate&licenseKey='+encodeURIComponent(key)+'&deviceId='+encodeURIComponent(deviceId);
  try{
    const response=await fetch(url),text=await response.text();let result;
    try{result=JSON.parse(text)}catch(e){statusEl.textContent='❌ Server error';statusEl.className='status error';btn.disabled=false;return}
    if(result.success){setActivated(key);statusEl.textContent='✅ Activated! Welcome, '+(result.customer||'User');statusEl.className='status success'}
    else{statusEl.textContent='❌ '+result.message;statusEl.className='status error'}
  }catch(error){
    if(key===DEMO_KEY){setActivated(key);statusEl.textContent='⚠️ Offline mode — demo activated';statusEl.className='status success'}
    else{statusEl.textContent='❌ Cannot reach server';statusEl.className='status error'}
  }
  btn.disabled=false;
}

async function handleDeactivation(){
  if(!confirm('Deactivate license? You will be logged out.'))return;
  try{await fetch(LICENSE_SERVER+'?action=deactivate&licenseKey='+encodeURIComponent(getStoredLicense())+'&deviceId='+encodeURIComponent(getDeviceId()))}catch(e){}
  currentUser=null;cart=[];clearActivation();
}

// ═══════════════════════════════════════════
// POS SYSTEM (Simplified but fully functional)
// ═══════════════════════════════════════════
const DB={stores:['products','sales','users','settings','branches','activityLogs'],init(){this.stores.forEach(s=>{if(!localStorage.getItem('mlea_'+s))localStorage.setItem('mlea_'+s,'[]')})},getAll(k){return JSON.parse(localStorage.getItem('mlea_'+k)||'[]')},set(k,d){localStorage.setItem('mlea_'+k,JSON.stringify(d))},add(k,item){const items=this.getAll(k);item.id=items.length>0?Math.max(...items.map(i=>i.id))+1:1;item.createdAt=new Date().toISOString();items.push(item);this.set(k,items);return item.id},update(k,item){const items=this.getAll(k);const idx=items.findIndex(i=>i.id===item.id);if(idx!==-1){item.updatedAt=new Date().toISOString();items[idx]=item;this.set(k,items)}},delete(k,id){this.set(k,this.getAll(k).filter(i=>i.id!==id))},getById(k,id){return this.getAll(k).find(i=>i.id===id)},getByBranch(k,bid){return this.getAll(k).filter(i=>i.branchId===bid)}};DB.init();

const currencies={PHP:{symbol:'₱',name:'Philippine Peso',flag:'🇵🇭',decimals:2},USD:{symbol:'$',name:'US Dollar',flag:'🇺🇸',decimals:2}};
let currentUser=null,currentView='dashboard',currentCurrency='PHP',taxRate=0.12,cart=[],selectedUserId=null,pinEntry='',users=[],branches=[],products=[];

function formatCurrency(a){const c=currencies[currentCurrency];return c.symbol+(c.decimals===0?Math.round(a).toLocaleString():a.toFixed(2))}
function getMyData(key){const all=DB.getAll(key);if(currentUser&&currentUser.role==='admin')return all;if(currentUser&&currentUser.branchId)return all.filter(i=>i.branchId===currentUser.branchId);return all.filter(i=>!i.branchId)}
function logActivity(action,details){if(!currentUser)return;DB.add('activityLogs',{userId:currentUser.id,userName:currentUser.name,userRole:currentUser.role,branchId:currentUser.branchId,action:action,details:details,timestamp:new Date().toISOString()})}

function initApp(){
  users=DB.getAll('users');branches=DB.getAll('branches');products=DB.getAll('products');
  if(branches.length===0){DB.add('branches',{name:'Main Branch',address:'Head Office',phone:'555-0000'});branches=DB.getAll('branches')}
  if(users.length===0){DB.add('users',{name:'Admin',role:'admin',active:true,pin:'1234',branchId:null});users=DB.getAll('users')}
  if(products.length===0){DB.add('products',{sku:'SKU001',name:'Sample Product',price:99.99,stock:50,category:'General',active:true,barcode:'123456789',branchId:null});products=DB.getAll('products')}
  const settings=DB.getAll('settings');settings.forEach(s=>{if(s.key==='currency')currentCurrency=s.value;if(s.key==='taxRate')taxRate=parseFloat(s.value)||0.12});
  renderLoginScreen();
}

function renderLoginScreen(){
  document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';
  users=DB.getAll('users');document.getElementById('userSelector').innerHTML=users.filter(u=>u.active).map(u=>`<div class="user-card ${selectedUserId===u.id?'selected':''}" onclick="selectUser(${u.id})"><div class="avatar">${u.role==='admin'?'👑':u.role==='manager'?'👨‍💼':'👤'}</div><div class="name">${u.name}</div><span class="role-badge ${u.role}-badge">${u.role}</span></div>`).join('');
  pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent='';
}
function selectUser(id){selectedUserId=id;pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent='';renderLoginScreen()}
function enterPin(d){if(!selectedUserId){document.getElementById('errorMessage').textContent='Select a user first';return}if(pinEntry.length<4){pinEntry+=d;updatePinDisplay();if(pinEntry.length===4)setTimeout(submitPin,150)}}
function clearPin(){pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent=''}
function updatePinDisplay(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.toggle('filled',i<pinEntry.length);d.classList.remove('error')})}
function submitPin(){
  if(!selectedUserId)return;users=DB.getAll('users');const user=users.find(u=>u.id===selectedUserId);
  if(!user||!user.active){document.getElementById('errorMessage').textContent=!user?'User not found!':'Account deactivated!';pinEntry='';updatePinDisplay();return}
  if(user.pin===pinEntry){
    currentUser=user;document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';
    document.getElementById('headerUser').textContent=user.name;
    if(user.branchId){const b=DB.getById('branches',user.branchId);document.getElementById('headerBranch').innerHTML='<span class="branch-indicator">🏢 '+(b?b.name:'Branch')+'</span>';document.getElementById('headerTitle').textContent=(b?b.name:'Branch')+' POS'}
    else{document.getElementById('headerBranch').innerHTML='<span class="admin-indicator">👑 Admin</span>';document.getElementById('headerTitle').textContent='MLEA HQ Admin'}
    renderSidebar();pinEntry='';selectedUserId=null;updatePinDisplay();document.getElementById('errorMessage').textContent='';switchView('dashboard');
  }else{document.getElementById('errorMessage').textContent='Wrong PIN!';pinEntry='';updatePinDisplay();document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));setTimeout(()=>document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error')),400)}
}

function renderSidebar(){
  const nav=document.getElementById('sidebarNav');if(!currentUser)return;
  const lowStock=getMyData('products').filter(p=>p.active&&p.stock<10).length;
  if(currentUser.role==='admin'){
    nav.innerHTML=`<div class="sidebar-section-title">Main Menu</div><div class="sidebar-nav-item active" onclick="switchView('dashboard')"><span class="sidebar-nav-icon">📊</span>Dashboard</div><div class="sidebar-section-title">Management</div><div class="sidebar-nav-item" onclick="switchView('branches')"><span class="sidebar-nav-icon">🏢</span>Branches</div><div class="sidebar-nav-item" onclick="switchView('allProducts')"><span class="sidebar-nav-icon">📦</span>Products</div><div class="sidebar-nav-item" onclick="switchView('allUsers')"><span class="sidebar-nav-icon">👥</span>Users</div><div class="sidebar-nav-item" onclick="switchView('allSales')"><span class="sidebar-nav-icon">💰</span>Sales</div><div class="sidebar-section-title">Tools</div><div class="sidebar-nav-item" onclick="switchView('settings')"><span class="sidebar-nav-icon">⚙️</span>Settings</div>`
  }else if(currentUser.role==='manager'){
    nav.innerHTML=`<div class="sidebar-section-title">Main Menu</div><div class="sidebar-nav-item active" onclick="switchView('dashboard')"><span class="sidebar-nav-icon">📊</span>Dashboard</div><div class="sidebar-nav-item" onclick="switchView('pos')"><span class="sidebar-nav-icon">💻</span>POS Terminal</div><div class="sidebar-section-title">Management</div><div class="sidebar-nav-item" onclick="switchView('inventory')"><span class="sidebar-nav-icon">📦</span>Products${lowStock>0?` <span style="color:#ffa502;">(${lowStock})</span>`:''}</div><div class="sidebar-nav-item" onclick="switchView('myUsers')"><span class="sidebar-nav-icon">👥</span>Cashiers</div><div class="sidebar-nav-item" onclick="switchView('branchSales')"><span class="sidebar-nav-icon">💰</span>Sales</div><div class="sidebar-section-title">Tools</div><div class="sidebar-nav-item" onclick="switchView('settings')"><span class="sidebar-nav-icon">⚙️</span>Settings</div>`
  }else{
    nav.innerHTML=`<div class="sidebar-section-title">Main Menu</div><div class="sidebar-nav-item active" onclick="switchView('dashboard')"><span class="sidebar-nav-icon">📊</span>Dashboard</div><div class="sidebar-nav-item" onclick="switchView('pos')"><span class="sidebar-nav-icon">💻</span>POS Terminal</div>`
  }
}
function logout(){currentUser=null;cart=[];document.getElementById('mainApp').style.display='none';closeSidebar();renderLoginScreen()}
function openSidebar(){document.getElementById('sidebar').classList.add('active');document.getElementById('sidebarOverlay').classList.add('active')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('active');document.getElementById('sidebarOverlay').classList.remove('active')}
function switchView(view){currentView=view;closeSidebar();const el=document.getElementById('mainContent');switch(view){case 'dashboard':renderDashboard(el);break;case 'pos':renderPOS(el);break;case 'branches':renderBranches(el);break;case 'allProducts':case 'inventory':renderProducts(el);break;case 'allUsers':case 'myUsers':renderUsers(el);break;case 'allSales':case 'branchSales':renderSales(el);break;case 'settings':renderSettings(el);break;default:renderDashboard(el)}}

function renderDashboard(el){
  const today=new Date().toISOString().split('T')[0],thisMonth=today.substring(0,7);
  const mySales=getMyData('sales'),myProducts=getMyData('products');
  const todaySales=mySales.filter(s=>s.date===today).reduce((s,i)=>s+i.total,0);
  const todayCount=mySales.filter(s=>s.date===today).length;
  const monthSales=mySales.filter(s=>s.date.startsWith(thisMonth)).reduce((s,i)=>s+i.total,0);
  const hour=new Date().getHours(),greeting=hour<12?'Good Morning':hour<17?'Good Afternoon':'Good Evening';
  el.innerHTML=`<div class="card"><h3>${greeting}, ${currentUser.name}!</h3><p style="color:#a0a0b0;">${currentUser.role==='admin'?'👑 Admin':currentUser.role==='manager'?'👨‍💼 Manager':'👤 Cashier'}</p></div>
  <div class="metrics"><div class="metric-card"><div class="metric-value">${formatCurrency(todaySales)}</div><div class="metric-label">Today's Sales</div></div><div class="metric-card"><div class="metric-value">${todayCount}</div><div class="metric-label">Transactions</div></div></div>
  <div class="metrics"><div class="metric-card"><div class="metric-value">${formatCurrency(monthSales)}</div><div class="metric-label">This Month</div></div><div class="metric-card"><div class="metric-value">${myProducts.filter(p=>p.active).length}</div><div class="metric-label">Products</div></div></div>
  <button class="btn btn-primary btn-block" onclick="switchView('pos')" style="font-size:1.1em;padding:15px;">🛒 Start New Sale</button>`;
}

function renderPOS(el){
  const myProducts=getMyData('products').filter(p=>p.active);
  const subtotal=cart.reduce((s,i)=>s+(i.price*i.quantity),0),total=subtotal+(subtotal*taxRate);
  el.innerHTML=`<div class="product-grid">${myProducts.slice(0,8).map(p=>`<div class="product-card" onclick="addToCart('${p.sku}')"><strong>${p.name}</strong><div style="color:#9b8fff;">${formatCurrency(p.price)}</div><small>Stock: ${p.stock}</small></div>`).join('')}</div>
  <div class="card"><h4>🛒 Cart (${cart.length})</h4>${cart.map((item,i)=>`<div class="cart-item"><span>${item.name} x${item.quantity}</span><span>${formatCurrency(item.price*item.quantity)}</span><button class="btn btn-danger btn-xs" onclick="removeFromCart(${i})">✕</button></div>`).join('')||'<p style="color:#a0a0b0;">Empty</p>'}
  <hr style="border-color:#2a3a5e;"><div style="font-size:1.3em;text-align:right;"><strong>Total: <span style="color:#9b8fff;">${formatCurrency(total)}</span></strong></div>
  ${cart.length>0?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;"><button class="btn btn-success" onclick="processPayment('cash')">💵 Cash</button><button class="btn btn-primary" onclick="processPayment('card')">💳 Card</button></div>`:''}</div>`;
}
function addToCart(sku){const p=getMyData('products').find(p=>(p.sku===sku||p.barcode===sku)&&p.active);if(p&&p.stock>0){const e=cart.find(i=>i.sku===p.sku);e?e.quantity++:cart.push({...p,quantity:1});switchView('pos')}else{alert('Not found or out of stock!')}}
function removeFromCart(i){cart.splice(i,1);switchView('pos')}
function processPayment(method){
  if(cart.length===0){alert('Cart empty!');return}
  const subtotal=cart.reduce((s,i)=>s+(i.price*i.quantity),0),total=subtotal+(subtotal*taxRate);
  const sale={date:new Date().toISOString().split('T')[0],total,subtotal,tax:subtotal*taxRate,paymentMethod:method,cashierId:currentUser.id,cashierName:currentUser.name,branchId:currentUser.branchId,currency:currentCurrency,items:cart.map(i=>({productId:i.id,name:i.name,quantity:i.quantity,price:i.price}))};
  const saleId=DB.add('sales',sale);
  cart.forEach(item=>{const p=DB.getById('products',item.id);if(p){p.stock-=item.quantity;DB.update('products',p)}});
  logActivity('Sale','#'+saleId+': '+formatCurrency(total)+' via '+method);
  document.getElementById('modalContent').innerHTML=`<div style="text-align:center;"><h3 style="color:#2ed573;">✅ Sale Complete!</h3><h2>${formatCurrency(total)}</h2><p>Receipt #${saleId} | ${method.toUpperCase()}</p><p style="color:#a0a0b0;">Cashier: ${currentUser.name}</p></div>`;
  document.getElementById('modal').classList.add('active');cart=[];
  setTimeout(()=>{document.getElementById('modal').classList.remove('active');switchView('dashboard')},2500);
}

function renderBranches(el){
  if(currentUser.role!=='admin'){el.innerHTML='<p class="empty-state">🔒 Admin only</p>';return}
  branches=DB.getAll('branches');
  el.innerHTML=`<h4>🏢 Branches</h4><button class="btn btn-primary btn-block" onclick="addBranchPrompt()">+ Add Branch</button>${branches.map(b=>`<div class="card"><strong>${b.name}</strong><p style="color:#a0a0b0;font-size:.8em;">${b.address||''} | ${b.phone||''}</p><button class="btn btn-danger btn-xs" onclick="if(confirm('Delete?')){DB.delete('branches',${b.id});switchView('branches')}">🗑️</button></div>`).join('')}`;
}
function addBranchPrompt(){const name=prompt('Branch name:');if(name){DB.add('branches',{name,address:'',phone:''});switchView('branches')}}

function renderProducts(el){
  const prods=currentView==='allProducts'?DB.getAll('products'):getMyData('products');
  el.innerHTML=`<h4>📦 Products</h4><button class="btn btn-primary btn-block" onclick="addProductPrompt()">+ Add Product</button>
  <table><thead><tr><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead><tbody>
  ${prods.map(p=>`<tr><td>${p.name}</td><td>${formatCurrency(p.price)}</td><td class="${p.stock<10?'stock-low':''}">${p.stock}</td><td style="white-space:nowrap;"><button class="btn btn-success btn-xs" onclick="adjustStock(${p.id})">+</button><button class="btn btn-danger btn-xs" onclick="if(confirm('Delete?')){DB.delete('products',${p.id});switchView(currentView)}">🗑️</button></td></tr>`).join('')}
  </tbody></table>`;
}
function addProductPrompt(){const name=prompt('Product name:');if(name){const price=parseFloat(prompt('Price:'));if(price){DB.add('products',{sku:'SKU'+Date.now(),name,price,stock:0,category:'General',active:true,barcode:'',branchId:currentUser.branchId});switchView(currentView)}}}
function adjustStock(id){const p=DB.getById('products',id);const qty=parseInt(prompt('Adjust stock for '+p.name+'\nCurrent: '+p.stock));if(!isNaN(qty)){p.stock=qty;DB.update('products',p);switchView(currentView)}}

function renderUsers(el){
  const usrs=currentView==='allUsers'?DB.getAll('users'):getMyData('users').filter(u=>u.role==='cashier');
  el.innerHTML=`<h4>👥 Users</h4><button class="btn btn-primary btn-block" onclick="addUserPrompt()">+ Add User</button>${usrs.map(u=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;"><div><strong>${u.name}</strong> <span class="role-badge ${u.role}-badge">${u.role}</span> ${u.active?'✅':'❌'}</div><button class="btn btn-danger btn-xs" onclick="if(confirm('Delete?')){DB.delete('users',${u.id});switchView(currentView)}">🗑️</button></div>`).join('')}`;
}
function addUserPrompt(){const name=prompt('Name:');if(name){const role=prompt('Role (admin/manager/cashier):')||'cashier';const pin=prompt('4-digit PIN:');if(pin&&pin.length===4){DB.add('users',{name,role,active:true,pin,branchId:currentUser.branchId});switchView(currentView);renderLoginScreen()}}}

function renderSales(el){
  const sales=(currentView==='allSales'?DB.getAll('sales'):getMyData('sales')).slice(-30).reverse();
  el.innerHTML=`<h4>💰 Sales History</h4>${sales.map(s=>`<div class="card"><div style="display:flex;justify-content:space-between;"><span>#${s.id} ${s.date}</span><span style="color:#9b8fff;font-weight:bold;">${formatCurrency(s.total)}</span></div><p style="color:#a0a0b0;font-size:.75em;">${s.paymentMethod} | ${s.cashierName}</p></div>`).join('')||'<p class="empty-state">No sales</p>'}`;
}

function renderSettings(el){
  el.innerHTML=`<div class="card"><h4>💱 Currency</h4><select onchange="currentCurrency=this.value;switchView('settings')">${Object.entries(currencies).map(([c,v])=>`<option value="${c}" ${currentCurrency===c?'selected':''}>${v.flag} ${v.name}</option>`).join('')}</select></div>
  <div class="card"><h4>💰 Tax Rate (%)</h4><input type="number" id="taxInput" value="${taxRate*100}" step="0.1"><button class="btn btn-primary btn-sm" onclick="taxRate=(parseFloat(document.getElementById('taxInput').value)||0)/100;alert('Saved!')">Save</button></div>`;
}

function closeModal(){document.getElementById('modal').classList.remove('active')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});

console.log('🚀 MLEA POS v2.3 - License Protected');
showLicenseGate();
</script>
