<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MLEA POS — BIR-Ready Multi-Branch System</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#080b14">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg-void:#080b14;
  --bg-deep:#0d1220;
  --bg-surface:#111827;
  --bg-elevated:#161f33;
  --bg-glass:rgba(255,255,255,0.04);
  --bg-glass-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);
  --border-bright:rgba(255,255,255,0.15);
  --accent-gold:#d4a853;
  --accent-gold-soft:rgba(212,168,83,0.15);
  --accent-gold-glow:rgba(212,168,83,0.35);
  --accent-emerald:#2dd4a0;
  --accent-emerald-soft:rgba(45,212,160,0.12);
  --accent-rose:#f06577;
  --accent-rose-soft:rgba(240,101,119,0.12);
  --accent-blue:#6fa3ef;
  --accent-blue-soft:rgba(111,163,239,0.12);
  --text-primary:#f0f0f5;
  --text-secondary:#8892a4;
  --text-muted:#4a5568;
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:20px;
  --radius-xl:28px;
  --shadow-ambient:0 0 60px rgba(212,168,83,0.04);
  --shadow-card:0 4px 30px rgba(0,0,0,0.4);
  --shadow-glow-gold:0 0 30px rgba(212,168,83,0.2);
  --shadow-glow-emerald:0 0 30px rgba(45,212,160,0.2);
}
body{font-family:var(--font-body);background:var(--bg-void);color:var(--text-primary);overflow-x:hidden;min-height:100vh}
.app-container{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg-deep);position:relative;overflow-x:hidden}
@media(min-width:768px){.app-container{max-width:768px}}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(212,168,83,0.06) 0%,transparent 70%);top:-100px;right:-100px;animation:drift 20s ease-in-out infinite}
.ambient::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,160,0.04) 0%,transparent 70%);bottom:-100px;left:-100px;animation:drift 25s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-20px) scale(1.05)}66%{transform:translate(-10px,15px) scale(0.97)}}
/* LICENSE GATE */
#licenseGate{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.license-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:var(--shadow-card),var(--shadow-ambient);animation:slideUp .5s cubic-bezier(0.22,1,0.36,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.license-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent-gold),#f0c060);border-radius:var(--radius-md);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:var(--shadow-glow-gold)}
.license-card h2{font-family:var(--font-display);font-size:1.5em;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em}
.license-card p{color:var(--text-secondary);font-size:.82em;margin:6px 0 24px;font-weight:300}
.license-card input{width:100%;padding:14px 18px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);font-size:1.05em;text-align:center;letter-spacing:4px;color:var(--text-primary);outline:none;font-family:var(--font-mono);transition:all .25s;margin-bottom:12px}
.license-card input:focus{border-color:var(--accent-gold);background:rgba(212,168,83,0.06);box-shadow:0 0 0 3px var(--accent-gold-glow)}
.btn-activate{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent-gold),#e8b850);color:#1a0f00;border:none;border-radius:var(--radius-md);font-size:.92em;font-weight:700;font-family:var(--font-display);cursor:pointer;letter-spacing:.04em;transition:all .2s;box-shadow:var(--shadow-glow-gold)}
.btn-activate:hover{transform:translateY(-1px);box-shadow:0 0 40px rgba(212,168,83,0.45)}
.btn-deactivate{width:100%;padding:11px;background:transparent;color:var(--accent-rose);border:1px solid rgba(240,101,119,0.3);border-radius:var(--radius-md);font-size:.8em;cursor:pointer;font-family:var(--font-body);margin-top:8px;transition:all .2s}
.btn-deactivate:hover{background:var(--accent-rose-soft)}
.license-status{font-size:.75em;margin-top:12px;min-height:18px;font-weight:500}
.license-status.success{color:var(--accent-emerald)}.license-status.error{color:var(--accent-rose)}
/* LOGIN */
#loginScreen{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.login-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px 22px;width:100%;max-width:360px;box-shadow:var(--shadow-card);animation:slideUp .5s cubic-bezier(0.22,1,0.36,1)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent-gold),#f0c060);border-radius:var(--radius-md);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--shadow-glow-gold)}
.login-logo h1{font-family:var(--font-display);color:var(--text-primary);font-size:1.6em;font-weight:800;letter-spacing:-0.03em}
.login-logo p{color:var(--text-secondary);font-size:.78em;font-weight:300;margin-top:3px;letter-spacing:.04em}
.section-label{font-size:.65em;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;font-weight:600;font-family:var(--font-display);margin-bottom:8px}
.user-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;max-height:190px;overflow-y:auto}
.user-selector::-webkit-scrollbar{width:3px}.user-selector::-webkit-scrollbar-track{background:transparent}.user-selector::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}
.user-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.user-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(212,168,83,0.08));opacity:0;transition:opacity .2s}
.user-card:hover::before,.user-card.selected::before{opacity:1}
.user-card.selected{border-color:var(--accent-gold);background:var(--accent-gold-soft);box-shadow:0 0 20px var(--accent-gold-glow)}
.user-card .avatar{font-size:1.6em;display:block}
.user-card .name{font-size:.68em;color:var(--text-primary);margin-top:4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.6em;font-weight:600;font-family:var(--font-display);letter-spacing:.04em;margin-top:3px}
.admin-badge{background:rgba(212,168,83,0.2);color:var(--accent-gold)}
.manager-badge{background:var(--accent-emerald-soft);color:var(--accent-emerald)}
.cashier-badge{background:var(--accent-blue-soft);color:var(--accent-blue)}
.pin-display{display:flex;justify-content:center;gap:14px;margin:14px 0 8px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bg-glass);border:1.5px solid var(--border);transition:all .25s}
.pin-dot.filled{background:var(--accent-gold);border-color:var(--accent-gold);box-shadow:0 0 12px var(--accent-gold-glow);transform:scale(1.15)}
.pin-dot.error{background:var(--accent-rose);border-color:var(--accent-rose);box-shadow:0 0 12px rgba(240,101,119,0.5);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.error-msg{color:var(--accent-rose);text-align:center;font-size:.78em;min-height:18px;margin-bottom:8px;font-weight:500}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.pin-btn{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;font-size:1.25em;cursor:pointer;color:var(--text-primary);font-family:var(--font-display);font-weight:600;transition:all .15s;position:relative;overflow:hidden}
.pin-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.08);opacity:0;transition:opacity .15s}
.pin-btn:active::after{opacity:1}
.pin-btn:hover{border-color:var(--border-bright);background:var(--bg-glass-hover)}
.pin-btn:active{transform:scale(.94)}
.pin-btn.clear{background:var(--accent-rose-soft);color:var(--accent-rose);border-color:rgba(240,101,119,0.25);font-size:.8em;font-weight:600}
.pin-btn.submit{background:linear-gradient(135deg,var(--accent-gold),#e8b850);color:#1a0f00;border-color:transparent;font-size:.95em;box-shadow:0 4px 15px var(--accent-gold-glow)}
/* MAIN APP */
#mainApp{display:none;position:relative;z-index:10}
.header{background:rgba(13,18,32,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.header-logo{font-family:var(--font-display);color:var(--text-primary);font-size:1.05em;font-weight:700;letter-spacing:-0.02em}
.header-right{display:flex;align-items:center;gap:8px}
.logout-btn{background:var(--accent-rose-soft);color:var(--accent-rose);border:1px solid rgba(240,101,119,0.2);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.75em;font-weight:600;font-family:var(--font-display);transition:all .2s;letter-spacing:.03em}
.logout-btn:hover{background:rgba(240,101,119,0.25)}
.hamburger{background:var(--bg-glass);border:1px solid var(--border);color:var(--text-primary);font-size:18px;cursor:pointer;width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:all .2s}
.hamburger:hover{background:var(--bg-glass-hover);border-color:var(--border-bright)}
.branch-indicator{background:var(--accent-emerald-soft);color:var(--accent-emerald);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--font-display);letter-spacing:.03em;border:1px solid rgba(45,212,160,0.2)}
.admin-indicator{background:var(--accent-gold-soft);color:var(--accent-gold);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--font-display);letter-spacing:.03em;border:1px solid rgba(212,168,83,0.25)}
#mainContent{padding:14px;min-height:60vh}
/* CARDS */
.card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin:10px 0;backdrop-filter:blur(10px);transition:border-color .2s}
.card:hover{border-color:var(--border-bright)}
.card h4,.card h5{font-family:var(--font-display);font-weight:600;letter-spacing:-0.01em;margin-bottom:10px}
.card h5{font-size:.88em;color:var(--text-secondary)}
/* BIR BADGE */
.bir-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(212,168,83,0.2),rgba(212,168,83,0.08));border:1px solid rgba(212,168,83,0.35);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;color:var(--accent-gold);font-family:var(--font-display);letter-spacing:.06em;text-transform:uppercase}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.metric-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;text-align:center;transition:all .2s;position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--accent-gold),transparent);opacity:0.4}
.metric-value{font-family:var(--font-display);font-size:1.2em;font-weight:700;color:var(--accent-gold);letter-spacing:-0.02em}
.metric-label{font-size:.66em;color:var(--text-muted);margin-top:5px;text-transform:uppercase;letter-spacing:.08em;font-weight:500}
/* BUTTONS */
.btn{padding:11px 22px;border:none;border-radius:var(--radius-md);cursor:pointer;font-size:.83em;font-weight:600;font-family:var(--font-display);letter-spacing:.03em;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--accent-gold),#e8b850);color:#1a0f00;box-shadow:0 4px 15px var(--accent-gold-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 22px var(--accent-gold-glow)}
.btn-success{background:var(--accent-emerald-soft);color:var(--accent-emerald);border:1px solid rgba(45,212,160,0.25)}
.btn-success:hover{background:rgba(45,212,160,0.2)}
.btn-danger{background:var(--accent-rose-soft);color:var(--accent-rose);border:1px solid rgba(240,101,119,0.2)}
.btn-danger:hover{background:rgba(240,101,119,0.22)}
.btn-warning{background:rgba(251,189,35,0.12);color:#fbb923;border:1px solid rgba(251,189,35,0.2)}
.btn-warning:hover{background:rgba(251,189,35,0.2)}
.btn-sm{padding:7px 14px;font-size:.72em;border-radius:var(--radius-sm)}
.btn-xs{padding:4px 10px;font-size:.66em;border-radius:6px}
.btn-block{width:100%;margin-bottom:8px}
/* INPUTS */
input[type="text"],input[type="number"],input[type="tel"],input[type="email"],input[type="file"],select,textarea{width:100%;padding:11px 16px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);font-size:.87em;color:var(--text-primary);outline:none;font-family:var(--font-body);margin-bottom:8px;transition:all .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent-gold);background:rgba(212,168,83,0.05);box-shadow:0 0 0 3px rgba(212,168,83,0.12)}
select{cursor:pointer}
select option{background:var(--bg-surface);color:var(--text-primary)}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:.78em}
th{background:var(--bg-elevated);color:var(--text-secondary);padding:10px 12px;text-align:left;font-family:var(--font-display);font-size:.7em;text-transform:uppercase;letter-spacing:.08em;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text-secondary);vertical-align:middle}
tr:hover td{background:var(--bg-glass);color:var(--text-primary)}
.stock-low{color:var(--accent-rose);font-weight:700}
/* SIDEBAR */
.sidebar{position:fixed;left:-300px;top:0;bottom:0;width:270px;background:rgba(13,18,32,0.96);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);z-index:1000;transition:left .3s cubic-bezier(0.22,1,0.36,1);overflow-y:auto;border-right:1px solid var(--border)}
.sidebar.active{left:0}
.sidebar-header{padding:24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sidebar-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent-gold),#f0c060);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 15px var(--accent-gold-glow)}
.sidebar-header-text h3{font-family:var(--font-display);color:var(--text-primary);font-size:1.05em;font-weight:700;letter-spacing:-0.02em}
.sidebar-header-text p{color:var(--text-muted);font-size:.68em;margin-top:2px}
.sidebar-nav{padding:12px 10px;flex:1}
.sidebar-section-title{font-size:.58em;color:var(--text-muted);text-transform:uppercase;letter-spacing:.15em;padding:12px 10px 5px;font-weight:700;font-family:var(--font-display)}
.sidebar-nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--radius-md);cursor:pointer;color:var(--text-secondary);font-size:.83em;font-weight:400;transition:all .18s;margin-bottom:2px;position:relative}
.sidebar-nav-item:hover{background:var(--bg-glass);color:var(--text-primary)}
.sidebar-nav-item.active{background:var(--accent-gold-soft);color:var(--accent-gold);font-weight:600}
.sidebar-nav-item.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;background:var(--accent-gold);border-radius:0 3px 3px 0}
.sidebar-nav-icon{font-size:1em;width:22px;text-align:center;opacity:.85}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:999}.sidebar-overlay.active{display:block}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border);margin-top:auto}
.sidebar-footer-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:var(--radius-md);cursor:pointer;color:var(--accent-rose);font-size:.82em;font-weight:500;border:none;background:none;font-family:var(--font-body);transition:all .2s}
.sidebar-footer-btn:hover{background:var(--accent-rose-soft)}
/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);z-index:2000;justify-content:center;align-items:center;padding:20px}
.modal.active{display:flex}
.modal-content{background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:var(--radius-xl);padding:26px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-card);animation:slideUp .3s cubic-bezier(0.22,1,0.36,1)}
.modal-content h4{font-family:var(--font-display);font-size:1.1em;font-weight:700;letter-spacing:-0.02em;margin-bottom:16px;color:var(--text-primary)}
.modal-content::-webkit-scrollbar{width:3px}.modal-content::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}
/* POS */
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.product-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.product-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-gold-soft),transparent);opacity:0;transition:opacity .2s}
.product-card:hover{border-color:rgba(212,168,83,0.4);transform:translateY(-1px);box-shadow:0 8px 25px rgba(0,0,0,0.3)}
.product-card:hover::after{opacity:1}
.product-card:active{transform:scale(.96)}
.product-card strong{font-family:var(--font-display);font-size:.85em;display:block;margin-bottom:4px;position:relative;z-index:1}
.product-card .price{color:var(--accent-gold);font-weight:700;font-size:.95em;font-family:var(--font-display);position:relative;z-index:1}
.product-card small{color:var(--text-muted);font-size:.67em;position:relative;z-index:1}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);gap:8px}
.cart-item:last-of-type{border-bottom:none}
.scan-input-wrap{position:relative;margin-bottom:14px}
.scan-input-wrap::before{content:'⚡';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;z-index:1;opacity:.6}
#scanInput{padding-left:40px;font-size:.95em;background:var(--bg-glass);border:1px solid var(--accent-emerald);border-radius:var(--radius-md);color:var(--text-primary);font-family:var(--font-mono)}
#scanInput:focus{border-color:var(--accent-emerald);box-shadow:0 0 0 3px var(--accent-emerald-soft)}
.scan-hint{color:var(--accent-emerald);font-size:.68em;text-align:center;margin-top:4px;font-weight:500;letter-spacing:.04em}
/* DISCOUNT BADGE */
.discount-applied{background:rgba(45,212,160,0.15);border:1px solid rgba(45,212,160,0.3);border-radius:var(--radius-sm);padding:6px 12px;font-size:.75em;color:var(--accent-emerald);font-weight:600;margin-bottom:8px;text-align:center;}
/* DASHBOARD */
.welcome-card{background:linear-gradient(135deg,var(--bg-elevated),var(--bg-glass));border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.welcome-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,var(--accent-gold-soft),transparent);pointer-events:none}
.welcome-card h3{font-family:var(--font-display);font-size:1.15em;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.welcome-card p{color:var(--text-secondary);font-size:.8em}
.welcome-card .role-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.7em;font-weight:600;margin-top:10px;font-family:var(--font-display);letter-spacing:.04em}
/* EMPTY STATE */
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
.empty-state .empty-icon{font-size:2.5em;margin-bottom:10px;opacity:.5}
.empty-state p{font-size:.85em}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:12px 0}
/* SALE COMPLETE */
.sale-complete{text-align:center;padding:10px}
.sale-complete .check-circle{width:70px;height:70px;background:var(--accent-emerald-soft);border:2px solid var(--accent-emerald);border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:30px;animation:popIn .4s cubic-bezier(0.22,1,0.36,1)}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.sale-complete h3{font-family:var(--font-display);color:var(--accent-emerald);font-size:1.2em;margin-bottom:6px}
.sale-complete .amount{font-family:var(--font-display);font-size:2em;font-weight:800;color:var(--text-primary);letter-spacing:-0.03em}
.sale-complete small{color:var(--text-muted);font-size:.78em;display:block;margin-top:6px}
/* PRINT SELECTION MODAL */
.print-option-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.print-option-btn{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 10px;cursor:pointer;text-align:center;transition:all .2s;color:var(--text-primary);font-family:var(--font-display);font-size:.78em;font-weight:600}
.print-option-btn:hover{border-color:var(--accent-gold);background:var(--accent-gold-soft);color:var(--accent-gold)}
.print-option-btn:active{transform:scale(.95)}
.print-option-btn .pob-icon{font-size:1.8em;display:block;margin-bottom:8px}
/* Z/X READING */
.reading-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin-bottom:10px}
.reading-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.82em}
.reading-row:last-child{border-bottom:none}
.reading-row.total{font-family:var(--font-display);font-weight:700;font-size:.95em;color:var(--accent-gold);border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:4px}
/* PRINT STYLES */
@media print{
  .sidebar,.header,.hamburger,.sidebar-overlay,.ambient,#licenseGate,#loginScreen,.modal,#mainContent,body>*:not(#printFrame){display:none!important}
  body{background:#fff!important;margin:0;padding:0}
  #printFrame{display:block!important;position:fixed;top:0;left:0;right:0;bottom:0;border:none;width:100%;height:100%}
}
    </style>
</head>
<body>
<div class="ambient"></div>
<iframe id="printFrame" style="display:none;border:none;width:0;height:0;" title="Print Frame"></iframe>

<div class="app-container">
  <!-- LICENSE GATE -->
  <div id="licenseGate">
    <div class="license-card">
      <div class="license-logo">🔐</div>

      <button class="btn-deactivate" id="deactivateBtn" style="display:none;" onclick="handleDeactivation()">Deactivate License</button>
      <button class="btn-deactivate" id="validateBtn" style="display:none;margin-top:4px;color:var(--accent-blue);border-color:rgba(111,163,239,0.3);" onclick="handleValidate()">🔍 Check License Status</button>
      <div class="license-status" id="licenseStatus"></div>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" style="display:none;">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🏪</div>
        <h1>MLEA POS</h1>
        <p>BIR-Ready Multi-Branch · v3.0</p>
      </div>
      <div class="section-label">Select User</div>
      <div class="user-selector" id="userSelector"></div>
      <div class="section-label" style="margin-top:4px;">Enter PIN</div>
      <div class="pin-display" id="pinDisplay">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="error-msg" id="errorMessage"></div>
      <div class="pin-pad">
        <button class="pin-btn" onclick="enterPin('1')">1</button><button class="pin-btn" onclick="enterPin('2')">2</button><button class="pin-btn" onclick="enterPin('3')">3</button>
        <button class="pin-btn" onclick="enterPin('4')">4</button><button class="pin-btn" onclick="enterPin('5')">5</button><button class="pin-btn" onclick="enterPin('6')">6</button>
        <button class="pin-btn" onclick="enterPin('7')">7</button><button class="pin-btn" onclick="enterPin('8')">8</button><button class="pin-btn" onclick="enterPin('9')">9</button>
        <button class="pin-btn clear" onclick="clearPin()">Clear</button><button class="pin-btn" onclick="enterPin('0')">0</button><button class="pin-btn submit" onclick="submitPin()">→</button>
      </div>

  <!-- MAIN APP -->
  <div id="mainApp">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🏪</div>
        <div class="sidebar-header-text"><h3>MLEA POS</h3><p>v3.0 BIR-Ready</p></div>
      </div>
      <div class="sidebar-nav" id="sidebarNav"></div>
      <div class="sidebar-footer"><button class="sidebar-footer-btn" onclick="logout()">🚪 Sign Out</button></div>
    </div>
    <div class="header">
      <button class="hamburger" onclick="openSidebar()">☰</button>
      <span class="header-logo" id="headerTitle">MLEA POS</span>
      <div class="header-right">
        <span id="headerBranch"></span>
        <button class="logout-btn" onclick="logout()">Sign Out</button>

    </div>
    <div id="mainContent"></div>
  </div>
</div>

<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
// ═══════════════════ LICENSE SYSTEM ═══════════════════
const LICENSE_SERVER='https://script.google.com/macros/s/AKfycby1QlCg9jzpXmxtE1N-5w7b4CuGa0TT5gcfwYrx-0yetL4iI5s86ZX8NyLhDwo4tLJX/exec';
const DEMO_KEY='MLEA-DEMO-UNLOCK-KEY1';
function getDeviceId(){return btoa(navigator.userAgent.slice(-15)+screen.width+'x'+screen.height+new Date().getTimezoneOffset()).replace(/[^a-zA-Z0-9]/g,'').slice(0,16)}
function formatLicense(input){let v=input.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();if(v.length>16)v=v.slice(0,16);let p=[];for(let i=0;i<v.length;i+=4)p.push(v.slice(i,i+4));input.value=p.join('-')}
function isActivated(){return localStorage.getItem('mlea_pos_activated')==='true'}
function setActivated(key,licenseInfo){localStorage.setItem('mlea_pos_activated','true');localStorage.setItem('mlea_pos_license',key);if(licenseInfo)localStorage.setItem('mlea_license_info',JSON.stringify(licenseInfo));showLicenseGate()}
function clearActivation(){localStorage.removeItem('mlea_pos_activated');localStorage.removeItem('mlea_pos_license');localStorage.removeItem('mlea_license_info');currentUser=null;cart=[];showLicenseGate()}
function getStoredLicense(){return localStorage.getItem('mlea_pos_license')||''}
function showLicenseGate(){
  if(isActivated()){
    document.getElementById('licenseGate').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('mainApp').style.display='none';
    document.getElementById('licenseInput').value=getStoredLicense();
    document.getElementById('activateBtn').style.display='none';
    document.getElementById('deactivateBtn').style.display='block';
    document.getElementById('validateBtn').style.display='block';
    const storedInfo=localStorage.getItem('mlea_license_info');
    let infoText='✓ System Activated';
    if(storedInfo){try{const info=JSON.parse(storedInfo);if(info.deviceCount&&info.maxDevices)infoText='✓ Activated · Device '+info.deviceCount+' of '+info.maxDevices;}catch(e){}}
    const s=document.getElementById('licenseStatus');s.textContent=infoText;s.className='license-status success';
    initApp();
  } else {
    document.getElementById('licenseGate').style.display='flex';
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='none';
    document.getElementById('licenseInput').value='';
    document.getElementById('activateBtn').style.display='block';
    document.getElementById('deactivateBtn').style.display='none';
    document.getElementById('licenseStatus').textContent='';
    document.getElementById('licenseStatus').className='license-status';
    document.getElementById('validateBtn').style.display='none';
  }
}
async function handleActivation(){
  const input=document.getElementById('licenseInput'),statusEl=document.getElementById('licenseStatus'),btn=document.getElementById('activateBtn'),key=input.value.trim();
  if(!key){statusEl.textContent='⚠ Enter license key';statusEl.className='license-status error';return;}
  btn.disabled=true;statusEl.textContent='Verifying…';statusEl.className='license-status';
  const deviceId=getDeviceId();
  const url=LICENSE_SERVER+'?action=activate&licenseKey='+encodeURIComponent(key)+'&deviceId='+encodeURIComponent(deviceId);
  try{
    const r=await fetch(url);const t=await r.text();let d;
    try{d=JSON.parse(t);}catch(e){statusEl.textContent='Server error. Try again.';statusEl.className='license-status error';btn.disabled=false;return;}
    if(d.success){setActivated(key,{deviceCount:d.deviceCount,maxDevices:d.maxDevices,customer:d.customer});}
    else{statusEl.textContent='✗ '+d.message;statusEl.className='license-status error';}
  } catch(e){
    if(key===DEMO_KEY){setActivated(key);statusEl.textContent='✓ Demo activated (offline)';statusEl.className='license-status success';}
    else{statusEl.textContent='✗ Cannot reach server';statusEl.className='license-status error';}
  }
  btn.disabled=false;
}
async function handleValidate(){
  const statusEl=document.getElementById('licenseStatus'),licenseKey=getStoredLicense();
  if(!licenseKey){statusEl.textContent='No license found';statusEl.className='license-status error';return;}
  statusEl.textContent='Checking…';statusEl.className='license-status';
  const url=LICENSE_SERVER+'?action=validate&licenseKey='+encodeURIComponent(licenseKey)+'&deviceId='+encodeURIComponent(getDeviceId());
  try{
    const r=await fetch(url);const d=await r.json();
    if(d.success){statusEl.textContent='✓ Valid · Device '+(d.deviceCount||'?')+' of '+(d.maxDevices||'?');statusEl.className='license-status success';localStorage.setItem('mlea_license_info',JSON.stringify({deviceCount:d.deviceCount,maxDevices:d.maxDevices,customer:d.customer}));}
    else{statusEl.textContent='✗ '+d.message;statusEl.className='license-status error';}
  } catch(e){statusEl.textContent='Cannot reach server';statusEl.className='license-status error';}
}
async function handleDeactivation(){
  if(!confirm('Deactivate this license?'))return;
  try{await fetch(LICENSE_SERVER+'?action=deactivate&licenseKey='+encodeURIComponent(getStoredLicense())+'&deviceId='+encodeURIComponent(getDeviceId()))}catch(e){}
  clearActivation();
}

// ═══════════════════ DATABASE ═══════════════════
const DB={
  stores:['products','sales','users','settings','branches','activityLogs','suppliers','purchaseOrders','voidedSales'],
  init(){this.stores.forEach(s=>{if(!localStorage.getItem('mlea_'+s))localStorage.setItem('mlea_'+s,'[]')})},
  getAll(k){return JSON.parse(localStorage.getItem('mlea_'+k)||'[]')},
  set(k,d){localStorage.setItem('mlea_'+k,JSON.stringify(d))},
  add(k,item){const items=this.getAll(k);item.id=items.length>0?Math.max(...items.map(i=>i.id))+1:1;item.createdAt=new Date().toISOString();items.push(item);this.set(k,items);return item.id},
  update(k,item){const items=this.getAll(k);const idx=items.findIndex(i=>i.id===item.id);if(idx!==-1){item.updatedAt=new Date().toISOString();items[idx]=item;this.set(k,items)}},
  delete(k,id){this.set(k,this.getAll(k).filter(i=>i.id!==id))},
  getById(k,id){return this.getAll(k).find(i=>i.id===id)},
  getByBranch(k,bid){return this.getAll(k).filter(i=>i.branchId===bid)}
};
DB.init();

const currencies={
  PHP:{symbol:'₱',name:'Philippine Peso',flag:'🇵🇭',decimals:2},
  JPY:{symbol:'¥',name:'Japanese Yen',flag:'🇯🇵',decimals:0},
  CNY:{symbol:'¥',name:'Chinese Yuan',flag:'🇨🇳',decimals:2},
  KRW:{symbol:'₩',name:'South Korean Won',flag:'🇰🇷',decimals:0},
  HKD:{symbol:'HK$',name:'Hong Kong Dollar',flag:'🇭🇰',decimals:2},
  SGD:{symbol:'S$',name:'Singapore Dollar',flag:'🇸🇬',decimals:2},
  MYR:{symbol:'RM',name:'Malaysian Ringgit',flag:'🇲🇾',decimals:2},
  THB:{symbol:'฿',name:'Thai Baht',flag:'🇹🇭',decimals:2},
  IDR:{symbol:'Rp',name:'Indonesian Rupiah',flag:'🇮🇩',decimals:0},
  USD:{symbol:'$',name:'US Dollar',flag:'🇺🇸',decimals:2},
  EUR:{symbol:'€',name:'Euro',flag:'🇪🇺',decimals:2},
  GBP:{symbol:'£',name:'British Pound',flag:'🇬🇧',decimals:2},
  AUD:{symbol:'A$',name:'Australian Dollar',flag:'🇦🇺',decimals:2},
  INR:{symbol:'₹',name:'Indian Rupee',flag:'🇮🇳',decimals:2},
  AED:{symbol:'د.إ',name:'UAE Dirham',flag:'🇦🇪',decimals:2},
  SAR:{symbol:'﷼',name:'Saudi Riyal',flag:'🇸🇦',decimals:2},
  ZAR:{symbol:'R',name:'South African Rand',flag:'🇿🇦',decimals:2},
};

// ═══════════════════ BIR HELPERS ═══════════════════
function getBIRSettings(){
  const settings=DB.getAll('settings');
  const get=k=>settings.find(s=>s.key===k)?.value||'';
  return{
    tin:get('bir_tin')||'000-000-000-000',
    registeredName:get('bir_name')||'MLEA Store',
    registeredAddress:get('bir_address')||'Registered Address',
    accreditationNo:get('bir_accreditation')||'FP082010-033-2019-0',
    accreditationDate:get('bir_accr_date')||'2019-01-01',
    accreditationExpiry:get('bir_accr_expiry')||'2024-12-31',
    ptuNo:get('bir_ptu')||'PTU-000000',
    orSeriesPrefix:get('bir_or_prefix')||'OR',
    orSeriesFrom:get('bir_or_from')||'0000001',
    orSeriesTo:get('bir_or_to')||'9999999',
    vatType:get('bir_vat_type')||'vat', // 'vat' or 'nonvat'
    siType:get('bir_si_type')||'or', // 'or' = Official Receipt, 'si' = Sales Invoice
  };
}
function getNextORNumber(){
  const settings=DB.getAll('settings');
  const e=settings.find(s=>s.key==='bir_or_counter');
  let counter=e?parseInt(e.value)||0:0;
  counter++;
  if(e){e.value=counter.toString();DB.update('settings',e);}
  else{DB.add('settings',{key:'bir_or_counter',value:counter.toString()});}
  const bir=getBIRSettings();
  return bir.orSeriesPrefix+'-'+String(counter).padStart(7,'0');
}
function updateGrandAccumulatedTotal(amount){
  const settings=DB.getAll('settings');
  const e=settings.find(s=>s.key==='bir_grand_total');
  const current=e?parseFloat(e.value)||0:0;
  const newVal=(current+amount).toFixed(2);
  if(e){e.value=newVal;DB.update('settings',e);}
  else{DB.add('settings',{key:'bir_grand_total',value:newVal});}
  return parseFloat(newVal);
}
function getGrandAccumulatedTotal(){
  return parseFloat(DB.getAll('settings').find(s=>s.key==='bir_grand_total')?.value||'0');
}
function getDailyAccumulatedTotal(){
  const today=new Date().toISOString().split('T')[0];
  return DB.getAll('sales').filter(s=>s.date===today&&!s.voided).reduce((a,s)=>a+s.total,0);
}

// ─── VAT Computation (BIR-compliant) ───
function computeVAT(total,vatType,taxRate){
  if(vatType==='vat'){
    const vatableSales=total/(1+taxRate); // back-compute from VAT-inclusive total
    const vatAmount=total-vatableSales;
    return{vatableSales,vatAmount,vatExempt:0,zeroRated:0,grandTotal:total};
  } else {
    return{vatableSales:0,vatAmount:0,vatExempt:total,zeroRated:0,grandTotal:total};
  }
}

let currentUser=null,currentView='dashboard',currentCurrency='PHP',taxRate=0.12,lowStockThreshold=10,defaultPrintMode='ask',cart=[],selectedUserId=null,pinEntry='',users=[],branches=[],products=[],downloadPath='MLEA_Backups';
let lastSaleData=null;
let discountAmount=0,discountType='none'; // 'none','sc','pwd','promo'

function fc(a){const c=currencies[currentCurrency]||currencies['PHP'];return c.symbol+(c.decimals===0?Math.round(a).toLocaleString():parseFloat(a).toFixed(2))}
function formatCurrency(a){return fc(a)}

function getMyData(key){
  const all=DB.getAll(key);
  if(!currentUser)return all;
  if(currentUser.role==='admin')return all;
  if(currentUser.branchId){return all.filter(i=>i.branchId===currentUser.branchId||!i.branchId);}
  return all;
}
function logActivity(action,details){if(!currentUser)return;DB.add('activityLogs',{userId:currentUser.id,userName:currentUser.name,userRole:currentUser.role,branchId:currentUser.branchId,action,details,timestamp:new Date().toISOString()})}

function initApp(){
  users=DB.getAll('users');branches=DB.getAll('branches');products=DB.getAll('products');
  if(branches.length===0){DB.add('branches',{name:'Main Branch',address:'Head Office',phone:'555-0000'});branches=DB.getAll('branches')}
  if(users.length===0){DB.add('users',{name:'Admin',role:'admin',active:true,pin:'1234',branchId:null});users=DB.getAll('users')}
  if(products.length===0){DB.add('products',{sku:'SKU001',name:'Sample Product',price:99.99,cost:50,stock:50,category:'General',active:true,barcode:'123456789',branchId:null,supplierId:null,vatExempt:false,zeroRated:false});products=DB.getAll('products')}
  if(DB.getAll('suppliers').length===0){DB.add('suppliers',{name:'Sample Supplier',contact:'John Doe',phone:'555-0001',email:'supplier@email.com',address:'123 Supplier St'})}
  DB.getAll('settings').forEach(s=>{
    if(s.key==='currency')currentCurrency=s.value;
    if(s.key==='taxRate')taxRate=parseFloat(s.value)||0.12;
    if(s.key==='downloadPath')downloadPath=s.value;
    if(s.key==='lowStockThreshold')lowStockThreshold=parseInt(s.value)||10;
    if(s.key==='defaultPrintMode')defaultPrintMode=s.value||'ask';
  });
  renderLoginScreen();
}

// ═══════════════════ DISCOUNT HELPERS ═══════════════════
function getQuickCashAmounts(total){
  const amounts=[];const steps=[50,100,200,500,1000];
  steps.forEach(s=>{if(s>=total)amounts.push(s)});
  if(amounts.length===0)amounts.push(Math.ceil(total/100)*100);
  return amounts.slice(0,4);
}
function updateChange(total){
  const cash=parseFloat(document.getElementById('cashTendered')?.value)||0;
  const cd=document.getElementById('changeDisplay'),ca=document.getElementById('changeAmount'),im=document.getElementById('insufficientMsg');
  if(!cd)return;
  if(cash>=total){cd.style.display='block';ca.textContent=fc(cash-total);im&&(im.style.display='none');}
  else{cd.style.display='none';im&&(im.style.display='block');}
}
function applyDiscount(type){
  const subtotal=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
  if(type==='sc'||type==='pwd'){discountType=type;discountAmount=subtotal*0.20;}
  else if(type==='promo'){const pct=parseFloat(prompt('Enter promo discount %:'))||0;discountType='promo';discountAmount=subtotal*(pct/100);}
  else{discountType='none';discountAmount=0;}
  switchView('pos');
}

// ═══════════════════ LOGIN ═══════════════════
function renderLoginScreen(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainApp').style.display='none';
  users=DB.getAll('users');
  document.getElementById('userSelector').innerHTML=users.filter(u=>u.active).map(u=>`<div class="user-card ${selectedUserId===u.id?'selected':''}" onclick="selectUser(${u.id})"><span class="avatar">${u.role==='admin'?'👑':u.role==='manager'?'🎯':'👤'}</span><div class="name">${u.name}</div><span class="role-badge ${u.role}-badge">${u.role}</span></div>`).join('');
  pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent='';
}
function selectUser(id){selectedUserId=id;pinEntry='';updatePinDisplay();renderLoginScreen()}
function enterPin(d){if(!selectedUserId){document.getElementById('errorMessage').textContent='Select a user first';return}if(pinEntry.length<4){pinEntry+=d;updatePinDisplay();if(pinEntry.length===4)setTimeout(submitPin,180)}}
function clearPin(){pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent=''}
function updatePinDisplay(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.toggle('filled',i<pinEntry.length);d.classList.remove('error')})}
function submitPin(){
  if(!selectedUserId)return;users=DB.getAll('users');const user=users.find(u=>u.id===selectedUserId);
  if(!user||!user.active){document.getElementById('errorMessage').textContent=!user?'User not found':'Account deactivated';pinEntry='';updatePinDisplay();return}
  if(user.pin===pinEntry){
    currentUser=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    const b=user.branchId?DB.getById('branches',user.branchId):null;
    document.getElementById('headerBranch').innerHTML=user.branchId?`<span class="branch-indicator">🏢 ${b?b.name:'Branch'}</span>`:`<span class="admin-indicator">👑 Admin</span>`;
    document.getElementById('headerTitle').textContent=user.branchId?(b?b.name:'Branch')+' POS':'MLEA Headquarters';
    renderSidebar();pinEntry='';selectedUserId=null;updatePinDisplay();document.getElementById('errorMessage').textContent='';
    switchView('dashboard');
    setTimeout(showLowStockToast,600);
  } else {
    document.getElementById('errorMessage').textContent='Incorrect PIN';pinEntry='';updatePinDisplay();
    document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
    setTimeout(()=>document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error')),500);
  }
}

// ═══════════════════ SIDEBAR ═══════════════════
function renderSidebar(){
  const nav=document.getElementById('sidebarNav');if(!currentUser)return;
  const low=getMyData('products').filter(p=>p.active&&p.stock<=lowStockThreshold).length;
  if(currentUser.role==='admin'){

// ═══════════════════ VIEW SWITCHER ═══════════════════
function switchView(view){
  currentView=view;closeSidebar();
  const el=document.getElementById('mainContent');
  el.style.opacity='0';el.style.transform='translateY(8px)';
  setTimeout(()=>{
    switch(view){
      case 'dashboard':renderDashboard(el);break;
      case 'pos':renderPOS(el);break;
      case 'branches':renderBranches(el);break;
      case 'suppliers':renderSuppliers(el);break;
      case 'purchaseOrders':renderPurchaseOrders(el);break;
      case 'allProducts':case 'inventory':renderProducts(el);break;
      case 'allUsers':case 'myUsers':renderUsers(el);break;
      case 'allSales':case 'branchSales':renderSales(el);break;
      case 'voidedSales':renderVoidedSales(el);break;
      case 'settings':renderSettings(el);break;
      case 'reports':renderReports(el);break;
      case 'downloadManager':renderDownloadManager(el);break;
      case 'xReading':renderXReading(el);break;
      case 'zReading':renderZReading(el);break;
      case 'birSettings':renderBIRSettings(el);break;
      default:renderDashboard(el);
    }
    el.style.transition='all .25s ease';el.style.opacity='1';el.style.transform='translateY(0)';
  },80);
}

function addToCart(sku){
  const p=getMyData('products').find(p=>(p.sku===sku||p.barcode===sku)&&p.active);
  if(p&&p.stock>0){const e=cart.find(i=>i.sku===p.sku);e?e.quantity++:cart.push({...p,quantity:1});switchView('pos');}
  else{alert('Product not found or out of stock!')}
}
function removeFromCart(i){cart.splice(i,1);if(cart.length===0){discountAmount=0;discountType='none';}switchView('pos')}
function voidCurrentCart(){if(cart.length===0)return;if(!confirm('Void entire cart?'))return;cart=[];discountAmount=0;discountType='none';switchView('pos');}

function processPayment(method){
  if(cart.length===0){alert('Cart is empty!');return}
  const bir=getBIRSettings();
  const subtotalBeforeDiscount=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
  const effectiveDiscount=Math.min(discountAmount,subtotalBeforeDiscount);
  const subtotal=subtotalBeforeDiscount-effectiveDiscount;
  const vatData=computeVAT(subtotal+subtotal*taxRate,bir.vatType,taxRate);
  const total=vatData.grandTotal;

  // Capture cash tendered & change (cash only; card = exact)
  let cashTendered=0,changeGiven=0;
  if(method==='cash'){
    const inputEl=document.getElementById('cashTendered');
    cashTendered=parseFloat(inputEl?inputEl.value:0)||0;
    if(cashTendered<=0){alert('Please enter the cash amount tendered.');return;}
    if(cashTendered<total){alert('Cash tendered ('+fc(cashTendered)+') is less than total ('+fc(total)+').');return;}
    changeGiven=cashTendered-total;
  } else {
    cashTendered=total;changeGiven=0;
  }

  const orNumber=getNextORNumber();
  const branchObj=currentUser.branchId?DB.getById('branches',currentUser.branchId):null;
  const gat=updateGrandAccumulatedTotal(total);

  const sale={
    date:new Date().toISOString().split('T')[0],
    timestamp:new Date().toISOString(),
    total,subtotal,
    subtotalBeforeDiscount,
    discountAmount:effectiveDiscount,
    discountType,
    tax:vatData.vatAmount,
    vatableSales:vatData.vatableSales,
    vatExemptSales:vatData.vatExempt,
    zeroRatedSales:vatData.zeroRated,
    paymentMethod:method,
    cashTendered,changeGiven,
    cashierId:currentUser.id,cashierName:currentUser.name,
    branchId:currentUser.branchId,branchName:branchObj?branchObj.name:'HQ',
    currency:currentCurrency,
    orNumber,
    vatType:bir.vatType,
    siType:bir.siType,
    grandAccumulatedTotal:gat,
    voided:false,
    items:cart.map(i=>({productId:i.id,name:i.name,quantity:i.quantity,price:i.price,cost:i.cost,vatExempt:i.vatExempt||false,zeroRated:i.zeroRated||false}))
  };
  const saleId=DB.add('sales',sale);
  cart.forEach(item=>{const p=DB.getById('products',item.id);if(p){p.stock-=item.quantity;DB.update('products',p)}});
  logActivity('Sale',orNumber+': '+formatCurrency(total));
  lastSaleData={...sale,id:saleId};
  discountAmount=0;discountType='none';
  showSaleCompleteModal(saleId,total,method,orNumber,cashTendered,changeGiven);
  cart=[];
}

// ═══════════════════ VOID TRANSACTION ═══════════════════
function voidSale(id){
  const sale=DB.getById('sales',id);
  if(!sale){alert('Sale not found');return;}
  if(sale.voided){alert('Already voided');return;}
  const reason=prompt('Reason for void (required):');
  if(!reason||reason.trim()===''){alert('Void reason is required for BIR compliance.');return;}
  if(!confirm(`Void ${sale.orNumber||'#'+id} for ${formatCurrency(sale.total)}?\n\nThis will be logged for BIR audit.`))return;
  // Restore stock
  (sale.items||[]).forEach(item=>{const p=DB.getById('products',item.productId);if(p){p.stock+=item.quantity;DB.update('products',p);}});
  // Mark voided (never delete)
  sale.voided=true;sale.voidReason=reason;sale.voidedBy=currentUser.name;sale.voidedAt=new Date().toISOString();
  DB.update('sales',sale);
  // Adjust GAT
  const settings=DB.getAll('settings');const e=settings.find(s=>s.key==='bir_grand_total');
  if(e){e.value=(Math.max(0,parseFloat(e.value)-sale.total)).toFixed(2);DB.update('settings',e);}
  // Log void
  DB.add('voidedSales',{originalSaleId:id,orNumber:sale.orNumber,amount:sale.total,reason,voidedBy:currentUser.name,timestamp:new Date().toISOString()});
  logActivity('VOID',`${sale.orNumber||'#'+id}: ${formatCurrency(sale.total)} — ${reason}`);
  alert('✓ Transaction voided and logged for BIR audit trail.');
  switchView(currentView);
}

// ═══════════════════ X-READING ═══════════════════
function renderXReading(el){
  const today=new Date().toISOString().split('T')[0];
  const todaySales=DB.getAll('sales').filter(s=>s.date===today&&!s.voided);
  if(currentUser.branchId){todaySales.filter(s=>s.branchId===currentUser.branchId);}
  const bir=getBIRSettings();
  const total=todaySales.reduce((a,s)=>a+s.total,0);
  const vatAmount=todaySales.reduce((a,s)=>a+(s.tax||0),0);
  const vatableSales=todaySales.reduce((a,s)=>a+(s.vatableSales||0),0);
  const vatExempt=todaySales.reduce((a,s)=>a+(s.vatExemptSales||0),0);
  const zeroRated=todaySales.reduce((a,s)=>a+(s.zeroRatedSales||0),0);
  const cash=todaySales.filter(s=>s.paymentMethod==='cash').reduce((a,s)=>a+s.total,0);
  const card=todaySales.filter(s=>s.paymentMethod==='card').reduce((a,s)=>a+s.total,0);
  const discounts=todaySales.reduce((a,s)=>a+(s.discountAmount||0),0);
  const sc=todaySales.filter(s=>s.discountType==='sc').reduce((a,s)=>a+(s.discountAmount||0),0);

  alert('✓ Z-Reading complete. Have a good day!');
}

function saveBIRSettings(){
  const fields=['bir_name','bir_address','bir_tin','bir_accreditation','bir_accr_date','bir_accr_expiry','bir_ptu','bir_si_type','bir_or_prefix','bir_or_from','bir_or_to','bir_vat_type'];
  fields.forEach(f=>{const el=document.getElementById(f);if(el)saveSetting(f,el.value);});
  alert('✓ BIR settings saved!');
  switchView('birSettings');
}

function addUser(){const name=prompt('User name:');if(!name)return;const pin=prompt('4-digit PIN:');if(!pin||pin.length!==4){alert('PIN must be 4 digits!');return;}let role='cashier';if(currentUser.role==='admin'){const chosen=prompt('Select role:\n1=Cashier\n2=Manager\n3=Admin\n\nEnter number:');if(chosen==='2')role='manager';else if(chosen==='3')role='admin';else role='cashier';}DB.add('users',{name,role,active:true,pin,branchId:currentUser.branchId});switchView(currentView);renderLoginScreen();alert('✅ '+name+' created as '+role.toUpperCase()+'\nPIN: '+pin);}
function toggleUser(id){const u=DB.getById('users',id);if(!u)return;if(u.id===currentUser.id){alert('❌ Cannot deactivate yourself.');return;}if(currentUser.role==='manager'&&u.role!=='cashier'){alert('❌ Can only manage cashier accounts.');return;}if(currentUser.role==='manager'&&u.branchId!==currentUser.branchId){alert('❌ Different branch user.');return;}u.active=!u.active;DB.update('users',u);switchView(currentView);renderLoginScreen();}

function exportBIRReport(){
  const thisMonth=new Date().toISOString().substring(0,7);
  const allSales=DB.getAll('sales').filter(s=>s.date.startsWith(thisMonth)&&!s.voided);
  const bir=getBIRSettings();
  let csv='BIR SALES JOURNAL\n';
  csv+=`Business Name: ${bir.registeredName}\n`;
  csv+=`TIN: ${bir.tin}\n`;
  csv+=`Period: ${thisMonth}\n`;
  csv+=`PTU No.: ${bir.ptuNo}\n\n`;
  csv+='OR/SI No.,Date,Cashier,Branch,VATable Sales,VAT Amount,VAT-Exempt,Zero-Rated,Total,Discount Type,Discount Amount,Payment Method\n';
  allSales.forEach(s=>{
    csv+=`${s.orNumber||s.id},${s.date},${s.cashierName||''},${s.branchName||''},${(s.vatableSales||0).toFixed(2)},${(s.tax||0).toFixed(2)},${(s.vatExemptSales||0).toFixed(2)},${(s.zeroRatedSales||0).toFixed(2)},${s.total.toFixed(2)},${s.discountType||'none'},${(s.discountAmount||0).toFixed(2)},${s.paymentMethod}\n`;
  });
  csv+=`\nVoided Transactions\n`;
  csv+='OR/SI No.,Date,Amount,Reason,Voided By\n';
  DB.getAll('sales').filter(s=>s.date.startsWith(thisMonth)&&s.voided).forEach(s=>{
    csv+=`${s.orNumber||s.id},${s.date},${s.total.toFixed(2)},${s.voidReason||''},${s.voidedBy||''}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`BIR_Report_${thisMonth}.csv`;a.click();
}
function exportCSV(type){
  let csv='';const d=new Date().toISOString().split('T')[0];
  if(type==='sales'){
    csv='OR No.,Date,Total,VAT,VATable Sales,Payment,Cashier,Branch,Discount Type,Discount Amount\n';
    getMyData('sales').filter(s=>!s.voided).forEach(s=>csv+=`${s.orNumber||s.id},${s.date},${s.total},${s.tax||0},${s.vatableSales||0},${s.paymentMethod},${s.cashierName||''},${s.branchName||''},${s.discountType||'none'},${s.discountAmount||0}\n`);
  } else {
    csv='SKU,Name,Price,Cost,Stock,Category,Barcode,VAT Status,Branch,Supplier\n';
    const suppliers=DB.getAll('suppliers');
    getMyData('products').forEach(p=>{const s=p.supplierId?suppliers.find(sp=>sp.id===p.supplierId):null;const b=p.branchId?DB.getById('branches',p.branchId):null;csv+=`${p.sku},${p.name},${p.price},${p.cost||0},${p.stock},${p.category||''},${p.barcode||''},${p.vatExempt?'VAT-Exempt':p.zeroRated?'Zero-Rated':'VAT'},${b?b.name:'Global'},${s?s.name:''}\n`;});
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${type}_${d}.csv`;a.click();
}
function downloadFullBackup(){
  const data={};DB.stores.forEach(s=>data[s]=DB.getAll(s));data.backupDate=new Date().toISOString();data.bir=getBIRSettings();data.gat=getGrandAccumulatedTotal();
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`mlea_bir_backup_${new Date().toISOString().split('T')[0]}.json`;a.click();
  alert('✓ Full backup downloaded!');
}

// ═══════════════════ DOWNLOAD MANAGER ═══════════════════
function renderDownloadManager(el){
  el.innerHTML=`
    <div class="card" style="border-left:3px solid var(--accent-gold);"><h4>Backup & Sync Manager</h4><p style="color:var(--text-muted);font-size:.8em;">Download exports for cloud sync or local backup.</p></div>
    <div class="card"><h5>📂 Download Folder Path</h5><input type="text" id="downloadPathInput" value="${downloadPath}" placeholder="e.g., MLEA_Backups"><button class="btn btn-primary btn-sm" onclick="saveDownloadPath()">Save Path</button></div>
    <div class="card"><h5>📥 Export Data</h5>
      <button class="btn btn-primary btn-block" onclick="downloadFullBackup()">📦 Full Backup (JSON)</button>
      <button class="btn btn-success btn-block" onclick="exportCSV('sales')">📊 Sales Report CSV</button>
      <button class="btn btn-warning btn-block" onclick="exportCSV('inventory')">📋 Inventory CSV</button>
      <button class="btn btn-primary btn-block" style="background:linear-gradient(135deg,var(--accent-blue),#5a90d9);" onclick="exportBIRReport()">🏛️ BIR Monthly Report</button>
    </div>
    <div class="card"><h5>☁️ Cloud Sync Guide</h5><p style="font-size:.78em;color:var(--text-muted);line-height:1.6;"><strong style="color:var(--text-secondary);">Google Drive:</strong> Download → save to synced Drive folder<br><strong style="color:var(--text-secondary);">MEGA:</strong> Download → upload to MEGA folder<br><strong style="color:var(--text-secondary);">Tip:</strong> Set browser download path to your cloud folder for automatic sync.</p></div>
    <div class="card" style="border:1px solid rgba(240,101,119,0.25);">
      <h5 style="color:var(--accent-rose);">⚠ Restore from Backup</h5>
      <input type="file" id="restoreFile" accept=".json">
      <button class="btn btn-danger btn-block" onclick="restoreBackup()">🔄 Restore Data</button>
    </div>`;
}
function saveDownloadPath(){downloadPath=document.getElementById('downloadPathInput').value||'MLEA_Backups';const all=DB.getAll('settings'),e=all.find(s=>s.key==='downloadPath');if(e){e.value=downloadPath;DB.update('settings',e)}else{DB.add('settings',{key:'downloadPath',value:downloadPath})}alert('✓ Saved!')}
function restoreBackup(){const file=document.getElementById('restoreFile').files[0];if(!file){alert('Select a file');return}if(!confirm('This will replace all current data. Continue?'))return;const r=new FileReader();r.onload=function(e){try{const d=JSON.parse(e.target.result);DB.stores.forEach(s=>{if(d[s])DB.set(s,d[s])});alert('✓ Restored!');location.reload()}catch(err){alert('✗ Invalid backup file')}};r.readAsText(file)}

// ═══════════════════ SETTINGS ═══════════════════
function renderSettings(el){
  el.innerHTML=`
    <h4>Settings</h4>
    <div class="card"><h5>💱 Currency</h5>
      <input type="text" id="currencySearch" placeholder="🔍 Search currency…" oninput="filterCurrencies(this.value)" style="margin-bottom:8px;">

      </select>
      <p style="font-size:.72em;color:var(--accent-gold);margin-top:6px;font-weight:600;">Selected: ${currencies[currentCurrency]?.flag||'🏳'} ${currencies[currentCurrency]?.name||currentCurrency} (${currencies[currentCurrency]?.symbol||'?'})</p>
    </div>
    <div class="card"><h5>💰 Tax / VAT Rate</h5>

        <button class="btn btn-primary btn-sm" onclick="taxRate=(parseFloat(document.getElementById('taxInput').value)||0)/100;saveSetting('taxRate',taxRate.toString());alert('✓ Saved!')">Save</button>
      </div>
    </div>
    <div class="card"><h5>📦 Low Stock Threshold</h5>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="number" id="lowStockInput" value="${lowStockThreshold}" min="1" max="999" style="margin-bottom:0;">
        <button class="btn btn-primary btn-sm" onclick="lowStockThreshold=parseInt(document.getElementById('lowStockInput').value)||10;saveSetting('lowStockThreshold',lowStockThreshold.toString());alert('✓ Saved!')">Save</button>
      </div>
    </div>
    <div class="card"><h5>🖨 Default Print Mode</h5>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;">
        <button onclick="setPrintMode('ask')" style="padding:12px 8px;border-radius:var(--radius-md);border:2px solid ${defaultPrintMode==='ask'?'var(--accent-gold)':'var(--border)'};background:${defaultPrintMode==='ask'?'var(--accent-gold-soft)':'var(--bg-glass)'};color:${defaultPrintMode==='ask'?'var(--accent-gold)':'var(--text-secondary)'};cursor:pointer;font-family:var(--font-display);font-size:.8em;font-weight:700;transition:all .2s;">❓ Ask Every Time</button>
        <button onclick="setPrintMode('thermal')" style="padding:12px 8px;border-radius:var(--radius-md);border:2px solid ${defaultPrintMode==='thermal'?'var(--accent-emerald)':'var(--border)'};background:${defaultPrintMode==='thermal'?'var(--accent-emerald-soft)':'var(--bg-glass)'};color:${defaultPrintMode==='thermal'?'var(--accent-emerald)':'var(--text-secondary)'};cursor:pointer;font-family:var(--font-display);font-size:.8em;font-weight:700;transition:all .2s;">🧾 Auto Thermal</button>
        <button onclick="setPrintMode('a4')" style="padding:12px 8px;border-radius:var(--radius-md);border:2px solid ${defaultPrintMode==='a4'?'var(--accent-blue)':'var(--border)'};background:${defaultPrintMode==='a4'?'var(--accent-blue-soft)':'var(--bg-glass)'};color:${defaultPrintMode==='a4'?'var(--accent-blue)':'var(--text-secondary)'};cursor:pointer;font-family:var(--font-display);font-size:.8em;font-weight:700;transition:all .2s;">📄 Auto A4</button>
        <button onclick="setPrintMode('none')" style="padding:12px 8px;border-radius:var(--radius-md);border:2px solid ${defaultPrintMode==='none'?'var(--accent-rose)':'var(--border)'};background:${defaultPrintMode==='none'?'var(--accent-rose-soft)':'var(--bg-glass)'};color:${defaultPrintMode==='none'?'var(--accent-rose)':'var(--text-secondary)'};cursor:pointer;font-family:var(--font-display);font-size:.8em;font-weight:700;transition:all .2s;">✕ No Print</button>
      </div>
      <p style="font-size:.7em;color:var(--accent-gold);font-weight:600;">Currently: ${defaultPrintMode==='ask'?'❓ Ask Every Time':defaultPrintMode==='thermal'?'🧾 Auto Thermal':defaultPrintMode==='a4'?'📄 Auto A4':'✕ No Print'}</p>

    <div class="card" style="border:1px solid rgba(212,168,83,0.3);">

      <p style="font-size:.78em;color:var(--text-muted);margin-bottom:10px;">Configure TIN, accreditation, PTU, and VAT settings.</p>
      <button class="btn btn-primary btn-block" onclick="switchView('birSettings')">Go to BIR Setup →</button>

}
function saveSetting(k,v){const all=DB.getAll('settings'),e=all.find(s=>s.key===k);if(e){e.value=v;DB.update('settings',e)}else{DB.add('settings',{key:k,value:v})}}
function setPrintMode(mode){defaultPrintMode=mode;saveSetting('defaultPrintMode',mode);switchView('settings')}
function filterCurrencies(query){
  const sel=document.getElementById('currencySelect');if(!sel)return;
  const q=query.toLowerCase();
  sel.innerHTML=Object.entries(currencies).filter(([c,v])=>v.name.toLowerCase().includes(q)||c.toLowerCase().includes(q)||v.symbol.toLowerCase().includes(q)).map(([c,v])=>`<option value="${c}" ${currentCurrency===c?'selected':''}>${v.flag} ${v.name} (${v.symbol})</option>`).join('');
}

// ═══════════════════ LOW STOCK ═══════════════════
function getLowStockItems(){return getMyData('products').filter(p=>p.active&&p.stock<=lowStockThreshold);}
function showLowStockToast(){
  const low=getLowStockItems();if(low.length===0)return;
  const existing=document.getElementById('lowStockToast');if(existing)existing.remove();
  const toast=document.createElement('div');toast.id='lowStockToast';
  toast.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid rgba(240,101,119,0.4);border-radius:var(--radius-md);padding:14px 18px;z-index:9999;display:flex;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,0.5);animation:slideUp .4s cubic-bezier(0.22,1,0.36,1);max-width:320px;width:90%;';
  toast.innerHTML=`<span style="font-size:1.4em;">⚠️</span><div style="flex:1;"><div style="font-family:var(--font-display);font-weight:700;font-size:.88em;color:var(--accent-rose);">${low.length} Low Stock Item${low.length>1?'s':''}</div><div style="font-size:.72em;color:var(--text-muted);margin-top:2px;">${low.slice(0,2).map(p=>`${p.name} (${p.stock} left)`).join(', ')}${low.length>2?` +${low.length-2} more`:''}</div></div><button onclick="this.parentElement.remove();switchView(currentUser.role==='cashier'?'dashboard':'${currentUser&&currentUser.role==='admin'?'allProducts':'inventory'}');" style="background:var(--accent-rose-soft);border:1px solid rgba(240,101,119,0.3);color:var(--accent-rose);border-radius:var(--radius-sm);padding:6px 10px;cursor:pointer;font-size:.7em;font-weight:700;font-family:var(--font-display);white-space:nowrap;">View →</button><button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1em;padding:2px 4px;">✕</button>`;
  document.body.appendChild(toast);
  setTimeout(()=>{if(toast.parentElement){toast.style.opacity='0';toast.style.transition='opacity .4s';setTimeout(()=>toast.remove(),400)}},7000);
}

// ═══════════════════ MODAL SYSTEM ═══════════════════
function showModal(type,id){
  const suppliers=DB.getAll('suppliers');
  let html='',sup=`<select id="modalSelect"><option value="">No Supplier</option>${suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>`;
  const vatTypeSelect=`<select id="modalVatType"><option value="vat">VAT (Standard 12%)</option><option value="exempt">VAT-Exempt</option><option value="zero">Zero-Rated</option></select>`;
  switch(type){
    case 'addBranch':
      html=`<h4>Add Branch</h4><input type="text" id="modalInput1" placeholder="Branch Name *"><input type="text" id="modalInput2" placeholder="Address"><input type="tel" id="modalInput3" placeholder="Phone"><button class="btn btn-primary btn-block" onclick="addBranch()">Create Branch</button>`;
      break;
    case 'addSupplier':
      html=`<h4>Add Supplier</h4><input type="text" id="modalInput1" placeholder="Supplier Name *"><input type="text" id="modalInput2" placeholder="Contact Person"><input type="tel" id="modalInput3" placeholder="Phone"><input type="email" id="modalInput4" placeholder="Email"><input type="text" id="modalInput5" placeholder="Address"><button class="btn btn-primary btn-block" onclick="addSupplier()">Save Supplier</button>`;
      break;
    case 'editSupplier':{const sp=DB.getById('suppliers',id);html=`<h4>Edit Supplier</h4><input type="text" id="modalInput1" value="${sp.name}" placeholder="Name *"><input type="text" id="modalInput2" value="${sp.contact||''}" placeholder="Contact"><input type="tel" id="modalInput3" value="${sp.phone||''}" placeholder="Phone"><input type="email" id="modalInput4" value="${sp.email||''}" placeholder="Email"><input type="text" id="modalInput5" value="${sp.address||''}" placeholder="Address"><button class="btn btn-primary btn-block" onclick="editSupplier(${id})">Save Changes</button>`;break;}
    case 'addProduct':{
      const branchSel=currentUser.role==='admin'?`<select id="modalBranchSelect"><option value="">🌐 All Branches (Global)</option>${DB.getAll('branches').map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select>`:'';
      html=`<h4>Add Product</h4><input type="text" id="modalInput1" placeholder="Product Name *"><input type="number" id="modalInput2" placeholder="Selling Price *" step="0.01"><input type="number" id="modalInput3" placeholder="Cost Price" step="0.01"><input type="number" id="modalInput4" placeholder="Stock Quantity" value="0"><input type="text" id="modalInput5" placeholder="Category" value="General"><input type="text" id="modalInput6" placeholder="Barcode (for scanner)">${branchSel}${vatTypeSelect}${sup}<button class="btn btn-primary btn-block" onclick="addProduct()">Save Product</button>`;
      break;}
    case 'editProduct':{const p=DB.getById('products',id);const currentVat=p.vatExempt?'exempt':p.zeroRated?'zero':'vat';html=`<h4>Edit Product</h4><input type="text" id="modalInput1" value="${p.name}" placeholder="Name *"><input type="number" id="modalInput2" value="${p.price}" placeholder="Price *" step="0.01"><input type="number" id="modalInput3" value="${p.cost||0}" placeholder="Cost" step="0.01"><input type="number" id="modalInput4" value="${p.stock}" placeholder="Stock"><input type="text" id="modalInput5" value="${p.category||''}" placeholder="Category"><input type="text" id="modalInput6" value="${p.barcode||''}" placeholder="Barcode"><select id="modalVatType"><option value="vat" ${currentVat==='vat'?'selected':''}>VAT (12%)</option><option value="exempt" ${currentVat==='exempt'?'selected':''}>VAT-Exempt</option><option value="zero" ${currentVat==='zero'?'selected':''}>Zero-Rated</option></select><select id="modalSelect"><option value="">No Supplier</option>${suppliers.map(s=>`<option value="${s.id}" ${p.supplierId===s.id?'selected':''}>${s.name}</option>`).join('')}</select><button class="btn btn-primary btn-block" onclick="editProduct(${id})">Save Changes</button>`;break;}
    case 'addPO':
      html=`<h4>New Purchase Order</h4><select id="modalSelect"><option value="">Select Supplier *</option>${suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select><input type="text" id="modalInput1" placeholder="Item Name"><input type="number" id="modalInput2" placeholder="Quantity" value="1"><input type="number" id="modalInput3" placeholder="Cost per Unit" step="0.01"><button class="btn btn-primary btn-block" onclick="addPO()">Create Order</button>`;
      break;
  }
  document.getElementById('modalContent').innerHTML=html+'<button class="btn btn-danger btn-block" onclick="closeModal()" style="margin-top:8px;">Cancel</button>';
  document.getElementById('modal').classList.add('active');
}
function closeModal(){document.getElementById('modal').classList.remove('active')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){
  if(document.getElementById('loginScreen').style.display!=='none'){
    if(e.key>='0'&&e.key<='9')enterPin(e.key);
    else if(e.key==='Enter')submitPin();
    else if(e.key==='Backspace'){pinEntry=pinEntry.slice(0,-1);updatePinDisplay();}
  }
  if(e.key==='Escape')closeModal();
});

showLicenseGate();
