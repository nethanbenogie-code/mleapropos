<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MLEA POS - Multi-Branch</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
        .app-container{max-width:480px;margin:0 auto;min-height:100vh;background:#16213e;position:relative}
        @media(min-width:768px){.app-container{max-width:768px}}
        #loginScreen{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:15px}
        .login-card{background:#1e2a4a;border-radius:20px;padding:20px;width:100%;max-width:360px;border:1px solid #2a3a5e}
        .login-logo{text-align:center;margin-bottom:20px}
        .login-logo h1{color:#9b8fff;font-size:1.8em}.login-logo p{color:#a0a0b0;font-size:.85em}
        .user-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px;max-height:200px;overflow-y:auto}
        .user-card{background:#16213e;border:2px solid #2a3a5e;border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
        .user-card.selected{border-color:#7c6fff;background:#0f3460}.user-card .avatar{font-size:1.8em}.user-card .name{font-size:.7em;color:#e0e0e0;margin-top:3px}
        .role-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65em;margin-top:3px}
        .admin-badge{background:#7c6fff;color:#fff}.manager-badge{background:#2ed573;color:#fff}.cashier-badge{background:#ffa502;color:#fff}
        .section-label{text-align:center;color:#e0e0e0;font-size:.9em;margin:10px 0}
        .pin-display{display:flex;justify-content:center;gap:12px;margin:15px 0}
        .pin-dot{width:14px;height:14px;border-radius:50%;background:#2a3a5e;transition:all .3s}
        .pin-dot.filled{background:#7c6fff;box-shadow:0 0 8px #7c6fff}.pin-dot.error{background:#ff4757}
        .error-msg{color:#ff4757;text-align:center;font-size:.8em;min-height:18px;margin:5px 0}
        .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .pin-btn{background:#0f3460;border:1px solid #2a3a5e;border-radius:10px;padding:16px;font-size:1.3em;cursor:pointer;color:#e0e0e0}
        .pin-btn:active{background:#7c6fff}.pin-btn.clear{background:#ff4757;color:#fff;font-size:.9em}.pin-btn.submit{background:#2ed573;color:#fff;font-size:.9em}
        #mainApp{display:none}
        .header{background:#1a1a2e;padding:12px 15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a3a5e}
        .header h1{color:#9b8fff;font-size:1.2em}.header-right{display:flex;align-items:center;gap:10px;font-size:.8em;color:#a0a0b0}
        .logout-btn{background:#ff4757;color:#fff;border:none;padding:6px 12px;border-radius:15px;cursor:pointer;font-size:.8em}
        .hamburger{background:none;border:none;color:#e0e0e0;font-size:22px;cursor:pointer}
        .branch-indicator{background:rgba(46,213,115,0.2);color:#2ed573;padding:4px 10px;border-radius:15px;font-size:.75em}
        .admin-indicator{background:rgba(124,111,255,0.2);color:#9b8fff;padding:4px 10px;border-radius:15px;font-size:.75em}
        #mainContent{padding:10px;min-height:60vh}
        .card{background:#1e2a4a;border-radius:10px;padding:15px;margin:8px 0;border:1px solid #2a3a5e}
        .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        .metric-card{background:#16213e;border-radius:8px;padding:12px;text-align:center;border:1px solid #2a3a5e}
        .metric-value{font-size:1.2em;font-weight:bold;color:#9b8fff}.metric-label{font-size:.7em;color:#a0a0b0;margin-top:4px}
        .btn{padding:10px 20px;border:none;border-radius:20px;cursor:pointer;font-size:.85em;font-weight:500;transition:all .2s}
        .btn:active{transform:scale(.95)}.btn-primary{background:#7c6fff;color:#fff}.btn-success{background:#2ed573;color:#fff}.btn-danger{background:#ff4757;color:#fff}.btn-warning{background:#ffa502;color:#fff}.btn-sm{padding:5px 10px;font-size:.7em}.btn-xs{padding:3px 8px;font-size:.65em}.btn-block{width:100%;margin-bottom:5px}
        input,select,textarea{width:100%;padding:10px;border:2px solid #2a3a5e;border-radius:20px;font-size:.9em;background:#0f3460;color:#e0e0e0;outline:none;font-family:inherit;margin-bottom:5px}
        input:focus,select:focus,textarea:focus{border-color:#7c6fff}input::placeholder{color:#6a6a7a}select option{background:#1e2a4a;color:#e0e0e0}
        table{width:100%;border-collapse:collapse;font-size:.8em}
        th{background:#0f3460;color:#9b8fff;padding:8px;text-align:left}td{padding:8px;border-bottom:1px solid #2a3a5e;color:#a0a0b0}
        .product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
        .product-card{background:#16213e;border-radius:8px;padding:12px;cursor:pointer;border:1px solid #2a3a5e;transition:all .2s}
        .product-card:active{transform:scale(.96)}
        .cart-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a3a5e;gap:5px}
        .sidebar{position:fixed;left:-280px;top:0;bottom:0;width:260px;background:#1e2a4a;z-index:1000;transition:left .3s;overflow-y:auto;border-right:1px solid #2a3a5e}
        .sidebar.active{left:0}.sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999}.sidebar-overlay.active{display:block}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;justify-content:center;align-items:center;padding:15px}
        .modal.active{display:flex}.modal-content{background:#1e2a4a;border-radius:15px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;border:1px solid #2a3a5e}
        .tabs{display:flex;gap:3px;margin:10px 0;background:#16213e;border-radius:10px;padding:3px}
        .tab{flex:1;padding:8px;text-align:center;border-radius:8px;cursor:pointer;font-size:.75em;color:#a0a0b0;transition:all .2s}
        .tab.active{background:#7c6fff;color:#fff}
        .alert{padding:10px;border-radius:8px;margin:8px 0}
        .alert-warning{background:rgba(255,165,2,.15);border:1px solid #ffa502;color:#ffa502}
        .alert-danger{background:rgba(255,71,87,.15);border:1px solid #ff4757;color:#ff4757}
        .empty-state{text-align:center;padding:40px;color:#a0a0b0}
        .stock-low{color:#ff4757;font-weight:bold}
    </style>
</head>
<body>
    <div class="app-container">
        <!-- LOGIN SCREEN -->
        <div id="loginScreen">
            <div class="login-card">
                <div class="login-logo"><h1>🏪 MLEA POS</h1><p>Multi-Branch System</p></div>
                <div class="section-label">👤 Select User</div>
                <div class="user-selector" id="userSelector"></div>
                <div class="section-label">🔢 Enter PIN</div>
                <div class="pin-display" id="pinDisplay"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
                <div class="error-msg" id="errorMessage"></div>
                <div class="pin-pad">
                    <button class="pin-btn" onclick="enterPin('1')">1</button><button class="pin-btn" onclick="enterPin('2')">2</button><button class="pin-btn" onclick="enterPin('3')">3</button>
                    <button class="pin-btn" onclick="enterPin('4')">4</button><button class="pin-btn" onclick="enterPin('5')">5</button><button class="pin-btn" onclick="enterPin('6')">6</button>
                    <button class="pin-btn" onclick="enterPin('7')">7</button><button class="pin-btn" onclick="enterPin('8')">8</button><button class="pin-btn" onclick="enterPin('9')">9</button>
                    <button class="pin-btn clear" onclick="clearPin()">Clear</button><button class="pin-btn" onclick="enterPin('0')">0</button><button class="pin-btn submit" onclick="submitPin()">→</button>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="mainApp">
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
            <div class="sidebar" id="sidebar">
                <div style="padding:15px;background:#1a1a2e;border-bottom:1px solid #2a3a5e;">
                    <h3 style="color:#9b8fff;">MLEA POS</h3>
                    <p style="font-size:.75em;color:#a0a0b0;" id="sidebarUserInfo"></p>
                    <span class="role-badge" id="sidebarRole"></span>
                    <span id="sidebarBranch" style="display:none;margin-left:5px;font-size:.7em;color:#2ed573;"></span>
                </div>
                <div style="padding:10px;display:flex;flex-direction:column;gap:3px;" id="sidebarNav"></div>
            </div>
            <div class="header">
                <button class="hamburger" onclick="openSidebar()">☰</button>
                <h1 id="headerTitle">MLEA POS</h1>
                <div class="header-right">
                    <span id="headerBranch"></span>
                    <span id="headerUser"></span>
                    <button class="logout-btn" onclick="logout()">🚪</button>
                </div>
            </div>
            <div id="mainContent"><p style="text-align:center;padding:40px;color:#a0a0b0;">Select user and enter PIN to start...</p></div>
        </div>
    </div>
    <div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

    <script>
    // ==================== DATABASE ====================
    const DB = {
        stores: ['products','sales','suppliers','expenses','users','settings','inventoryLogs','branches','activityLogs'],
        init() {
            this.stores.forEach(s => {
                if (!localStorage.getItem('mlea_' + s)) localStorage.setItem('mlea_' + s, '[]');
            });
        },
        getAll(key) { return JSON.parse(localStorage.getItem('mlea_' + key) || '[]'); },
        set(key, data) { localStorage.setItem('mlea_' + key, JSON.stringify(data)); },
        add(key, item) {
            const items = this.getAll(key);
            item.id = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
            item.createdAt = new Date().toISOString();
            items.push(item);
            this.set(key, items);
            return item.id;
        },
        update(key, item) {
            const items = this.getAll(key);
            const idx = items.findIndex(i => i.id === item.id);
            if (idx !== -1) { item.updatedAt = new Date().toISOString(); items[idx] = item; }
            this.set(key, items);
        },
        delete(key, id) { this.set(key, this.getAll(key).filter(i => i.id !== id)); },
        getById(key, id) { return this.getAll(key).find(i => i.id === id); },
        getByBranch(key, branchId) { return this.getAll(key).filter(i => i.branchId === branchId); }
    };
    DB.init();

    // ==================== CURRENCIES ====================
    const currencies = {
        USD: { symbol: '$', name: 'US Dollar', flag: '🇺🇸', decimals: 2 },
        PHP: { symbol: '₱', name: 'Philippine Peso', flag: '🇵🇭', decimals: 2 },
        EUR: { symbol: '€', name: 'Euro', flag: '🇪🇺', decimals: 2 },
        GBP: { symbol: '£', name: 'British Pound', flag: '🇬🇧', decimals: 2 },
        JPY: { symbol: '¥', name: 'Japanese Yen', flag: '🇯🇵', decimals: 0 },
        INR: { symbol: '₹', name: 'Indian Rupee', flag: '🇮🇳', decimals: 2 },
        CNY: { symbol: '¥', name: 'Chinese Yuan', flag: '🇨🇳', decimals: 2 },
        AUD: { symbol: 'A$', name: 'Australian Dollar', flag: '🇦🇺', decimals: 2 },
        SGD: { symbol: 'S$', name: 'Singapore Dollar', flag: '🇸🇬', decimals: 2 },
        MYR: { symbol: 'RM', name: 'Malaysian Ringgit', flag: '🇲🇾', decimals: 2 },
        AED: { symbol: 'د.إ', name: 'UAE Dirham', flag: '🇦🇪', decimals: 2 }
    };

    // ==================== STATE ====================
    let currentUser = null, currentView = 'dashboard', currentCurrency = 'PHP';
    let taxRate = 0.12, taxType = 'standard', taxName = 'VAT';
    let discountRate = 0, discountType = 'percent', maxDiscount = 20, requireApproval = 10;
    let cart = [], selectedUserId = null, pinEntry = '', users = [], branches = [];
    let receiptFooter = 'Thank you for your business!', businessName = 'MLEA POS', businessAddress = '';

    function formatCurrency(a) {
        const c = currencies[currentCurrency];
        return c.decimals === 0 ? c.symbol + ' ' + Math.round(a).toLocaleString() : c.symbol + a.toFixed(2);
    }

    function getMyData(key) {
        const all = DB.getAll(key);
        if (currentUser && currentUser.role === 'admin') return all;
        if (currentUser && currentUser.branchId) return all.filter(i => i.branchId === currentUser.branchId);
        return all.filter(i => !i.branchId);
    }

    function logActivity(action, details) {
        if (!currentUser) return;
        DB.add('activityLogs', {
            userId: currentUser.id, userName: currentUser.name,
            userRole: currentUser.role, branchId: currentUser.branchId,
            action: action, details: details, timestamp: new Date().toISOString()
        });
    }

    function saveSetting(key, value) {
        const all = DB.getAll('settings');
        const existing = all.find(s => s.key === key);
        if (existing) { existing.value = value; DB.update('settings', existing); }
        else { DB.add('settings', { key, value }); }
    }

    function loadSettings() {
        DB.getAll('settings').forEach(s => {
            if (s.key === 'currency') currentCurrency = s.value;
            if (s.key === 'taxRate') taxRate = parseFloat(s.value);
            if (s.key === 'taxName') taxName = s.value;
            if (s.key === 'receiptFooter') receiptFooter = s.value;
            if (s.key === 'businessName') businessName = s.value;
            if (s.key === 'businessAddress') businessAddress = s.value;
        });
    }

    // ==================== INIT ====================
    function initApp() {
        console.log('Initializing MLEA POS...');
        users = DB.getAll('users');
        branches = DB.getAll('branches');

        if (branches.length === 0) {
            DB.add('branches', { name: 'Main Branch', address: 'Head Office', phone: '555-0000' });
            branches = DB.getAll('branches');
        }
        if (users.length === 0) {
            DB.add('users', { name: 'Admin', role: 'admin', active: true, pin: '1234', branchId: null });
            users = DB.getAll('users');
        }
        if (DB.getAll('products').length === 0) {
            DB.add('products', { sku: 'SKU001', name: 'Sample Product', price: 99.99, stock: 50, category: 'General', active: true, barcode: '123456789', branchId: null });
        }

        loadSettings();
        console.log('Users:', users.length, 'Branches:', branches.length);
        renderLoginScreen();
    }

    // ==================== LOGIN ====================
    function renderLoginScreen() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        users = DB.getAll('users');
        const activeUsers = users.filter(u => u.active);
        document.getElementById('userSelector').innerHTML = activeUsers.map(u => `
            <div class="user-card ${selectedUserId === u.id ? 'selected' : ''}" onclick="selectUser(${u.id})">
                <div class="avatar">${u.role === 'admin' ? '👑' : u.role === 'manager' ? '👨‍💼' : '👤'}</div>
                <div class="name">${u.name}</div>
                <span class="role-badge ${u.role}-badge">${u.role}</span>
            </div>
        `).join('');
    }

    function selectUser(id) { selectedUserId = id; pinEntry = ''; updatePinDisplay(); document.getElementById('errorMessage').textContent = ''; renderLoginScreen(); }
    function enterPin(d) { if (!selectedUserId) { document.getElementById('errorMessage').textContent = 'Select user first'; return; } if (pinEntry.length < 4) { pinEntry += d; updatePinDisplay(); } }
    function clearPin() { pinEntry = ''; updatePinDisplay(); }
    function updatePinDisplay() { document.querySelectorAll('.pin-dot').forEach((d, i) => { d.classList.toggle('filled', i < pinEntry.length); d.classList.remove('error'); }); }

    function submitPin() {
        if (!selectedUserId) return;
        const user = users.find(u => u.id === selectedUserId);
        if (user && user.pin === pinEntry) {
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('headerUser').textContent = user.name;
            document.getElementById('sidebarUserInfo').textContent = user.name + ' (' + user.role + ')';
            document.getElementById('sidebarRole').textContent = user.role;
            document.getElementById('sidebarRole').className = 'role-badge ' + user.role + '-badge';

            if (user.branchId) {
                const branch = DB.getById('branches', user.branchId);
                document.getElementById('headerBranch').innerHTML = `<span class="branch-indicator">🏢 ${branch?.name || 'Branch'}</span>`;
                document.getElementById('headerTitle').textContent = (branch?.name || 'Branch') + ' POS';
                document.getElementById('sidebarBranch').textContent = branch?.name || '';
                document.getElementById('sidebarBranch').style.display = 'inline';
            } else {
                document.getElementById('headerBranch').innerHTML = '<span class="admin-indicator">👑 Admin</span>';
                document.getElementById('headerTitle').textContent = 'MLEA HQ Admin';
                document.getElementById('sidebarBranch').style.display = 'none';
            }
            document.getElementById('headerCurrency').textContent = currencies[currentCurrency].flag + ' ' + currentCurrency;
            renderSidebar();
            pinEntry = ''; selectedUserId = null; updatePinDisplay();
            switchView('dashboard');
            console.log('Logged in as:', user.name, user.role);
        } else {
            document.getElementById('errorMessage').textContent = 'Wrong PIN!';
            pinEntry = ''; updatePinDisplay();
            document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
            setTimeout(() => document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error')), 400);
        }
    }

    function renderSidebar() {
        const nav = document.getElementById('sidebarNav');
        if (currentUser.role === 'admin') {
            nav.innerHTML = `
                <button class="nav-btn" onclick="switchView('dashboard')">📊 HQ Dashboard</button>
                <button class="nav-btn" onclick="switchView('branches')">🏢 Branches</button>
                <button class="nav-btn" onclick="switchView('allProducts')">📦 All Products</button>
                <button class="nav-btn" onclick="switchView('allUsers')">👥 All Users</button>
                <button class="nav-btn" onclick="switchView('allSales')">💰 All Sales</button>
                <button class="nav-btn" onclick="switchView('settings')">⚙️ Settings</button>
                <button class="nav-btn" onclick="switchView('reports')">💾 Reports</button>`;
        } else if (currentUser.role === 'manager') {
            nav.innerHTML = `
                <button class="nav-btn" onclick="switchView('dashboard')">📊 Dashboard</button>
                <button class="nav-btn" onclick="switchView('pos')">💻 POS Terminal</button>
                <button class="nav-btn" onclick="switchView('inventory')">📦 My Products</button>
                <button class="nav-btn" onclick="switchView('myUsers')">👥 My Cashiers</button>
                <button class="nav-btn" onclick="switchView('myActivity')">📋 Activity Log</button>
                <button class="nav-btn" onclick="switchView('branchSales')">💰 Sales</button>
                <button class="nav-btn" onclick="switchView('branchBackup')">💾 Database</button>
                <button class="nav-btn" onclick="switchView('settings')">⚙️ Settings</button>`;
        } else {
            nav.innerHTML = `
                <button class="nav-btn" onclick="switchView('dashboard')">📊 Dashboard</button>
                <button class="nav-btn" onclick="switchView('pos')">💻 POS Terminal</button>`;
        }
    }

    function logout() {
        if (cart.length > 0 && !confirm('Cart has items. Logout?')) return;
        currentUser = null; cart = []; discountRate = 0;
        document.getElementById('mainApp').style.display = 'none';
        closeSidebar(); renderLoginScreen();
        console.log('Logged out');
    }

    function openSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('sidebarOverlay').classList.add('active'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('sidebarOverlay').classList.remove('active'); }

    // ==================== VIEW SWITCHER ====================
    function switchView(view) {
        currentView = view; closeSidebar();
        const el = document.getElementById('mainContent');
        console.log('Switching to:', view);
        switch (view) {
            case 'dashboard': renderDashboard(el); break;
            case 'pos': renderPOS(el); break;
            case 'branches': renderBranches(el); break;
            case 'allProducts': renderAllProducts(el); break;
            case 'inventory': renderInventory(el); break;
            case 'allUsers': renderAllUsers(el); break;
            case 'myUsers': renderMyUsers(el); break;
            case 'myActivity': renderMyActivity(el); break;
            case 'allSales': renderAllSales(el); break;
            case 'branchSales': renderBranchSales(el); break;
            case 'branchBackup': renderBranchBackup(el); break;
            case 'settings': renderSettings(el); break;
            case 'reports': renderReports(el); break;
            default: renderDashboard(el);
        }
    }

    // ==================== DASHBOARD ====================
    function renderDashboard(el) {
        const today = new Date().toISOString().split('T')[0];
        const thisMonth = today.substring(0, 7);
        const mySales = getMyData('sales');
        const myProducts = getMyData('products');
        const todaySales = mySales.filter(s => s.date === today).reduce((s, i) => s + i.total, 0);
        const monthSales = mySales.filter(s => s.date.startsWith(thisMonth)).reduce((s, i) => s + i.total, 0);
        const lowStock = myProducts.filter(p => p.active && p.stock < 10).length;

        if (currentUser.role === 'admin') {
            const allBranches = DB.getAll('branches');
            const allSales = DB.getAll('sales');
            const totalMonth = allSales.filter(s => s.date.startsWith(thisMonth)).reduce((s, i) => s + i.total, 0);
            el.innerHTML = `
                <div class="metrics">
                    <div class="metric-card"><div class="metric-value">${allBranches.length}</div><div class="metric-label">Branches</div></div>
                    <div class="metric-card"><div class="metric-value">${formatCurrency(totalMonth)}</div><div class="metric-label">Total Revenue</div></div>
                    <div class="metric-card"><div class="metric-value">${DB.getAll('users').length}</div><div class="metric-label">Users</div></div>
                    <div class="metric-card"><div class="metric-value">${DB.getAll('products').length}</div><div class="metric-label">Products</div></div>
                </div>
                <div class="card"><h4>🏢 Branch Overview</h4>
                    ${allBranches.map(b => {
                        const bSales = DB.getByBranch('sales', b.id).filter(s => s.date.startsWith(thisMonth)).reduce((s, i) => s + i.total, 0);
                        return `<div style="padding:8px 0;border-bottom:1px solid #2a3a5e;cursor:pointer;" onclick="switchView('branches')">
                            <strong>🏢 ${b.name}</strong> <span style="float:right;color:#9b8fff;">${formatCurrency(bSales)}</span>
                        </div>`;
                    }).join('')}
                </div>`;

    // ==================== POS ====================
    function renderPOS(el) {
        const myProducts = getMyData('products').filter(p => p.active);

        const total = subtotal + (subtotal * taxRate);
        el.innerHTML = `
            <input type="text" id="scanInput" placeholder="🔍 Scan barcode or search..." onkeypress="if(event.key==='Enter'){addToCart(event.target.value);event.target.value='';}">
            <div class="product-grid">${myProducts.slice(0, 8).map(p => `
                <div class="product-card" onclick="addToCart('${p.sku}')"><strong>${p.name}</strong><div style="color:#9b8fff;">${formatCurrency(p.price)}</div><small>Stock: ${p.stock}</small></div>
            `).join('')}</div>
            <div class="card" style="margin-top:10px;"><h4>🛒 Cart (${cart.length})</h4>
                ${cart.map((item, i) => `<div class="cart-item"><span>${item.name} x${item.quantity}</span><span>${formatCurrency(item.price * item.quantity)}</span><button class="btn btn-danger btn-xs" onclick="removeFromCart(${i})">✕</button></div>`).join('') || '<p style="color:#a0a0b0;">Empty</p>'}

                    <button class="btn btn-success" onclick="processPayment('cash')">💵 Cash</button>
                    <button class="btn btn-primary" onclick="processPayment('card')">💳 Card</button>
                </div></div>`;
        setTimeout(() => { const si = document.getElementById('scanInput'); if (si) si.focus(); }, 100);
    }

    function addToCart(sku) {
        const product = getMyData('products').find(p => (p.sku === sku || p.barcode === sku) && p.active);
        if (product && product.stock > 0) {
            const existing = cart.find(i => i.sku === product.sku);
            if (existing) existing.quantity++; else cart.push({ ...product, quantity: 1 });
            switchView('pos');
        } else { alert('Product not found or out of stock!'); }
    }
    function removeFromCart(i) { cart.splice(i, 1); switchView('pos'); }

    function processPayment(method) {
        if (cart.length === 0) { alert('Cart empty!'); return; }
        const subtotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
        const total = subtotal + (subtotal * taxRate);
        const sale = {
            date: new Date().toISOString().split('T')[0], total, subtotal, tax: subtotal * taxRate,
            paymentMethod: method, cashierId: currentUser.id, cashierName: currentUser.name,
            branchId: currentUser.branchId, currency: currentCurrency
        };
        const saleId = DB.add('sales', sale);
        cart.forEach(item => {
            const product = DB.getById('products', item.id);
            if (product) { product.stock -= item.quantity; DB.update('products', product); }
        });
        logActivity('Sale', `#${saleId}: ${formatCurrency(total)} via ${method}`);
        document.getElementById('modalContent').innerHTML = `<div style="text-align:center;"><h3>✅ Sale Complete!</h3><h2 style="color:#9b8fff;">${formatCurrency(total)}</h2><p>Receipt #${saleId}</p></div>`;
        document.getElementById('modal').classList.add('active');
        cart = []; discountRate = 0;
        setTimeout(() => { document.getElementById('modal').classList.remove('active'); switchView('dashboard'); }, 2000);
    }

    function backupBranchData() {

    function performBranchRestore() {
        const file = document.getElementById('backupFile').files[0];
        if (!file) { alert('Select a file!'); return; }
        if (!confirm('Replace all branch data?')) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const data = JSON.parse(ev.target.result);
            ['products', 'sales', 'users', 'activityLogs'].forEach(s => {
                const all = DB.getAll(s).filter(i => i.branchId !== currentUser.branchId);
                const restored = (data[s] || []).map(i => { i.branchId = currentUser.branchId; return i; });
                DB.set(s, [...all, ...restored]);
            });
            alert('✅ Restored! Reloading...'); closeModal(); location.reload();
        };
        reader.readAsText(file);
    }

    function clearBranchData() {
        if (!confirm('⚠️ DELETE all branch data?')) return;

// ==================== ADMIN REPORTS ====================
function renderAdminReports(el, today, thisMonth, lastMonth) {
    const allSales = DB.getAll('sales');
    const allBranches = DB.getAll('branches');
    const allProducts = DB.getAll('products');
    const allUsers = DB.getAll('users');
    
    // Calculate totals
    const todaySales = allSales.filter(s => s.date === today).reduce((s, i) => s + i.total, 0);
    const monthSales = allSales.filter(s => s.date.startsWith(thisMonth)).reduce((s, i) => s + i.total, 0);
    const lastMonthSales = allSales.filter(s => s.date.startsWith(lastMonth)).reduce((s, i) => s + i.total, 0);
    const monthTax = allSales.filter(s => s.date.startsWith(thisMonth)).reduce((s, i) => s + i.tax, 0);
    
    // Payment method breakdown
    const cashSales = allSales.filter(s => s.date.startsWith(thisMonth) && s.paymentMethod === 'cash').reduce((s, i) => s + i.total, 0);
    const cardSales = allSales.filter(s => s.date.startsWith(thisMonth) && s.paymentMethod === 'card').reduce((s, i) => s + i.total, 0);
    
    // Branch performance
    const branchPerformance = allBranches.map(b => {
        const bSales = allSales.filter(s => s.branchId === b.id && s.date.startsWith(thisMonth));
        const bTotal = bSales.reduce((s, i) => s + i.total, 0);
        const bCount = bSales.length;
        const bUsers = allUsers.filter(u => u.branchId === b.id).length;
        const bProducts = allProducts.filter(p => p.branchId === b.id).length;
        return { ...b, total: bTotal, count: bCount, users: bUsers, products: bProducts };
    }).sort((a, b) => b.total - a.total);
    
    // Top products
    const productSales = {};
    allSales.filter(s => s.date.startsWith(thisMonth)).forEach(s => {
        if (s.items) {
            s.items.forEach(item => {
                if (!productSales[item.name]) productSales[item.name] = { name: item.name, quantity: 0, total: 0 };
                productSales[item.name].quantity += item.quantity;
                productSales[item.name].total += item.price * item.quantity;
            });
        }
    });
    const topProducts = Object.values(productSales).sort((a, b) => b.total - a.total).slice(0, 5);
    
    el.innerHTML = `
        <!-- Summary Cards -->
        <div class="metrics">

            <div class="metric-card"><div class="metric-value">${formatCurrency(monthSales)}</div><div class="metric-label">This Month</div></div>

}

// ==================== BRANCH MANAGER REPORTS ====================
function renderBranchReports(el, today, thisMonth, lastMonth) {
    const mySales = getMyData('sales');
    const myProducts = getMyData('products');
    const myUsers = getMyData('users');
    
    // Calculate totals
    const todaySales = mySales.filter(s => s.date === today).reduce((s, i) => s + i.total, 0);
    const todayCount = mySales.filter(s => s.date === today).length;
    const monthSales = mySales.filter(s => s.date.startsWith(thisMonth)).reduce((s, i) => s + i.total, 0);
    const monthCount = mySales.filter(s => s.date.startsWith(thisMonth)).length;
    const lastMonthSales = mySales.filter(s => s.date.startsWith(lastMonth)).reduce((s, i) => s + i.total, 0);
    const monthTax = mySales.filter(s => s.date.startsWith(thisMonth)).reduce((s, i) => s + i.tax, 0);
    const monthAvg = monthCount > 0 ? monthSales / monthCount : 0;
    
    // Payment breakdown
    const cashSales = mySales.filter(s => s.date.startsWith(thisMonth) && s.paymentMethod === 'cash').reduce((s, i) => s + i.total, 0);
    const cardSales = mySales.filter(s => s.date.startsWith(thisMonth) && s.paymentMethod === 'card').reduce((s, i) => s + i.total, 0);
    
    // Cashier performance
    const cashierPerformance = myUsers.filter(u => u.role === 'cashier' && u.active).map(c => {
        const cSales = mySales.filter(s => s.cashierId === c.id && s.date.startsWith(thisMonth));
        return {
            name: c.name,
            total: cSales.reduce((s, i) => s + i.total, 0),
            count: cSales.length,
            avg: cSales.length > 0 ? cSales.reduce((s, i) => s + i.total, 0) / cSales.length : 0
        };
    }).sort((a, b) => b.total - a.total);
    
    // Daily breakdown (last 7 days)
    const dailyBreakdown = [];
    for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];
        const daySales = mySales.filter(s => s.date === dateStr).reduce((s, sale) => s + sale.total, 0);
        dailyBreakdown.push({ date: dateStr, total: daySales, label: d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) });
    }
    
    // Low stock alert
    const lowStock = myProducts.filter(p => p.active && p.stock < 10);
    
    // Best selling products
    const productSalesMap = {};
    mySales.filter(s => s.date.startsWith(thisMonth)).forEach(s => {
        if (s.items) {
            s.items.forEach(item => {
                if (!productSalesMap[item.name]) productSalesMap[item.name] = { name: item.name, qty: 0, total: 0 };
                productSalesMap[item.name].qty += item.quantity;
                productSalesMap[item.name].total += item.price * item.quantity;
            });
        }
    });
    const bestProducts = Object.values(productSalesMap).sort((a, b) => b.total - a.total).slice(0, 5);
    
    el.innerHTML = `
        <!-- Summary -->
        <div class="metrics">
            <div class="metric-card"><div class="metric-value">${formatCurrency(todaySales)}</div><div class="metric-label">Today (${todayCount} sales)</div></div>
            <div class="metric-card"><div class="metric-value">${formatCurrency(monthSales)}</div><div class="metric-label">This Month (${monthCount} sales)</div></div>
            <div class="metric-card"><div class="metric-value">${formatCurrency(monthAvg)}</div><div class="metric-label">Avg Sale</div></div>
            <div class="metric-card"><div class="metric-value">${formatCurrency(monthTax)}</div><div class="metric-label">Tax Collected</div></div>
        </div>

        <!-- Month Comparison -->
        <div class="card">
            <h4>📈 Month Comparison</h4>
            <div style="display:flex;justify-content:space-between;text-align:center;">
                <div><small style="color:#a0a0b0;">Last Month</small><br><span style="color:#9b8fff;">${formatCurrency(lastMonthSales)}</span></div>
                <div style="font-size:1.5em;">→</div>
                <div><small style="color:#a0a0b0;">This Month</small><br><span style="color:#2ed573;">${formatCurrency(monthSales)}</span></div>
            </div>
            ${lastMonthSales > 0 ? `
                <div style="text-align:center;margin-top:5px;color:${monthSales >= lastMonthSales ? '#2ed573' : '#ff4757'};">
                    ${monthSales >= lastMonthSales ? '📈' : '📉'} ${Math.abs(((monthSales - lastMonthSales) / lastMonthSales * 100)).toFixed(1)}%
                </div>` : ''}
        </div>

        <!-- Daily Breakdown Chart -->
        <div class="card">
            <h4>📊 Last 7 Days</h4>
            ${dailyBreakdown.map(d => {
                const maxSales = Math.max(...dailyBreakdown.map(x => x.total), 1);
                const barWidth = (d.total / maxSales * 100);
                return `
                <div style="margin:5px 0;">
                    <div style="display:flex;justify-content:space-between;font-size:.7em;">
                        <span>${d.label.split(',')[0]}</span>
                        <span>${formatCurrency(d.total)}</span>
                    </div>
                    <div style="background:#2a3a5e;border-radius:5px;height:8px;">
                        <div style="background:${d.total > 0 ? '#7c6fff' : '#2a3a5e'};height:100%;border-radius:5px;width:${barWidth}%;"></div>
                    </div>
                </div>`;
            }).join('')}
        </div>

        <!-- Payment Methods -->
        <div class="card">
            <h4>💳 Payment Methods</h4>
            <div style="display:flex;gap:8px;">
                <div style="flex:1;text-align:center;background:#16213e;border-radius:8px;padding:8px;">
                    <div>💵</div><div style="color:#9b8fff;">${formatCurrency(cashSales)}</div>
                    <small style="color:#a0a0b0;">Cash</small>
                </div>
                <div style="flex:1;text-align:center;background:#16213e;border-radius:8px;padding:8px;">
                    <div>💳</div><div style="color:#9b8fff;">${formatCurrency(cardSales)}</div>
                    <small style="color:#a0a0b0;">Card</small>
                </div>
            </div>
        </div>

        <!-- Cashier Performance -->
        ${cashierPerformance.length > 0 ? `
        <div class="card">
            <h4>👤 Cashier Performance</h4>
            <table>
                <thead><tr><th>Cashier</th><th>Sales</th><th>Count</th><th>Avg</th></tr></thead>
                <tbody>${cashierPerformance.map((c, i) => `
                    <tr>
                        <td>${i === 0 ? '⭐' : ''} ${c.name}</td>
                        <td style="color:#9b8fff;">${formatCurrency(c.total)}</td>
                        <td>${c.count}</td>
                        <td>${formatCurrency(c.avg)}</td>
                    </tr>`).join('')}</tbody>
            </table>
        </div>` : ''}

        <!-- Top Products -->
        ${bestProducts.length > 0 ? `
        <div class="card">
            <h4>🔥 Best Sellers</h4>
            ${bestProducts.map((p, i) => `
                <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #2a3a5e;font-size:.85em;">
                    <span>${i + 1}. ${p.name}</span>
                    <span style="color:#a0a0b0;">x${p.qty}</span>
                    <span style="color:#9b8fff;">${formatCurrency(p.total)}</span>
                </div>`).join('')}
        </div>` : ''}

        <!-- Low Stock Alert -->
        ${lowStock.length > 0 ? `
        <div class="alert alert-warning">
            ⚠️ <strong>${lowStock.length} products low on stock:</strong><br>
            ${lowStock.map(p => `${p.name} (${p.stock} left)`).join(', ')}
        </div>` : ''}

        <!-- Export -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
            <button class="btn btn-primary btn-sm" onclick="exportBranchReport('summary')">📊 Summary Report</button>
            <button class="btn btn-success btn-sm" onclick="exportBranchReport('detailed')">📋 Detailed Report</button>
            <button class="btn btn-primary btn-sm" onclick="exportCSV('sales')">💰 Sales CSV</button>
            <button class="btn btn-warning btn-sm" onclick="window.print()">🖨️ Print</button>
        </div>
    `;
}

// ==================== EXPORT FUNCTIONS ====================
function exportFullReport(type) {
    const today = new Date().toISOString().split('T')[0];
    const thisMonth = today.substring(0, 7);
    const allSales = DB.getAll('sales');
    const allBranches = DB.getAll('branches');
    let report = '';
    
    if (type === 'monthly') {
        report = 'MLEA POS - MONTHLY REPORT\n';
        report += '=' .repeat(40) + '\n';
        report += `Period: ${thisMonth}\n`;
        report += `Generated: ${new Date().toLocaleString()}\n\n`;
        
        const monthSales = allSales.filter(s => s.date.startsWith(thisMonth));
        report += `Total Sales: ${formatCurrency(monthSales.reduce((s, i) => s + i.total, 0))}\n`;
        report += `Transactions: ${monthSales.length}\n`;
        report += `Avg Sale: ${formatCurrency(monthSales.length > 0 ? monthSales.reduce((s, i) => s + i.total, 0) / monthSales.length : 0)}\n\n`;
        
        report += 'BRANCH BREAKDOWN:\n';
        allBranches.forEach(b => {
            const bSales = monthSales.filter(s => s.branchId === b.id);
            report += `  ${b.name}: ${formatCurrency(bSales.reduce((s, i) => s + i.total, 0))} (${bSales.length} sales)\n`;
        });
    } else if (type === 'daily') {
        report = `MLEA POS - DAILY REPORT\n${'='.repeat(40)}\nDate: ${today}\n\n`;
        const daySales = allSales.filter(s => s.date === today);
        report += `Total: ${formatCurrency(daySales.reduce((s, i) => s + i.total, 0))}\n`;
        report += `Sales: ${daySales.length}\n\n`;
        daySales.forEach(s => {
            report += `  #${s.id} - ${formatCurrency(s.total)} (${s.paymentMethod})\n`;
        });
    } else if (type === 'branch') {
        report = 'MLEA POS - BRANCH REPORT\n' + '='.repeat(40) + '\n\n';
        allBranches.forEach(b => {
            const bSales = allSales.filter(s => s.branchId === b.id && s.date.startsWith(thisMonth));
            report += `${b.name}\n${'-'.repeat(20)}\n`;
            report += `  Sales: ${formatCurrency(bSales.reduce((s, i) => s + i.total, 0))}\n`;
            report += `  Transactions: ${bSales.length}\n`;
            report += `  Users: ${DB.getAll('users').filter(u => u.branchId === b.id).length}\n`;
            report += `  Products: ${DB.getAll('products').filter(p => p.branchId === b.id).length}\n\n`;
        });
    }
    
    downloadText(report, `${type}_report_${today}.txt`);
}

function exportBranchReport(type) {
    const today = new Date().toISOString().split('T')[0];
    const thisMonth = today.substring(0, 7);
    const mySales = getMyData('sales');
    const branch = DB.getById('branches', currentUser.branchId);
    let report = '';
    
    report = `MLEA POS - ${branch?.name || 'Branch'} REPORT\n`;
    report += '='.repeat(40) + '\n';
    report += `Generated: ${new Date().toLocaleString()}\n`;
    report += `Manager: ${currentUser.name}\n\n`;
    
    if (type === 'summary') {
        const monthSales = mySales.filter(s => s.date.startsWith(thisMonth));
        report += `MONTHLY SUMMARY (${thisMonth})\n${'-'.repeat(20)}\n`;
        report += `Total Sales: ${formatCurrency(monthSales.reduce((s, i) => s + i.total, 0))}\n`;
        report += `Transactions: ${monthSales.length}\n`;
        report += `Avg Sale: ${formatCurrency(monthSales.length > 0 ? monthSales.reduce((s, i) => s + i.total, 0) / monthSales.length : 0)}\n`;
        report += `Cash: ${formatCurrency(monthSales.filter(s => s.paymentMethod === 'cash').reduce((s, i) => s + i.total, 0))}\n`;
        report += `Card: ${formatCurrency(monthSales.filter(s => s.paymentMethod === 'card').reduce((s, i) => s + i.total, 0))}\n`;
    } else {
        report += `DETAILED REPORT\n${'-'.repeat(20)}\n\n`;
        const recentSales = mySales.slice(-20).reverse();
        recentSales.forEach(s => {
            report += `#${s.id} | ${s.date} | ${formatCurrency(s.total)} | ${s.paymentMethod} | ${s.cashierName}\n`;
        });
        report += `\nPRODUCTS:\n`;
        getMyData('products').forEach(p => {
            report += `  ${p.name} - ${formatCurrency(p.price)} | Stock: ${p.stock}\n`;
        });
    }
    
    downloadText(report, `${branch?.name || 'branch'}_${type}_${today}.txt`);
}

function downloadText(text, filename) {
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}

// Also update the exportCSV function to include more details:
function exportCSV(type) {
    let csv = '';
    const today = new Date().toISOString().split('T')[0];
    
    if (type === 'sales') {
        csv = 'Sale ID,Date,Total,Subtotal,Tax,Payment Method,Cashier,Branch\n';
        getMyData('sales').forEach(s => {
            const branch = s.branchId ? DB.getById('branches', s.branchId) : null;
            csv += `${s.id},${s.date},${s.total},${s.subtotal || 0},${s.tax || 0},${s.paymentMethod},${s.cashierName || ''},${branch?.name || 'N/A'}\n`;
        });
    } else if (type === 'inventory') {
        csv = 'SKU,Name,Price,Stock,Category,Active,Branch\n';
        getMyData('products').forEach(p => {
            const branch = p.branchId ? DB.getById('branches', p.branchId) : null;
            csv += `${p.sku},${p.name},${p.price},${p.stock},${p.category || ''},${p.active},${branch?.name || 'Global'}\n`;
        });
    }
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${type}_report_${today}.csv`;
    a.click();
}

    function backupAllData() {
        const data = {}; DB.stores.forEach(s => data[s] = DB.getAll(s));
        const b = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(b);
        a.download = `full_backup_${new Date().toISOString().split('T')[0]}.json`; a.click();
        alert('✅ Full backup downloaded!');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    // ==================== EVENTS ====================
    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', function(e) {
        if (document.getElementById('loginScreen').style.display !== 'none') {
            if (e.key >= '0' && e.key <= '9') enterPin(e.key);
            else if (e.key === 'Enter') submitPin();
            else if (e.key === 'Backspace') { pinEntry = pinEntry.slice(0, -1); updatePinDisplay(); }
        }
    });

    // ==================== START ====================
    console.log('Starting MLEA POS...');
    initApp();
    </script>
