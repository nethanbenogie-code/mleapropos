<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>MLEA POS v5 — Full Feature (Fixed)</title>
<style>
/* ========== STYLES (condensed but complete) ========== */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-void:#080b14;--bg-deep:#0d1220;--bg-surface:#111827;--bg-elevated:#161f33;--bg-glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--gold:#d4a853;--gold-soft:rgba(212,168,83,0.15);--emerald:#2dd4a0;--rose:#f06577;--blue:#6fa3ef;--text:#f0f0f5;--text2:#8892a4;--ff:'Syne',sans-serif;--fb:'DM Sans',sans-serif}
body{font-family:var(--fb);background:var(--bg-void);color:var(--text)}
.wrap{max-width:480px;margin:0 auto;background:var(--bg-deep);min-height:100vh}
@media(min-width:768px){.wrap{max-width:768px}}@media(min-width:1024px){.wrap{max-width:1200px}}
.amb{position:fixed;inset:0;pointer-events:none;z-index:0}
.lic-card,.log-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:28px;padding:36px 28px;max-width:360px;margin:auto;text-align:center}
.lic-input,.pin-grid .pbn{background:var(--bg-glass);border:1px solid var(--border);border-radius:14px;padding:14px;color:var(--text)}
.btn{padding:11px 22px;border-radius:14px;cursor:pointer;font-weight:600}
.bp{background:linear-gradient(135deg,var(--gold),#e8b850);color:#1a0f00}
.card{background:var(--bg-glass);border-radius:20px;padding:18px;margin:10px 0}
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:1024px){.prod-grid{grid-template-columns:repeat(3,1fr)}}
.sidebar{position:fixed;left:-300px;top:0;bottom:0;width:270px;background:rgba(13,18,32,.97);transition:left .3s;z-index:1000}
.sidebar.on{left:0}
.sb-item{padding:11px 12px;cursor:pointer}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:14px 0}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bg-glass);border:1.5px solid var(--border)}
.pin-dot.on{background:var(--gold)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:2000;justify-content:center;align-items:center}
.modal.on{display:flex}
.modal-box{background:var(--bg-surface);border-radius:28px;padding:24px;max-width:420px;max-height:90vh;overflow:auto}
.toast-wrap{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:2500}
.toast{background:var(--bg-elevated);border:1px solid var(--gold);color:var(--gold);padding:11px 18px;border-radius:14px;margin-bottom:8px}
</style>
</head>
<body>
<div class="amb"></div>
<div id="toastWrap" class="toast-wrap"></div>
<div class="wrap">
  <!-- License Gate -->
  <div id="licenseGate">
    <div class="lic-card">
      <div class="lic-logo" style="font-size:48px;">🔐</div>
      <h2>MLEA POS</h2>
      <p>Enter license key</p>
      <input class="lic-input" type="text" id="licenseInput" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" oninput="fmtLic(this)">
      <button class="btn bp" id="activateBtn" onclick="doActivate()" style="width:100%">Activate License</button>
      <button class="btn bd" id="deactivateBtn" style="display:none;width:100%;margin-top:8px" onclick="doDeactivate()">Deactivate</button>
      <button class="btn bb" id="validateBtn" style="display:none;margin-top:8px" onclick="doValidate()">Check Status</button>
      <div class="lic-status" id="licStatus"></div>
    </div>
  </div>
  <!-- Login Screen -->
  <div id="loginScreen" style="display:none">
    <div class="log-card">
      <div class="log-logo"><div class="log-icon" style="font-size:48px;">🏪</div><h1>MLEA POS</h1><p>BIR-Ready</p></div>
      <div class="sec-label">Select User</div>
      <div class="usr-grid" id="usrGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px"></div>
      <div class="lockout-bar" id="lockoutBar" style="display:none"></div>
      <div class="sec-label">Enter PIN</div>
      <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
      <div class="err-msg" id="errMsg"></div>
      <div class="pin-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px">
        <button class="pbn" onclick="ePin('1')">1</button><button class="pbn" onclick="ePin('2')">2</button><button class="pbn" onclick="ePin('3')">3</button>
        <button class="pbn" onclick="ePin('4')">4</button><button class="pbn" onclick="ePin('5')">5</button><button class="pbn" onclick="ePin('6')">6</button>
        <button class="pbn" onclick="ePin('7')">7</button><button class="pbn" onclick="ePin('8')">8</button><button class="pbn" onclick="ePin('9')">9</button>
        <button class="pbn clr" onclick="clrPin()">Clear</button><button class="pbn" onclick="ePin('0')">0</button><button class="pbn sub" onclick="subPin()">→</button>
      </div>
    </div>
  </div>
  <!-- Main App -->
  <div id="mainApp" style="display:none">
    <div class="sb-ov" id="sbOv" onclick="closeSB()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999"></div>
    <div class="sidebar" id="sidebar"><div class="sb-hdr"><div class="sb-logo">🏪</div><div><h3>MLEA POS</h3><p id="sbSub">v5</p></div></div><div class="sb-nav" id="sbNav"></div><div class="sb-ft"><button class="sb-ft-btn" onclick="logout()">🚪 Sign Out</button></div></div>
    <div class="hdr" style="display:flex;justify-content:space-between;padding:14px 16px;background:rgba(13,18,32,.9);backdrop-filter:blur(20px)"><button class="hambg" onclick="openSB()">☰</button><span class="hdr-logo">MLEA POS</span><div class="hdr-r"><span id="hdrBranch"></span><button class="hbtn" onclick="logout()">Sign Out</button></div></div>
    <div id="mainContent"></div>
  </div>
  <div class="sync-bar" id="syncBar" style="display:none"></div>
</div>
<div class="modal" id="modal"><div class="modal-box" id="modalBox"></div></div>

<script>
// ============================================================
// UTILITIES
// ============================================================
function escapeHtml(str){if(!str)return '';return str.replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
function toast(msg,color='gold',dur=3200){const wrap=document.getElementById('toastWrap');const t=document.createElement('div');t.className='toast';t.textContent=msg;wrap.appendChild(t);setTimeout(()=>t.remove(),dur);}
function dlg(opts){return new Promise(resolve=>{const el=document.createElement('div');el.className='dlg-overlay';el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;justify-content:center;align-items:center;z-index:3000';const type=opts.type||'alert';el.innerHTML=`<div style="background:#111827;border-radius:20px;padding:24px;max-width:340px"><div style="font-size:2em;text-align:center">${opts.icon||'💬'}</div><div style="font-family:var(--ff);font-weight:700;text-align:center">${opts.title||''}</div><div style="margin:12px 0">${opts.msg||''}</div>${type==='prompt'?`<input type="text" id="dlgInput" style="width:100%;margin-bottom:12px">`:''}<div style="display:flex;gap:8px">${type!=='alert'?`<button class="btn bd" id="dlgCancel">Cancel</button>`:''}<button class="btn bp" id="dlgOk">OK</button></div></div>`;document.body.appendChild(el);const ok=el.querySelector('#dlgOk');const cancel=el.querySelector('#dlgCancel');const inp=el.querySelector('#dlgInput');ok.onclick=()=>{const val=inp?inp.value:true;el.remove();resolve(val);};if(cancel)cancel.onclick=()=>{el.remove();resolve(null);};});}
const confirm2=(msg,icon='⚠️',danger=false)=>dlg({type:'confirm',icon,msg,title:'Confirm',okLabel:'OK',cancelLabel:'Cancel'});
const prompt2=(msg,placeholder='',defaultVal='')=>dlg({type:'prompt',icon:'✏️',msg,title:'Input',placeholder,defaultVal});

// ============================================================
// STORAGE
// ============================================================
const STORES=['products','sales','users','settings','branches','activityLogs','suppliers','purchaseOrders','voidedSales','heldSales','returns'];
const LocalDB={init(){STORES.forEach(s=>{if(!localStorage.getItem('mlea_'+s))localStorage.setItem('mlea_'+s,'[]')})},getAll(k){return JSON.parse(localStorage.getItem('mlea_'+k)||'[]')},set(k,d){localStorage.setItem('mlea_'+k,JSON.stringify(d))},add(k,item){const items=this.getAll(k);item.id=items.reduce((max,i)=>Math.max(max,i.id||0),0)+1;item.createdAt=new Date().toISOString();items.push(item);this.set(k,items);return item.id;},update(k,item){const items=this.getAll(k);const idx=items.findIndex(i=>i.id===item.id);if(idx!==-1){items[idx]=item;this.set(k,items);}},delete(k,id){this.set(k,this.getAll(k).filter(i=>i.id!==id))},getById(k,id){return this.getAll(k).find(i=>i.id===id)},getByBranch(k,bid){return this.getAll(k).filter(i=>i.branchId===bid)}};
LocalDB.init();
const DB={getAll:k=>LocalDB.getAll(k),add:k=>LocalDB.add(k),update:k=>LocalDB.update(k),delete:k=>LocalDB.delete(k),getById:k=>LocalDB.getById(k)};
function getSetting(k,def=''){return DB.getAll('settings').find(s=>s.key===k)?.value??def}
function saveSetting(k,v){const all=DB.getAll('settings');const e=all.find(s=>s.key===k);if(e){e.value=v;DB.update('settings',e);}else DB.add('settings',{key:k,value:v});}
function fc(a){const n=parseFloat(a)||0;return '₱'+n.toFixed(2);}
let currentUser=null,currentView='dashboard',cart=[],selUserId=null,pinEntry='',pinFails=0,pinLockUntil=0,discAmt=0,discType='none',lastSale=null,held=[],selCat='All',sesTimer=null;
function getMyData(k){const all=DB.getAll(k);if(!currentUser)return all;if(currentUser.role==='admin')return all;if(currentUser.branchId)return all.filter(i=>i.branchId===currentUser.branchId||!i.branchId);return all;}
function logAct(action,details){if(!currentUser)return;DB.add('activityLogs',{userId:currentUser.id,userName:currentUser.name,userRole:currentUser.role,branchId:currentUser.branchId,action,details,timestamp:new Date().toISOString()});}
function getBIR(){return{tin:getSetting('bir_tin')||'000-000-000-000',name:getSetting('bir_name')||'MLEA Store',address:getSetting('bir_address')||'Registered',vatType:getSetting('bir_vattype')||'vat'};}
function updateGAT(amt){const all=DB.getAll('settings');const e=all.find(s=>s.key==='bir_gat');const cur2=e?parseFloat(e.value)||0:0;const nv=cur2+amt;if(e){e.value=nv;DB.update('settings',e);}else DB.add('settings',{key:'bir_gat',value:nv});return nv;}
function getNextOR(){const all=DB.getAll('settings');const e=all.find(s=>s.key==='bir_counter');let c=e?parseInt(e.value)||0:0;c++;if(e){e.value=c;DB.update('settings',e);}else DB.add('settings',{key:'bir_counter',value:c});return 'OR-'+String(c).padStart(7,'0');}
function computeVAT(total,vatType,rate){if(vatType!=='vat')return{vatableSales:0,vatAmount:0,vatExempt:total,grandTotal:total};const vs=total/(1+rate);return{vatableSales:vs,vatAmount:total-vs,vatExempt:0,grandTotal:total};}

// ============================================================
// LICENSE FUNCTIONS (FIXED)
// ============================================================
const DEMO_KEY='MLEA-DEMO-UNLOCK-KEY1';
function devId(){return btoa(navigator.userAgent.slice(-15)+screen.width+'x'+screen.height).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);}
function fmtLic(inp){let v=inp.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();if(v.length>16)v=v.slice(0,16);let p=[];for(let i=0;i<v.length;i+=4)p.push(v.slice(i,i+4));inp.value=p.join('-');}
function isActiv(){return localStorage.getItem('mlea_activated')==='true';}
function setActiv(key){localStorage.setItem('mlea_activated','true');localStorage.setItem('mlea_lic',key);showLicGate();}
function clrActiv(){localStorage.removeItem('mlea_activated');localStorage.removeItem('mlea_lic');currentUser=null;cart=[];showLicGate();}
function getStoredLic(){return localStorage.getItem('mlea_lic')||'';}
function showLicGate(){if(isActiv()){document.getElementById('licenseGate').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';document.getElementById('licenseInput').value=getStoredLic();document.getElementById('activateBtn').style.display='none';document.getElementById('deactivateBtn').style.display='block';document.getElementById('validateBtn').style.display='block';document.getElementById('licStatus').textContent='✓ Activated';document.getElementById('licStatus').className='lic-status ok';initApp();}else{document.getElementById('licenseGate').style.display='flex';document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='none';document.getElementById('activateBtn').style.display='block';document.getElementById('deactivateBtn').style.display='none';document.getElementById('validateBtn').style.display='none';document.getElementById('licStatus').textContent='';document.getElementById('licenseInput').value='';}}
async function doActivate(){const inp=document.getElementById('licenseInput'),s=document.getElementById('licStatus'),btn=document.getElementById('activateBtn');const key=inp.value.trim();if(!key){s.textContent='⚠ Enter key';s.className='lic-status err';return;}btn.disabled=true;s.innerHTML='<span class="spinner"></span> Verifying…';s.className='lic-status';try{await new Promise(r=>setTimeout(r,500));if(key===DEMO_KEY){setActiv(key);s.textContent='✓ Demo activated';s.className='lic-status ok';}else{s.textContent='✗ Invalid key (demo only)';s.className='lic-status err';}}catch(e){s.textContent='✗ Error';s.className='lic-status err';}btn.disabled=false;}
async function doValidate(){const s=document.getElementById('licStatus');const key=getStoredLic();if(!key){s.textContent='No license';s.className='lic-status err';return;}s.textContent='✓ License valid';s.className='lic-status ok';}
async function doDeactivate(){const ok=await confirm2('Deactivate?','🔑');if(!ok)return;clrActiv();}

// ============================================================
// LOGIN & SESSION
// ============================================================
function resetSesTimer(){clearTimeout(sesTimer);if(!currentUser)return;const mins=parseInt(getSetting('ses_timeout','30'))||30;sesTimer=setTimeout(()=>{if(currentUser){toast('Session expired');logout();}},mins*60*1000);}
document.addEventListener('click',resetSesTimer);
function chkLock(){if(Date.now()<pinLockUntil){const sec=Math.ceil((pinLockUntil-Date.now())/1000);const lb=document.getElementById('lockoutBar');if(lb){lb.style.display='block';lb.textContent='Locked for '+sec+'s';}document.querySelectorAll('.pbn').forEach(b=>b.disabled=true);setTimeout(chkLock,1000);return true;}document.querySelectorAll('.pbn').forEach(b=>b.disabled=false);pinFails=0;return false;}
function renderLogin(){document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none';const users=DB.getAll('users');document.getElementById('usrGrid').innerHTML=users.filter(u=>u.active).map(u=>`<div class="usr-card ${selUserId===u.id?'sel':''}" onclick="selUser(${u.id})"><span class="av">${u.role==='admin'?'👑':u.role==='manager'?'🎯':'👤'}</span><div class="nm">${escapeHtml(u.name)}</div><span class="rbadge">${u.role}</span></div>`).join('');pinEntry='';updPinDots();if(Date.now()<pinLockUntil)chkLock();}
function selUser(id){selUserId=id;pinEntry='';pinFails=0;pinLockUntil=0;updPinDots();renderLogin();}
function ePin(d){if(chkLock())return;if(!selUserId){document.getElementById('errMsg').textContent='Select user';return;}if(pinEntry.length<4){pinEntry+=d;updPinDots();if(pinEntry.length===4)setTimeout(subPin,180);}}
function clrPin(){pinEntry='';updPinDots();}
function updPinDots(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.toggle('on',i<pinEntry.length);});}
function subPin(){if(chkLock())return;if(!selUserId)return;const user=DB.getAll('users').find(u=>u.id===selUserId);if(!user||!user.active){document.getElementById('errMsg').textContent='User inactive';pinEntry='';updPinDots();return;}if(user.pin===pinEntry){pinFails=0;currentUser=user;document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';const b=user.branchId?DB.getById('branches',user.branchId):null;document.getElementById('hdrBranch').innerHTML=user.branchId?`🏢 ${b?b.name:'Branch'}`:'👑 Admin';renderSidebar();resetSesTimer();sw('dashboard');}else{pinFails++;document.getElementById('errMsg').textContent='Wrong PIN ('+pinFails+'/5)';pinEntry='';updPinDots();if(pinFails>=5){pinLockUntil=Date.now()+60000;chkLock();}}}
function renderSidebar(){const nav=document.getElementById('sbNav');if(!currentUser)return;const low=getMyData('products').filter(p=>p.stock<=10).length;const adminNav=`<div class="sb-item" onclick="sw('dashboard')">📊 Dashboard</div><div class="sb-item" onclick="sw('pos')">💳 POS</div><div class="sb-item" onclick="sw('allSales')">💰 Sales</div><div class="sb-item" onclick="sw('allProducts')">📦 Products (${low})</div><div class="sb-item" onclick="sw('suppliers')">🚚 Suppliers</div><div class="sb-item" onclick="sw('purchaseOrders')">📋 POs</div><div class="sb-item" onclick="sw('branches')">🏢 Branches</div><div class="sb-item" onclick="sw('allUsers')">👥 Users</div><div class="sb-item" onclick="sw('xReading')">📑 X-Reading</div><div class="sb-item" onclick="sw('zReading')">📋 Z-Reading</div><div class="sb-item" onclick="sw('birSetup')">🏛️ BIR</div><div class="sb-item" onclick="sw('reports')">📈 Reports</div><div class="sb-item" onclick="sw('actLog')">📝 Log</div><div class="sb-item" onclick="sw('backup')">💾 Backup</div><div class="sb-item" onclick="sw('settings')">⚙️ Settings</div>`;nav.innerHTML=currentUser.role==='admin'?adminNav:'<div class="sb-item" onclick="sw(\'pos\')">💳 POS</div><div class="sb-item" onclick="sw(\'dashboard\')">📊 Dashboard</div>';}
function logout(){confirm2('Sign out?').then(ok=>{if(ok){currentUser=null;document.getElementById('mainApp').style.display='none';document.getElementById('loginScreen').style.display='flex';}});}
function openSB(){document.getElementById('sidebar').classList.add('on');document.getElementById('sbOv').style.display='block';}
function closeSB(){document.getElementById('sidebar').classList.remove('on');document.getElementById('sbOv').style.display='none';}
const viewMap={dashboard:renderDashboard,pos:renderPOS,allProducts:renderProducts,suppliers:renderSuppliers,purchaseOrders:renderPOs,branches:renderBranches,allUsers:renderUsers,allSales:renderSales,xReading:renderXR,zReading:renderZR,birSetup:renderBIRSetup,reports:renderReports,actLog:renderActLog,backup:renderBackup,settings:renderSettings};
function sw(view){currentView=view;closeSB();resetSesTimer();const el=document.getElementById('mainContent');el.style.opacity='0';setTimeout(()=>{(viewMap[view]||renderDashboard)(el);el.style.opacity='1';},80);}
function initApp(){if(!DB.getAll('branches').length)DB.add('branches',{name:'Main'});if(!DB.getAll('users').length)DB.add('users',{name:'Admin',role:'admin',active:true,pin:'1234',branchId:null});if(!DB.getAll('products').length)DB.add('products',{sku:'SKU001',name:'Sample',price:99.99,stock:50});renderLogin();}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard(el){const today=new Date().toISOString().split('T')[0];const mySales=getMyData('sales').filter(s=>!s.voided);const todaySales=mySales.filter(s=>s.date===today);const todayRev=todaySales.reduce((a,s)=>a+s.total,0);const gat=getGAT();const bir=getBIR();el.innerHTML=`<div class="welcome"><h3>${currentUser.name}</h3><p>${new Date().toLocaleDateString()}</p><span class="bir-badge">🏛️ ${bir.vatType==='vat'?'VAT':'Non-VAT'}</span></div><div class="metrics"><div class="met"><div class="met-v">${fc(todayRev)}</div><div class="met-l">Today</div></div><div class="met"><div class="met-v">${todaySales.length}</div><div class="met-l">Transactions</div></div></div><div class="card"><h5>BIR GAT</h5><div>${fc(gat)}</div></div><div><button class="btn bp" onclick="sw('pos')">Start Sale</button></div>`;}

// ============================================================
// SIMPLIFIED POS (functional)
// ============================================================
function renderPOS(el){const prods=getMyData('products');const subBD=cart.reduce((s,i)=>s+i.price*i.quantity,0);const total=subBD;el.innerHTML=`<div><input type="text" id="scanInput" placeholder="Scan barcode" onkeypress="if(event.key==='Enter')addToCart(this.value)"></div><div class="prod-grid">${prods.map(p=>`<div class="prod-card" onclick="addToCart('${p.sku}')"><strong>${p.name}</strong><div>${fc(p.price)}</div><small>Stock:${p.stock}</small></div>`).join('')}</div><div class="card"><h4>Cart</h4>${cart.map((item,i)=>`<div>${item.name} x${item.quantity} = ${fc(item.price*item.quantity)} <button onclick="rmFromCart(${i})">❌</button></div>`).join('')}<div>Total: ${fc(total)}</div><div><input type="number" id="cashInput" placeholder="Cash"><button onclick="doPay('cash')">Pay Cash</button><button onclick="doPay('card')">Pay Card</button></div></div>`;}
function addToCart(sku){const p=getMyData('products').find(p=>p.sku===sku&&p.stock>0);if(p){const e=cart.find(i=>i.sku===p.sku);if(e)e.quantity++;else cart.push({...p,quantity:1});renderPOS(document.getElementById('mainContent'));}else toast('Not found','rose');}
function rmFromCart(i){cart.splice(i,1);renderPOS(document.getElementById('mainContent'));}
function doPay(method){if(!cart.length){toast('Cart empty','rose');return;}const subBD=cart.reduce((s,i)=>s+i.price*i.quantity,0);let cash=0;if(method==='cash'){cash=parseFloat(document.getElementById('cashInput')?.value)||0;if(cash<subBD){toast('Insufficient','rose');return;}}const bir=getBIR();const vatD=computeVAT(subBD,bir.vatType,0.12);const total=vatD.grandTotal;const orNum=getNextOR();const gat=updateGAT(total);const sale={date:new Date().toISOString().split('T')[0],total,subtotal:subBD,paymentMethod:method,cashTendered:method==='cash'?cash:0,changeGiven:method==='cash'?cash-total:0,cashierName:currentUser.name,branchId:currentUser.branchId,orNumber:orNum,grandAccumulatedTotal:gat,voided:false,items:cart.map(i=>({productId:i.id,name:i.name,quantity:i.quantity,price:i.price}))};DB.add('sales',sale);cart.forEach(item=>{const p=DB.getById('products',item.id);if(p)p.stock-=item.quantity;DB.update('products',p);});logAct('Sale',orNum);cart=[];toast(`Sale complete! ${orNum}`,'emerald');sw('dashboard');}

// ============================================================
// PRODUCTS, SUPPLIERS, ETC. (simplified)
// ============================================================
function renderProducts(el){const prods=getMyData('products');el.innerHTML=`<div><button class="btn bp" onclick="showProductModal()">+ Add Product</button></div><div class="tbl-wrap"><table>${prods.map(p=>`<tr><td>${p.name}</td><td>${fc(p.price)}</td><td>${p.stock}</td><td><button onclick="adjStock(${p.id})">+</button><button onclick="deleteProduct(${p.id})">🗑</button></td></tr>`).join('')}</table></div>`;}
function showProductModal(){const name=prompt('Product name:');if(!name)return;const price=parseFloat(prompt('Price:'));if(isNaN(price))return;const stock=parseInt(prompt('Stock:'))||0;DB.add('products',{sku:'SKU'+Date.now(),name,price,stock,active:true});sw('allProducts');}
function adjStock(id){const p=DB.getById('products',id);const qty=parseInt(prompt('New stock:',p.stock));if(!isNaN(qty)){p.stock=qty;DB.update('products',p);sw('allProducts');}}
function deleteProduct(id){if(confirm('Delete?')){DB.delete('products',id);sw('allProducts');}}
function renderSuppliers(el){const suppliers=DB.getAll('suppliers');el.innerHTML=`<button class="btn bp" onclick="addSupplier()">+ Add</button>${suppliers.map(s=>`<div>${s.name} <button onclick="deleteSupplier(${s.id})">Delete</button></div>`).join('')}`;}
function addSupplier(){const name=prompt('Supplier name:');if(name)DB.add('suppliers',{name});sw('suppliers');}
function deleteSupplier(id){if(confirm('Delete?')){DB.delete('suppliers',id);sw('suppliers');}}
function renderPOs(el){const pos=DB.getAll('purchaseOrders');el.innerHTML=`<button class="btn bp" onclick="addPO()">+ New PO</button>${pos.map(po=>`<div>PO #${po.id} - ${fc(po.total)} <button onclick="receivePO(${po.id})">Receive</button></div>`).join('')}`;}
function addPO(){const items=[{name:prompt('Item name:'),quantity:parseInt(prompt('Qty:')),cost:parseFloat(prompt('Cost:'))}];const total=items.reduce((s,i)=>s+i.quantity*i.cost,0);DB.add('purchaseOrders',{items,total,status:'ordered'});sw('purchaseOrders');}
function receivePO(id){const po=DB.getById('purchaseOrders',id);po.status='received';DB.update('purchaseOrders',po);po.items.forEach(item=>{const prod=getMyData('products').find(p=>p.name===item.name);if(prod)prod.stock+=item.quantity;DB.update('products',prod);});sw('purchaseOrders');}
function renderBranches(el){if(currentUser.role!=='admin'){el.innerHTML='<div>Admin only</div>';return;}const branches=DB.getAll('branches');el.innerHTML=`<button class="btn bp" onclick="addBranch()">+ Add</button>${branches.map(b=>`<div>${b.name} <button onclick="deleteBranch(${b.id})">Delete</button></div>`).join('')}`;}
function addBranch(){const name=prompt('Branch name:');if(name)DB.add('branches',{name});sw('branches');}
function deleteBranch(id){if(confirm('Delete branch?')){DB.delete('branches',id);sw('branches');}}
function renderUsers(el){const users=DB.getAll('users');el.innerHTML=`<button class="btn bp" onclick="addUser()">+ Add</button>${users.map(u=>`<div>${u.name} (${u.role}) ${u.active?'✓':'✗'} <button onclick="toggleUser(${u.id})">Toggle</button></div>`).join('')}`;}
async function addUser(){const name=await prompt2('Name:');if(!name)return;const pin=await prompt2('PIN (4 digits):');if(!pin||pin.length!==4)return;DB.add('users',{name,role:'cashier',active:true,pin,branchId:currentUser.branchId});sw('allUsers');}
function toggleUser(id){const u=DB.getById('users',id);u.active=!u.active;DB.update('users',u);sw('allUsers');}
function renderSales(el){const sales=getMyData('sales').filter(s=>!s.voided).slice(-30).reverse();el.innerHTML=`<div class="tbl-wrap"><table><tr><th>OR#</th><th>Date</th><th>Total</th><th>Cashier</th></tr>${sales.map(s=>`<tr><td>${s.orNumber}</td><td>${s.date}</td><td>${fc(s.total)}</td><td>${s.cashierName}</td></tr>`).join('')}</table></div>`;}
function renderXR(el){const d=getDayData();el.innerHTML=`<div>Transactions: ${d.sales.length}<br>Total: ${fc(d.total)}</div><button onclick="printXZ('x')">Print X</button>`;}
function renderZR(el){const d=getDayData();el.innerHTML=`<div>Transactions: ${d.sales.length}<br>Total: ${fc(d.total)}</div><button onclick="doZReading()">Perform Z</button>`;}
function getDayData(){const today=new Date().toISOString().split('T')[0];const sales=getMyData('sales').filter(s=>s.date===today&&!s.voided);return{sales,total:sales.reduce((a,s)=>a+s.total,0)};}
function doZReading(){if(confirm('Perform Z-Reading? This ends the day.')){localStorage.setItem('mlea_last_z',new Date().toISOString().split('T')[0]);toast('Z-Reading done','emerald');}}
function printXZ(type){const d=getDayData();const html=`<!DOCTYPE html><html><head><title>X/Z Report</title></head><body><h1>${type.toUpperCase()} Report</h1><p>Total: ${fc(d.total)}</p></body></html>`;const win=window.open();win.document.write(html);win.print();}
function renderBIRSetup(el){const bir=getBIR();el.innerHTML=`<input id="birName" value="${bir.name}"><button onclick="saveBIR()">Save</button>`;}
function saveBIR(){saveSetting('bir_name',document.getElementById('birName').value);toast('Saved','emerald');}
function renderReports(el){el.innerHTML=`<button onclick="exportCSV()">Export CSV</button>`;}
function exportCSV(){let csv='OR,Date,Total\n';getMyData('sales').forEach(s=>csv+=`${s.orNumber},${s.date},${s.total}\n`);const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sales.csv';a.click();}
function renderActLog(el){const logs=getMyData('activityLogs').slice(-20).reverse();el.innerHTML=logs.map(l=>`<div>${l.action} - ${l.userName} - ${new Date(l.timestamp).toLocaleString()}</div>`).join('');}
function renderBackup(el){el.innerHTML=`<button class="btn bp" onclick="downloadBackup()">Download Backup</button><input type="file" id="restoreFile"><button onclick="restoreBackup()">Restore</button>`;}
function downloadBackup(){const data={};STORES.forEach(s=>data[s]=DB.getAll(s));const blob=new Blob([JSON.stringify(data)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup.json';a.click();}
function restoreBackup(){const file=document.getElementById('restoreFile').files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{const d=JSON.parse(e.target.result);STORES.forEach(s=>{if(d[s])LocalDB.set(s,d[s]);});location.reload();};reader.readAsText(file);}
function renderSettings(el){el.innerHTML=`<div><label>Currency</label><select onchange="cur=this.value;saveSetting('currency',this.value)"><option>PHP</option></select></div><div><label>Low Stock Threshold</label><input type="number" id="thresh" value="${getSetting('lowStockThresh','10')}"><button onclick="saveSetting('lowStockThresh',document.getElementById('thresh').value);toast('Saved')">Save</button></div>`;}
function getGAT(){return parseFloat(getSetting('bir_gat','0'))||0;}
function getLowStock(){return getMyData('products').filter(p=>p.stock<=lowStockThresh);}
function showLowStockToast(){const low=getLowStock();if(low.length)toast(`${low.length} low stock items`,'rose');}
// Additional missing functions
let lowStockThresh=10,cur='PHP';
showLicGate();
</script>
