<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MLEA POS v4 — BIR-Ready + Firebase</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080b14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg-void:#080b14;--bg-deep:#0d1220;--bg-surface:#111827;--bg-elevated:#161f33;
  --bg-glass:rgba(255,255,255,0.04);--bg-glass-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border-bright:rgba(255,255,255,0.15);
  --accent-gold:#d4a853;--accent-gold-soft:rgba(212,168,83,0.15);--accent-gold-glow:rgba(212,168,83,0.35);
  --accent-emerald:#2dd4a0;--accent-emerald-soft:rgba(45,212,160,0.12);
  --accent-rose:#f06577;--accent-rose-soft:rgba(240,101,119,0.12);
  --accent-blue:#6fa3ef;--accent-blue-soft:rgba(111,163,239,0.12);
  --accent-purple:#a78bfa;--accent-purple-soft:rgba(167,139,250,0.12);
  --text-primary:#f0f0f5;--text-secondary:#8892a4;--text-muted:#4a5568;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  --radius-sm:8px;--radius-md:14px;--radius-lg:20px;--radius-xl:28px;
  --shadow-card:0 4px 30px rgba(0,0,0,0.4);--shadow-glow-gold:0 0 30px rgba(212,168,83,0.2);
}
body{font-family:var(--font-body);background:var(--bg-void);color:var(--text-primary);overflow-x:hidden;min-height:100vh}
.app-container{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg-deep);position:relative;overflow-x:hidden}
@media(min-width:768px){.app-container{max-width:768px}}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(212,168,83,0.06) 0%,transparent 70%);top:-100px;right:-100px;animation:drift 20s ease-in-out infinite}
.ambient::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,160,0.04) 0%,transparent 70%);bottom:-100px;left:-100px;animation:drift 25s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-20px) scale(1.05)}66%{transform:translate(-10px,15px) scale(0.97)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-elevated);border-top:1px solid var(--border);padding:5px 14px;display:flex;align-items:center;justify-content:space-between;z-index:500;font-size:.68em;color:var(--text-muted)}
@media(min-width:768px){.sync-bar{max-width:768px}}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.sync-dot.local{background:var(--accent-blue)}.sync-dot.firebase{background:var(--accent-emerald)}.sync-dot.offline{background:var(--accent-rose)}.sync-dot.syncing{background:var(--accent-gold);animation:pulse 1s infinite}
#licenseGate{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.license-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:var(--shadow-card);animation:slideUp .5s cubic-bezier(0.22,1,0.36,1)}
.license-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent-gold),#f0c060);border-radius:var(--radius-md);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:var(--shadow-glow-gold)}
.license-card h2{font-family:var(--font-display);font-size:1.5em;font-weight:700;letter-spacing:-0.02em}
.license-card p{color:var(--text-secondary);font-size:.82em;margin:6px 0 24px;font-weight:300}
.license-card input{width:100%;padding:14px 18px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);font-size:1.05em;text-align:center;letter-spacing:4px;color:var(--text-primary);outline:none;font-family:var(--font-mono);transition:all .25s;margin-bottom:12px}
.license-card input:focus{border-color:var(--accent-gold);background:rgba(212,168,83,0.06);box-shadow:0 0 0 3px var(--accent-gold-glow)}
.btn-activate{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent-gold),#e8b850);color:#1a0f00;border:none;border-radius:var(--radius-md);font-size:.92em;font-weight:700;font-family:var(--font-display);cursor:pointer;letter-spacing:.04em;transition:all .2s;box-shadow:var(--shadow-glow-gold)}
.btn-deactivate{width:100%;padding:11px;background:transparent;color:var(--accent-rose);border:1px solid rgba(240,101,119,0.3);border-radius:var(--radius-md);font-size:.8em;cursor:pointer;font-family:var(--font-body);margin-top:8px;transition:all .2s}
.license-status{font-size:.75em;margin-top:12px;min-height:18px;font-weight:500}
.license-status.success{color:var(--accent-emerald)}.license-status.error{color:var(--accent-rose)}
#loginScreen{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;z-index:10}
.login-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px 22px;width:100%;max-width:360px;box-shadow:var(--shadow-card);animation:slideUp .5s cubic-bezier(0.22,1,0.36,1)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent-gold),#f0c060);border-radius:var(--radius-md);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--shadow-glow-gold)}
.login-logo h1{font-family:var(--font-display);font-size:1.6em;font-weight:800;letter-spacing:-0.03em}
.login-logo p{color:var(--text-secondary);font-size:.78em;font-weight:300;margin-top:3px;letter-spacing:.04em}
.section-label{font-size:.65em;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;font-weight:600;font-family:var(--font-display);margin-bottom:8px}
.user-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;max-height:190px;overflow-y:auto}
.user-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.user-card.selected{border-color:var(--accent-gold);background:var(--accent-gold-soft);box-shadow:0 0 20px var(--accent-gold-glow)}
.user-card .avatar{font-size:1.6em;display:block}
.user-card .name{font-size:.68em;color:var(--text-primary);margin-top:4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.6em;font-weight:600;font-family:var(--font-display);letter-spacing:.04em;margin-top:3px}
.admin-badge{background:rgba(212,168,83,0.2);color:var(--accent-gold)}
.manager-badge{background:var(--accent-emerald-soft);color:var(--accent-emerald)}
.cashier-badge{background:var(--accent-blue-soft);color:var(--accent-blue)}
.pin-display{display:flex;justify-content:center;gap:14px;margin:14px 0 8px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bg-glass);border:1.5px solid var(--border);transition:all .25s}
.pin-dot.filled{background:var(--accent-gold);border-color:var(--accent-gold);box-shadow:0 0 12px var(--accent-gold-glow);transform:scale(1.15)}
.pin-dot.error{background:var(--accent-rose);border-color:var(--accent-rose);animation:shake .3s ease}
.error-msg{color:var(--accent-rose);text-align:center;font-size:.78em;min-height:18px;margin-bottom:8px;font-weight:500}
.lockout-msg{background:rgba(240,101,119,0.1);border:1px solid rgba(240,101,119,0.3);border-radius:var(--radius-md);padding:10px 14px;text-align:center;font-size:.78em;color:var(--accent-rose);margin-bottom:8px;font-weight:600}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.pin-btn{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;font-size:1.25em;cursor:pointer;color:var(--text-primary);font-family:var(--font-display);font-weight:600;transition:all .15s}
.pin-btn:active{transform:scale(.94)}
.pin-btn:hover{border-color:var(--border-bright);background:var(--bg-glass-hover)}
.pin-btn.clear{background:var(--accent-rose-soft);color:var(--accent-rose);border-color:rgba(240,101,119,0.25);font-size:.8em}
.pin-btn.submit{background:linear-gradient(135deg,var(--accent-gold),#e8b850);color:#1a0f00;border-color:transparent;font-size:.95em}
.pin-btn:disabled{opacity:.3;pointer-events:none}
#mainApp{display:none;position:relative;z-index:10;padding-bottom:36px}
.header{background:rgba(13,18,32,0.9);backdrop-filter:blur(20px);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.header-logo{font-family:var(--font-display);font-size:1.05em;font-weight:700;letter-spacing:-0.02em}
.header-right{display:flex;align-items:center;gap:8px}
.logout-btn{background:var(--accent-rose-soft);color:var(--accent-rose);border:1px solid rgba(240,101,119,0.2);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.75em;font-weight:600;font-family:var(--font-display);transition:all .2s}
.hamburger{background:var(--bg-glass);border:1px solid var(--border);color:var(--text-primary);font-size:18px;cursor:pointer;width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:all .2s}
.branch-indicator{background:var(--accent-emerald-soft);color:var(--accent-emerald);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--font-display);border:1px solid rgba(45,212,160,0.2)}
.admin-indicator{background:var(--accent-gold-soft);color:var(--accent-gold);padding:5px 11px;border-radius:20px;font-size:.72em;font-weight:600;font-family:var(--font-display);border:1px solid rgba(212,168,83,0.25)}
#mainContent{padding:14px;min-height:60vh}
.card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin:10px 0;backdrop-filter:blur(10px);transition:border-color .2s}
.card:hover{border-color:var(--border-bright)}
.card h4,.card h5{font-family:var(--font-display);font-weight:600;letter-spacing:-0.01em;margin-bottom:10px}
.card h5{font-size:.88em;color:var(--text-secondary)}
.bir-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(212,168,83,0.2),rgba(212,168,83,0.08));border:1px solid rgba(212,168,83,0.35);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;color:var(--accent-gold);font-family:var(--font-display);letter-spacing:.06em;text-transform:uppercase}
.fb-badge-connected{display:inline-flex;align-items:center;gap:5px;background:rgba(45,212,160,0.15);color:var(--accent-emerald);border:1px solid rgba(45,212,160,0.3);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;font-family:var(--font-display)}
.fb-badge-local{display:inline-flex;align-items:center;gap:5px;background:var(--accent-blue-soft);color:var(--accent-blue);border:1px solid rgba(111,163,239,0.25);border-radius:20px;padding:4px 12px;font-size:.68em;font-weight:700;font-family:var(--font-display)}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.metric-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;text-align:center;position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--accent-gold),transparent);opacity:.4}
.metric-value{font-family:var(--font-display);font-size:1.2em;font-weight:700;color:var(--accent-gold);letter-spacing:-0.02em}
.metric-label{font-size:.66em;color:var(--text-muted);margin-top:5px;text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.btn{padding:11px 22px;border:none;border-radius:var(--radius-md);cursor:pointer;font-size:.83em;font-weight:600;font-family:var(--font-display);letter-spacing:.03em;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--accent-gold),#e8b850);color:#1a0f00;box-shadow:0 4px 15px var(--accent-gold-glow)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-success{background:var(--accent-emerald-soft);color:var(--accent-emerald);border:1px solid rgba(45,212,160,0.25)}
.btn-danger{background:var(--accent-rose-soft);color:var(--accent-rose);border:1px solid rgba(240,101,119,0.2)}
.btn-warning{background:rgba(251,189,35,0.12);color:#fbb923;border:1px solid rgba(251,189,35,0.2)}
.btn-purple{background:var(--accent-purple-soft);color:var(--accent-purple);border:1px solid rgba(167,139,250,0.25)}
.btn-sm{padding:7px 14px;font-size:.72em;border-radius:var(--radius-sm)}
.btn-xs{padding:4px 10px;font-size:.66em;border-radius:6px}
.btn-block{width:100%;margin-bottom:8px}
input[type="text"],input[type="number"],input[type="tel"],input[type="email"],input[type="password"],input[type="file"],select,textarea{width:100%;padding:11px 16px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);font-size:.87em;color:var(--text-primary);outline:none;font-family:var(--font-body);margin-bottom:8px;transition:all .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent-gold);background:rgba(212,168,83,0.05);box-shadow:0 0 0 3px rgba(212,168,83,0.12)}
select{cursor:pointer}select option{background:var(--bg-surface);color:var(--text-primary)}
textarea{resize:vertical;min-height:70px}
table{width:100%;border-collapse:collapse;font-size:.78em}
th{background:var(--bg-elevated);color:var(--text-secondary);padding:10px 12px;text-align:left;font-family:var(--font-display);font-size:.7em;text-transform:uppercase;letter-spacing:.08em;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text-secondary);vertical-align:middle}
tr:hover td{background:var(--bg-glass);color:var(--text-primary)}
.stock-low{color:var(--accent-rose);font-weight:700}
.sidebar{position:fixed;left:-300px;top:0;bottom:0;width:270px;background:rgba(13,18,32,0.97);backdrop-filter:blur(30px);z-index:1000;transition:left .3s cubic-bezier(0.22,1,0.36,1);overflow-y:auto;border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar.active{left:0}
.sidebar-header{padding:24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sidebar-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent-gold),#f0c060);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sidebar-header-text h3{font-family:var(--font-display);font-size:1.05em;font-weight:700;letter-spacing:-0.02em}
.sidebar-header-text p{color:var(--text-muted);font-size:.68em;margin-top:2px}
.sidebar-nav{padding:12px 10px;flex:1}
.sidebar-section-title{font-size:.58em;color:var(--text-muted);text-transform:uppercase;letter-spacing:.15em;padding:12px 10px 5px;font-weight:700;font-family:var(--font-display)}
.sidebar-nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:var(--radius-md);cursor:pointer;color:var(--text-secondary);font-size:.83em;font-weight:400;transition:all .18s;margin-bottom:2px;position:relative}
.sidebar-nav-item:hover{background:var(--bg-glass);color:var(--text-primary)}
.sidebar-nav-item.active{background:var(--accent-gold-soft);color:var(--accent-gold);font-weight:600}
.sidebar-nav-item.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;background:var(--accent-gold);border-radius:0 3px 3px 0}
.sidebar-nav-icon{font-size:1em;width:22px;text-align:center}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:999}
.sidebar-overlay.active{display:block}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border)}
.sidebar-footer-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:var(--radius-md);cursor:pointer;color:var(--accent-rose);font-size:.82em;font-weight:500;border:none;background:none;font-family:var(--font-body);transition:all .2s}
.sidebar-footer-btn:hover{background:var(--accent-rose-soft)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);z-index:2000;justify-content:center;align-items:center;padding:20px}
.modal.active{display:flex}
.modal-content{background:var(--bg-surface);border:1px solid var(--border-bright);border-radius:var(--radius-xl);padding:26px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-card);animation:slideUp .3s cubic-bezier(0.22,1,0.36,1)}
.modal-content h4{font-family:var(--font-display);font-size:1.1em;font-weight:700;letter-spacing:-0.02em;margin-bottom:16px}
.pos-search-wrap{position:relative;margin-bottom:8px}
.pos-search-wrap::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;z-index:1}
#posSearch{padding-left:40px}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.product-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.product-card:hover{border-color:rgba(212,168,83,0.4);transform:translateY(-1px)}
.product-card:active{transform:scale(.96)}
.product-card strong{font-family:var(--font-display);font-size:.85em;display:block;margin-bottom:4px}
.product-card .price{color:var(--accent-gold);font-weight:700;font-size:.95em;font-family:var(--font-display)}
.product-card small{color:var(--text-muted);font-size:.67em}
.product-card.out{opacity:.4;pointer-events:none}
.scan-input-wrap{position:relative;margin-bottom:8px}
.scan-input-wrap::before{content:'⚡';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;z-index:1;opacity:.6}
#scanInput{padding-left:40px;font-size:.95em;border-color:var(--accent-emerald);font-family:var(--font-mono)}
.scan-hint{color:var(--accent-emerald);font-size:.68em;text-align:center;margin-top:2px;font-weight:500}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);gap:8px}
.cart-item:last-of-type{border-bottom:none}
.qty-control{display:flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.qty-btn{background:var(--bg-elevated);border:none;color:var(--text-primary);width:28px;height:28px;cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;transition:all .15s}
.qty-btn:hover{background:var(--accent-gold-soft);color:var(--accent-gold)}
.qty-val{background:var(--bg-glass);color:var(--text-primary);width:32px;height:28px;text-align:center;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);font-family:var(--font-mono);font-size:.82em;outline:none}
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{background:var(--bg-glass);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.72em;cursor:pointer;color:var(--text-secondary);font-family:var(--font-display);font-weight:600;white-space:nowrap;transition:all .18s;flex-shrink:0}
.cat-tab.active{background:var(--accent-gold-soft);border-color:var(--accent-gold);color:var(--accent-gold)}
.held-card{background:var(--bg-elevated);border:1px solid var(--accent-gold-soft);border-radius:var(--radius-md);padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}

<body>
<div class="ambient"></div>

<div class="app-container">

<script>
// ══════════════════════════════════════════════
// STORAGE ADAPTER
// ══════════════════════════════════════════════
const STORES=['products','sales','users','settings','branches','activityLogs','suppliers','purchaseOrders','voidedSales','heldSales','returns'];
let storageMode='local';
let firebaseDB=null,offlineQueue=[];
let isOnline=navigator.onLine;
window.addEventListener('online',()=>{isOnline=true;updateSyncBar();flushQueue()});
window.addEventListener('offline',()=>{isOnline=false;updateSyncBar()});

const LocalDB={
  init(){STORES.forEach(s=>{if(!localStorage.getItem('mlea_'+s))localStorage.setItem('mlea_'+s,'[]')})},
  getAll(k){try{return JSON.parse(localStorage.getItem('mlea_'+k)||'[]')}catch(e){return[]}},
  set(k,d){localStorage.setItem('mlea_'+k,JSON.stringify(d))},
  add(k,item){const items=this.getAll(k);item.id=items.length>0?Math.max(...items.map(i=>i.id||0))+1:1;item.createdAt=new Date().toISOString();items.push(item);this.set(k,items);return item.id},
  update(k,item){const items=this.getAll(k);const idx=items.findIndex(i=>i.id===item.id);if(idx!==-1){item.updatedAt=new Date().toISOString();items[idx]=item;this.set(k,items)}},
  delete(k,id){this.set(k,this.getAll(k).filter(i=>i.id!==id))},
  getById(k,id){return this.getAll(k).find(i=>i.id===id)||null},
  getByBranch(k,bid){return this.getAll(k).filter(i=>i.branchId===bid)}
};
LocalDB.init();

const FirebaseDB={
  _cache:{},
  async init(config){
    try{
      const {initializeApp,getApps}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const fs=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const app=getApps().length===0?initializeApp(config):getApps()[0];
      const db=fs.getFirestore(app);
      firebaseDB={...fs,db};
      for(const s of STORES)await this._load(s);
      setSyncStatus('firebase','Connected ✓');
      return true;
    }catch(e){setSyncStatus('offline','Firebase error');return false;}
  },
  async _load(k){
    try{const snap=await firebaseDB.getDocs(firebaseDB.collection(firebaseDB.db,k));this._cache[k]=snap.docs.map(d=>({...d.data(),_did:d.id}));}
    catch(e){this._cache[k]=this._cache[k]||[];}
  },
  getAll(k){return this._cache[k]||[]},
  set(k,arr){this._cache[k]=arr},
  add(k,item){
    const items=this.getAll(k);
    item.id=items.length>0?Math.max(...items.map(i=>i.id||0))+1:1;
    item.createdAt=new Date().toISOString();
    const did=k+'_'+item.id;item._did=did;
    items.push(item);this._cache[k]=items;
    if(!isOnline){offlineQueue.push({op:'set',col:k,did,data:item});return item.id;}
    this._write(k,did,item);return item.id;
  },
  update(k,item){
    const items=this.getAll(k);const idx=items.findIndex(i=>i.id===item.id);
    if(idx!==-1){item.updatedAt=new Date().toISOString();const did=item._did||k+'_'+item.id;item._did=did;items[idx]=item;this._cache[k]=items;
      if(!isOnline){offlineQueue.push({op:'set',col:k,did,data:item});return;}
      this._write(k,did,item);
    }
  },
  delete(k,id){
    const item=this.getById(k,id);this._cache[k]=(this._cache[k]||[]).filter(i=>i.id!==id);
    if(item){const did=item._did||k+'_'+id;if(!isOnline){offlineQueue.push({op:'del',col:k,did});return;}this._del(k,did);}
  },
  getById(k,id){return(this._cache[k]||[]).find(i=>i.id===id)||null},
  getByBranch(k,bid){return(this._cache[k]||[]).filter(i=>i.branchId===bid)},
  async _write(col,did,data){
    try{await firebaseDB.setDoc(firebaseDB.doc(firebaseDB.db,col,did),data);setSyncStatus('firebase','Synced ✓');}
    catch(e){setSyncStatus('offline','Sync failed');offlineQueue.push({op:'set',col,did,data});}
  },
  async _del(col,did){
    try{await firebaseDB.deleteDoc(firebaseDB.doc(firebaseDB.db,col,did));}
    catch(e){offlineQueue.push({op:'del',col,did});}
  }
};

async function flushQueue(){
  if(!firebaseDB||offlineQueue.length===0)return;
  const q=[...offlineQueue];offlineQueue=[];
  for(const op of q){
    try{
      if(op.op==='set')await firebaseDB.setDoc(firebaseDB.doc(firebaseDB.db,op.col,op.did),op.data);
      else await firebaseDB.deleteDoc(firebaseDB.doc(firebaseDB.db,op.col,op.did));
    }catch(e){offlineQueue.push(op);}
  }
  if(!offlineQueue.length)setSyncStatus('firebase','All synced ✓');
}

const DB={
  get _a(){return storageMode==='firebase'?FirebaseDB:LocalDB},
  getAll(k){return this._a.getAll(k)},
  set(k,d){return this._a.set(k,d)},
  add(k,item){
    const id=this._a.add(k,item);
    if(storageMode==='firebase'){const items=LocalDB.getAll(k);if(!items.find(i=>i.id===id)){items.push({...item,id});LocalDB.set(k,items);}}
    return id;
  },
  update(k,item){this._a.update(k,item);if(storageMode==='firebase'){const items=LocalDB.getAll(k);const idx=items.findIndex(i=>i.id===item.id);if(idx!==-1){items[idx]=item;LocalDB.set(k,items);}}},
  delete(k,id){this._a.delete(k,id);if(storageMode==='firebase')LocalDB.set(k,LocalDB.getAll(k).filter(i=>i.id!==id));},
  getById(k,id){return this._a.getById(k,id)},
  getByBranch(k,bid){return this._a.getByBranch(k,bid)},
  stores:STORES
};

function setSyncStatus(mode,msg){
  const dot=document.getElementById('syncDot'),label=document.getElementById('syncLabel'),status=document.getElementById('syncStatus');
  if(!dot)return;
  dot.className='sync-dot '+mode;
  label.textContent=mode==='firebase'?'☁️ Firebase':mode==='local'?'💾 Local':'📴 Offline';
  if(status)status.textContent=msg||'';
}
function updateSyncBar(){
  const bar=document.getElementById('syncBar');if(!bar)return;bar.style.display='flex';
  if(storageMode==='firebase')setSyncStatus(isOnline?'firebase':'offline',isOnline?'Online':'Offline — queuing');
  else setSyncStatus('local','Local only');
}

// ══════════════════════════════════════════════
// LICENSE
// ══════════════════════════════════════════════
const LS='https://script.google.com/macros/s/AKfycby1QlCg9jzpXmxtE1N-5w7b4CuGa0TT5gcfwYrx-0yetL4iI5s86ZX8NyLhDwo4tLJX/exec';
const DEMO='MLEA-DEMO-UNLOCK-KEY1';
function getDeviceId(){return btoa(navigator.userAgent.slice(-15)+screen.width+'x'+screen.height+new Date().getTimezoneOffset()).replace(/[^a-zA-Z0-9]/g,'').slice(0,16)}
function formatLicense(input){let v=input.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();if(v.length>16)v=v.slice(0,16);let p=[];for(let i=0;i<v.length;i+=4)p.push(v.slice(i,i+4));input.value=p.join('-')}
function isActivated(){return localStorage.getItem('mlea_pos_activated')==='true'}
function setActivated(key,info){localStorage.setItem('mlea_pos_activated','true');localStorage.setItem('mlea_pos_license',key);if(info)localStorage.setItem('mlea_license_info',JSON.stringify(info));showLicenseGate()}
function clearActivation(){localStorage.removeItem('mlea_pos_activated');localStorage.removeItem('mlea_pos_license');localStorage.removeItem('mlea_license_info');currentUser=null;cart=[];showLicenseGate()}
function getStoredLicense(){return localStorage.getItem('mlea_pos_license')||''}
function showLicenseGate(){
  if(isActivated()){
    document.getElementById('licenseGate').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('mainApp').style.display='none';
    document.getElementById('licenseInput').value=getStoredLicense();
    document.getElementById('activateBtn').style.display='none';
    document.getElementById('deactivateBtn').style.display='block';
    document.getElementById('validateBtn').style.display='block';
    const info=localStorage.getItem('mlea_license_info');
    const s=document.getElementById('licenseStatus');
    try{const i=info?JSON.parse(info):null;s.textContent=i?'✓ Activated · Device '+i.deviceCount+' of '+i.maxDevices:'✓ System Activated';}catch(e){s.textContent='✓ Activated';}
    s.className='license-status success';
    initApp();
  }else{
    document.getElementById('licenseGate').style.display='flex';
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='none';
    document.getElementById('activateBtn').style.display='block';
    document.getElementById('deactivateBtn').style.display='none';
    document.getElementById('validateBtn').style.display='none';
    document.getElementById('licenseStatus').textContent='';
    document.getElementById('licenseInput').value='';
  }
}
async function handleActivation(){
  const input=document.getElementById('licenseInput'),statusEl=document.getElementById('licenseStatus'),btn=document.getElementById('activateBtn'),key=input.value.trim();
  if(!key){statusEl.textContent='⚠ Enter license key';statusEl.className='license-status error';return;}
  btn.disabled=true;statusEl.textContent='Verifying…';statusEl.className='license-status';
  try{const r=await fetch(LS+'?action=activate&licenseKey='+encodeURIComponent(key)+'&deviceId='+encodeURIComponent(getDeviceId()));const d=await r.json();if(d.success)setActivated(key,{deviceCount:d.deviceCount,maxDevices:d.maxDevices});else{statusEl.textContent='✗ '+d.message;statusEl.className='license-status error';}}
  catch(e){if(key===DEMO){setActivated(key);statusEl.textContent='✓ Demo activated';statusEl.className='license-status success';}else{statusEl.textContent='✗ Cannot reach server';statusEl.className='license-status error';}}
  btn.disabled=false;
}
async function handleValidate(){
  const statusEl=document.getElementById('licenseStatus'),key=getStoredLicense();
  if(!key){statusEl.textContent='No license';statusEl.className='license-status error';return;}
  statusEl.textContent='Checking…';
  try{const r=await fetch(LS+'?action=validate&licenseKey='+encodeURIComponent(key)+'&deviceId='+encodeURIComponent(getDeviceId()));const d=await r.json();statusEl.textContent=d.success?'✓ Valid · Device '+(d.deviceCount||'?')+' of '+(d.maxDevices||'?'):'✗ '+d.message;statusEl.className='license-status '+(d.success?'success':'error');}
  catch(e){statusEl.textContent='Cannot reach server';statusEl.className='license-status error';}
}
async function handleDeactivation(){
  if(!confirm('Deactivate license?'))return;
  try{await fetch(LS+'?action=deactivate&licenseKey='+encodeURIComponent(getStoredLicense())+'&deviceId='+encodeURIComponent(getDeviceId()))}catch(e){}
  clearActivation();
}

// ══════════════════════════════════════════════
// GLOBALS
// ══════════════════════════════════════════════
const currencies={
  PHP:{symbol:'₱',name:'Philippine Peso',flag:'🇵🇭',decimals:2},USD:{symbol:'$',name:'US Dollar',flag:'🇺🇸',decimals:2},
  EUR:{symbol:'€',name:'Euro',flag:'🇪🇺',decimals:2},GBP:{symbol:'£',name:'British Pound',flag:'🇬🇧',decimals:2},
  JPY:{symbol:'¥',name:'Japanese Yen',flag:'🇯🇵',decimals:0},KRW:{symbol:'₩',name:'Korean Won',flag:'🇰🇷',decimals:0},
  SGD:{symbol:'S$',name:'Singapore Dollar',flag:'🇸🇬',decimals:2},MYR:{symbol:'RM',name:'Malaysian Ringgit',flag:'🇲🇾',decimals:2},
  THB:{symbol:'฿',name:'Thai Baht',flag:'🇹🇭',decimals:2},IDR:{symbol:'Rp',name:'Indonesian Rupiah',flag:'🇮🇩',decimals:0},
  AUD:{symbol:'A$',name:'Australian Dollar',flag:'🇦🇺',decimals:2},CAD:{symbol:'C$',name:'Canadian Dollar',flag:'🇨🇦',decimals:2},
  INR:{symbol:'₹',name:'Indian Rupee',flag:'🇮🇳',decimals:2},AED:{symbol:'د.إ',name:'UAE Dirham',flag:'🇦🇪',decimals:2},
  SAR:{symbol:'﷼',name:'Saudi Riyal',flag:'🇸🇦',decimals:2},HKD:{symbol:'HK$',name:'HK Dollar',flag:'🇭🇰',decimals:2},
  VND:{symbol:'₫',name:'Vietnamese Dong',flag:'🇻🇳',decimals:0},BRL:{symbol:'R$',name:'Brazilian Real',flag:'🇧🇷',decimals:2},
  MXN:{symbol:'Mex$',name:'Mexican Peso',flag:'🇲🇽',decimals:2},NGN:{symbol:'₦',name:'Nigerian Naira',flag:'🇳🇬',decimals:2},
  ZAR:{symbol:'R',name:'South African Rand',flag:'🇿🇦',decimals:2},CHF:{symbol:'Fr',name:'Swiss Franc',flag:'🇨🇭',decimals:2},
};

let currentUser=null,currentView='dashboard';
let currentCurrency='PHP',taxRate=0.12,lowStockThreshold=10,defaultPrintMode='ask';
let cart=[],selectedUserId=null,pinEntry='',pinFailCount=0,pinLockUntil=0;
let discountAmount=0,discountType='none',lastSaleData=null;
let heldSales=[],selectedCategory='All',sessionTimeout=null;
let receiptFooter='Thank you for your purchase!';

function fc(a){const c=currencies[currentCurrency]||currencies.PHP;const n=parseFloat(a)||0;return c.symbol+(c.decimals===0?Math.round(n).toLocaleString():n.toFixed(2))}
function getSetting(k,def=''){return DB.getAll('settings').find(s=>s.key===k)?.value??def}
function saveSetting(k,v){const all=DB.getAll('settings'),e=all.find(s=>s.key===k);if(e){e.value=v;DB.update('settings',e);}else DB.add('settings',{key:k,value:v});}
function getMyData(key){
  const all=DB.getAll(key);
  if(!currentUser)return all;
  if(currentUser.role==='admin')return all;
  if(currentUser.branchId)return all.filter(i=>i.branchId===currentUser.branchId||!i.branchId);
  return all;
}
function logActivity(action,details){if(!currentUser)return;DB.add('activityLogs',{userId:currentUser.id,userName:currentUser.name,userRole:currentUser.role,branchId:currentUser.branchId,action,details,timestamp:new Date().toISOString()});}

// ══════════════════════════════════════════════
// BIR
// ══════════════════════════════════════════════
function getBIR(){
  const g=k=>getSetting(k);
  return{tin:g('bir_tin')||'000-000-000-000',registeredName:g('bir_name')||'MLEA Store',registeredAddress:g('bir_address')||'Registered Address',accreditationNo:g('bir_accreditation')||'FP082010-033-2019-0',accreditationDate:g('bir_accr_date')||'2019-01-01',accreditationExpiry:g('bir_accr_expiry')||'2024-12-31',ptuNo:g('bir_ptu')||'PTU-000000',orSeriesPrefix:g('bir_or_prefix')||'OR',orSeriesFrom:g('bir_or_from')||'0000001',orSeriesTo:g('bir_or_to')||'9999999',vatType:g('bir_vat_type')||'vat',siType:g('bir_si_type')||'or'};
}
function getNextOR(){
  const settings=DB.getAll('settings');const e=settings.find(s=>s.key==='bir_or_counter');let c=e?parseInt(e.value)||0:0;c++;
  if(e){e.value=c.toString();DB.update('settings',e);}else DB.add('settings',{key:'bir_or_counter',value:c.toString()});
  const bir=getBIR();const to=parseInt(bir.orSeriesTo)||9999999;
  if(c>=to-50)showToast('⚠️ OR series almost exhausted! '+(to-c)+' left','rose');
  return bir.orSeriesPrefix+'-'+String(c).padStart(7,'0');
}
function updateGAT(amount){
  const e=DB.getAll('settings').find(s=>s.key==='bir_grand_total');const cur=e?parseFloat(e.value)||0:0;const nv=(cur+amount).toFixed(2);
  if(e){e.value=nv;DB.update('settings',e);}else DB.add('settings',{key:'bir_grand_total',value:nv});
  return parseFloat(nv);
}
function getGAT(){return parseFloat(getSetting('bir_grand_total','0'))||0}
function computeVAT(total,vatType,rate){
  if(vatType==='vat'){const vs=total/(1+rate);return{vatableSales:vs,vatAmount:total-vs,vatExempt:0,zeroRated:0,grandTotal:total};}
  return{vatableSales:0,vatAmount:0,vatExempt:total,zeroRated:0,grandTotal:total};
}

function checkLockout(){
  if(Date.now()<pinLockUntil){
    const secs=Math.ceil((pinLockUntil-Date.now())/1000);
    document.getElementById('lockoutMsg').textContent='🔒 Too many failed attempts. Try again in '+secs+'s';
    document.getElementById('lockoutMsg').style.display='block';
    document.querySelectorAll('.pin-btn').forEach(b=>b.disabled=true);
    setTimeout(checkLockout,1000);return true;
  }

  document.querySelectorAll('.pin-btn').forEach(b=>b.disabled=false);

function renderLoginScreen(){
  document.getElementById('loginScreen').style.display='flex';

  const users=DB.getAll('users');
  document.getElementById('userSelector').innerHTML=users.filter(u=>u.active).map(u=>`<div class="user-card ${selectedUserId===u.id?'selected':''}" onclick="selectUser(${u.id})"><span class="avatar">${u.role==='admin'?'👑':u.role==='manager'?'🎯':'👤'}</span><div class="name">${u.name}</div><span class="role-badge ${u.role}-badge">${u.role}</span></div>`).join('');
  pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent='';

function enterPin(d){if(checkLockout())return;if(!selectedUserId){document.getElementById('errorMessage').textContent='Select a user first';return}if(pinEntry.length<4){pinEntry+=d;updatePinDisplay();if(pinEntry.length===4)setTimeout(submitPin,180)}}
function clearPin(){pinEntry='';updatePinDisplay();document.getElementById('errorMessage').textContent=''}
function updatePinDisplay(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.toggle('filled',i<pinEntry.length);d.classList.remove('error')})}
function submitPin(){
  if(checkLockout())return;if(!selectedUserId)return;
  const users=DB.getAll('users');const user=users.find(u=>u.id===selectedUserId);
  if(!user||!user.active){document.getElementById('errorMessage').textContent=!user?'User not found':'Account deactivated';pinEntry='';updatePinDisplay();return}
  if(user.pin===pinEntry){
    pinFailCount=0;pinLockUntil=0;currentUser=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('syncBar').style.display='flex';
    const b=user.branchId?DB.getById('branches',user.branchId):null;
    document.getElementById('headerBranch').innerHTML=user.branchId?`<span class="branch-indicator">🏢 ${b?b.name:'Branch'}</span>`:`<span class="admin-indicator">👑 Admin</span>`;
    document.getElementById('headerTitle').textContent=user.branchId?(b?b.name:'Branch')+' POS':'MLEA HQ';
    renderSidebar();pinEntry='';selectedUserId=null;updatePinDisplay();document.getElementById('errorMessage').textContent='';
    resetSessionTimer();switchView('dashboard');setTimeout(showLowStockToast,700);
  }else{
    pinFailCount++;document.getElementById('errorMessage').textContent='Incorrect PIN ('+pinFailCount+'/5)';
    pinEntry='';updatePinDisplay();document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
    setTimeout(()=>document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error')),500);
    if(pinFailCount>=5){pinLockUntil=Date.now()+60000;logActivity('PIN Lockout','User '+selectedUserId);checkLockout();}
  }
}

function getFilteredProducts(search=''){
  let prods=getMyData('products').filter(p=>p.active);
  if(selectedCategory!=='All')prods=prods.filter(p=>(p.category||'General')===selectedCategory);
  if(search)prods=prods.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||(p.sku||'').toLowerCase().includes(search.toLowerCase())||(p.barcode||'').includes(search));
  return prods;

function getQuickCash(total){
  const bills=[20,50,100,200,500,1000];const out=[];
  bills.forEach(b=>{if(b>=total&&out.length<4)out.push(b)});
  if(!out.length)out.push(Math.ceil(total/100)*100);
  const next=Math.ceil(total/50)*50;if(!out.includes(next)&&out.length<4)out.push(next);
  return out.sort((a,b)=>a-b).slice(0,4);
}

  if(cash>=total){cd.style.display='block';if(ca)ca.textContent=fc(cash-total);if(im)im.style.display='none';}
  else{cd.style.display='none';if(im)im.style.display='block';}

function addToCart(sku){
  if(!sku)return;
  const p=getMyData('products').find(p=>(p.sku===sku||p.barcode===sku)&&p.active);
  if(p&&p.stock>0){const e=cart.find(i=>i.sku===p.sku);e?e.quantity++:cart.push({...p,quantity:1});renderPOS(document.getElementById('mainContent'));}
  else showToast(p?'Out of stock: '+p.name:'Product not found','rose');
}
function removeFromCart(i){cart.splice(i,1);if(!cart.length){discountAmount=0;discountType='none';}renderPOS(document.getElementById('mainContent'))}
function voidCurrentCart(){if(!cart.length)return;if(!confirm('Clear cart?'))return;cart=[];discountAmount=0;discountType='none';renderPOS(document.getElementById('mainContent'));}

// SPLIT PAYMENT
function showSplitPayment(total){
  document.getElementById('modalContent').innerHTML=`<h4>⚡ Split Payment</h4>
    <p style="font-size:.8em;color:var(--text-muted);margin-bottom:16px">Total: <strong style="color:var(--accent-gold)">${fc(total)}</strong></p>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><label style="font-size:.75em;color:var(--text-muted);min-width:60px">💵 Cash</label><input type="number" id="splitCash" placeholder="0.00" step="0.01" oninput="document.getElementById('splitCard').value=Math.max(0,${total}-parseFloat(this.value)||0).toFixed(2)"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><label style="font-size:.75em;color:var(--text-muted);min-width:60px">💳 Card</label><input type="number" id="splitCard" placeholder="0.00" step="0.01" readonly style="background:var(--bg-elevated)"></div>
    <button class="btn btn-primary btn-block" onclick="processSplitPayment(${total})">✓ Confirm Split</button>
    <button class="btn btn-danger btn-block" onclick="closeModal()">Cancel</button>`;
  document.getElementById('modal').classList.add('active');
}
function processSplitPayment(total){
  const cash=parseFloat(document.getElementById('splitCash').value)||0;
  const card=parseFloat(document.getElementById('splitCard').value)||0;
  if(cash+card<total){showToast('Amounts do not cover total','rose');return;}
  closeModal();_doPayment('split',cash,card);
}

function processPayment(method){
  if(!cart.length){showToast('Cart is empty','rose');return;}
  const bir=getBIR();
  const subBD=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
  const effDisc=Math.min(discountAmount,subBD);const sub=subBD-effDisc;
  const vatData=computeVAT(sub+(bir.vatType==='vat'?sub*taxRate:0),bir.vatType,taxRate);
  const total=vatData.grandTotal;
  let cashTendered=0,changeGiven=0;
  if(method==='cash'){
    const inputEl=document.getElementById('cashTendered');
    cashTendered=parseFloat(inputEl?inputEl.value:0)||0;
    if(cashTendered<=0){showToast('Enter cash amount','rose');return;}
    if(cashTendered<total){showToast('Cash ('+fc(cashTendered)+') < Total ('+fc(total)+')','rose');return;}
    changeGiven=cashTendered-total;
  }else{cashTendered=total;changeGiven=0;}
  _doPayment(method,cashTendered,changeGiven);
}

function _doPayment(method,cashTendered,secondAmount){
  if(!cart.length){showToast('Cart is empty','rose');return;}
  const bir=getBIR();
  const subBD=cart.reduce((s,i)=>s+(i.price*i.quantity),0);
  const effDisc=Math.min(discountAmount,subBD);const sub=subBD-effDisc;
  const vatData=computeVAT(sub+(bir.vatType==='vat'?sub*taxRate:0),bir.vatType,taxRate);
  const total=vatData.grandTotal;
  let changeGiven=0,splitCard=0;
  if(method==='split'){splitCard=secondAmount;changeGiven=Math.max(0,cashTendered+splitCard-total);}
  else if(method==='cash'){changeGiven=secondAmount;}
  const orNumber=getNextOR();
  const branchObj=currentUser.branchId?DB.getById('branches',currentUser.branchId):null;
  const gat=updateGAT(total);
  const sale={date:new Date().toISOString().split('T')[0],timestamp:new Date().toISOString(),total,subtotal:sub,subtotalBeforeDiscount:subBD,discountAmount:effDisc,discountType,tax:vatData.vatAmount,vatableSales:vatData.vatableSales,vatExemptSales:vatData.vatExempt,zeroRatedSales:vatData.zeroRated,paymentMethod:method,cashTendered,changeGiven,splitCard,cashierId:currentUser.id,cashierName:currentUser.name,branchId:currentUser.branchId,branchName:branchObj?branchObj.name:'HQ',currency:currentCurrency,orNumber,vatType:bir.vatType,siType:bir.siType,grandAccumulatedTotal:gat,voided:false,items:cart.map(i=>({productId:i.id,name:i.name,quantity:i.quantity,price:i.price,cost:i.cost,unit:i.unit||'pcs',vatExempt:i.vatExempt||false,zeroRated:i.zeroRated||false}))};
  const saleId=DB.add('sales',sale);
  cart.forEach(item=>{const p=DB.getById('products',item.id);if(p){p.stock-=item.quantity;DB.update('products',p)}});
  logActivity('Sale',orNumber+': '+fc(total));
  lastSaleData={...sale,id:saleId};discountAmount=0;discountType='none';
  showSaleComplete(saleId,total,method,orNumber,cashTendered,changeGiven,splitCard);
  cart=[];
}

function voidSale(id){
  const sale=DB.getById('sales',id);if(!sale){showToast('Sale not found','rose');return;}if(sale.voided){showToast('Already voided','rose');return;}
  const reason=prompt('Reason for void (required for BIR):');if(!reason||!reason.trim()){showToast('Reason required','rose');return;}
  if(!confirm(`Void ${sale.orNumber||'#'+id} for ${fc(sale.total)}? This is logged for BIR audit.`))return;
  (sale.items||[]).forEach(item=>{const p=DB.getById('products',item.productId);if(p){p.stock+=item.quantity;DB.update('products',p);}});
  sale.voided=true;sale.voidReason=reason;sale.voidedBy=currentUser.name;sale.voidedAt=new Date().toISOString();DB.update('sales',sale);
  const e=DB.getAll('settings').find(s=>s.key==='bir_grand_total');if(e){e.value=Math.max(0,parseFloat(e.value)-sale.total).toFixed(2);DB.update('settings',e);}
  DB.add('voidedSales',{originalSaleId:id,orNumber:sale.orNumber,amount:sale.total,reason,voidedBy:currentUser.name,timestamp:new Date().toISOString()});
  logActivity('VOID',`${sale.orNumber||'#'+id}: ${fc(sale.total)} — ${reason}`);
  showToast('Voided and logged ✓','emerald');switchView(currentView);
}

function processReturn(){
  const orNum=document.getElementById('returnORInput')?.value||'';const sale=DB.getAll('sales').find(s=>s.orNumber===orNum&&!s.voided);
  if(!sale){showToast('Sale not found: '+orNum,'rose');return;}

  const refund=sale.total;
  DB.add('returns',{date:new Date().toISOString().split('T')[0],orNumber:orNum,saleId:sale.id,items:sale.items,refundAmount:refund,reason,processedBy:currentUser.name,timestamp:new Date().toISOString()});
  (sale.items||[]).forEach(item=>{const p=DB.getById('products',item.productId);if(p){p.stock+=item.quantity;DB.update('products',p);}});

  logActivity('Return','OR '+orNum+': '+fc(refund)+' — '+reason);
  closeModal();showToast('Return processed. Refund: '+fc(refund),'emerald');switchView('returns');
}

function renderFirebaseSetup(el){
  const savedConfig=getSetting('firebase_config','');
  el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h4 style="margin:0">☁️ Firebase Setup</h4><span class="${storageMode==='firebase'?'fb-badge-connected':'fb-badge-local'}">${storageMode==='firebase'?'☁️ Connected':'💾 Local Mode'}</span></div>
    <div class="card" style="border:1px solid rgba(111,163,239,0.3)">
      <p style="font-size:.82em;color:var(--text-muted);line-height:1.7;margin-bottom:12px">Firebase enables real-time sync across all devices. Your data is always mirrored locally — works offline too.</p>
      <div style="font-size:.78em;color:var(--text-secondary);line-height:1.8">
        1. Go to <strong style="color:var(--text-primary)">console.firebase.google.com</strong><br>
        2. Create project → Firestore Database → Start in test mode<br>
        3. Project Settings → Your apps → Add web app → Copy config<br>
        4. Paste config JSON below and click Connect
      </div>
    </div>
    <div class="card"><h5>Firebase Config (JSON)</h5>
      <textarea id="firebaseConfigInput" rows="8" placeholder='{"apiKey":"...","authDomain":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'>${savedConfig}</textarea>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn btn-primary" onclick="connectFirebase()">☁️ Connect</button>
        <button class="btn btn-danger" onclick="disconnectFirebase()">💾 Use Local</button>
      </div>
    </div>
    <div class="card"><h5>📤 Migrate Local → Firebase</h5>
      <p style="font-size:.78em;color:var(--text-muted);margin-bottom:10px">Push all local data to Firebase after connecting.</p>
      <button class="btn btn-success btn-block" onclick="migrateToFirebase()">📤 Migrate Now</button>
    </div>
    <div class="card" style="border:1px solid rgba(45,212,160,0.2)">
      <h5 style="color:var(--accent-emerald)">Current Mode</h5>
      <p style="font-size:.82em;color:${storageMode==='firebase'?'var(--accent-emerald)':'var(--accent-blue)'}">${storageMode==='firebase'?'☁️ Firebase Firestore — real-time cloud sync':'💾 Local Storage — data on this device only'}</p>
      ${storageMode==='firebase'?`<p style="font-size:.72em;color:var(--text-muted);margin-top:6px">Online: ${isOnline?'✅':'❌ Offline'} · Queue: ${offlineQueue.length} ops</p>`:''}
    </div>`;
}
async function connectFirebase(){
  const input=document.getElementById('firebaseConfigInput')?.value||'';let config;
  try{config=JSON.parse(input);}catch(e){showToast('Invalid JSON config','rose');return;}
  if(!config.apiKey||!config.projectId){showToast('Missing apiKey or projectId','rose');return;}
  showToast('Connecting…','gold',8000);saveSetting('firebase_config',input);
  const ok=await FirebaseDB.init(config);
  if(ok){storageMode='firebase';saveSetting('storageMode','firebase');updateSyncBar();renderSidebar();showToast('Firebase connected ✓','emerald');switchView('firebaseSetup');}
  else showToast('Firebase connection failed','rose');
}
function disconnectFirebase(){
  if(!confirm('Switch to local storage?'))return;
  storageMode='local';saveSetting('storageMode','local');updateSyncBar();renderSidebar();showToast('Switched to Local Storage','gold');switchView('firebaseSetup');
}
async function migrateToFirebase(){
  if(storageMode!=='firebase'){showToast('Connect Firebase first','rose');return;}
  if(!confirm('Push all local data to Firebase?'))return;
  showToast('Migrating…','gold',10000);let count=0;
  for(const store of STORES){const items=LocalDB.getAll(store);for(const item of items){const did=store+'_'+item.id;item._did=did;await FirebaseDB._write(store,did,item);count++;}}
  showToast('Migration complete! '+count+' records ✓','emerald');
}

function renderDownloadManager(el){
  el.innerHTML=`<div class="card" style="border-left:3px solid var(--accent-gold)"><h4>Backup & Export</h4><p style="color:var(--text-muted);font-size:.8em">Download your data for safekeeping.</p></div>

      <button class="btn btn-primary btn-block" onclick="downloadFullBackup()">📦 Full Backup (JSON)</button>

    <div class="card" style="border:1px solid rgba(240,101,119,0.25)"><h5 style="color:var(--accent-rose)">⚠ Restore</h5>

function restoreBackup(){const file=document.getElementById('restoreFile').files[0];if(!file){showToast('Select a file','rose');return}if(!confirm('Replace all current data?'))return;const r=new FileReader();r.onload=function(e){try{const d=JSON.parse(e.target.result);STORES.forEach(s=>{if(d[s])LocalDB.set(s,d[s])});showToast('Restored ✓','emerald');setTimeout(()=>location.reload(),1000);}catch(err){showToast('Invalid backup file','rose')}};r.readAsText(file)}
function downloadFullBackup(){const data={};STORES.forEach(s=>data[s]=DB.getAll(s));data.backupDate=new Date().toISOString();data.bir=getBIR();data.gat=getGAT();const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`mlea_backup_v4_${new Date().toISOString().split('T')[0]}.json`;a.click();showToast('Backup downloaded ✓','emerald');}
function exportCSV(type){
  let csv='';const d=new Date().toISOString().split('T')[0];
  if(type==='sales'){
    csv='OR No.,Date,Total,VAT,VATable,Payment,Cash Tendered,Change,Cashier,Branch,Disc Type,Disc Amount\n';
    getMyData('sales').filter(s=>!s.voided).forEach(s=>csv+=`${s.orNumber||s.id},${s.date},${s.total},${s.tax||0},${s.vatableSales||0},${s.paymentMethod},${s.cashTendered||0},${s.changeGiven||0},${s.cashierName||''},${s.branchName||''},${s.discountType||'none'},${s.discountAmount||0}\n`);
  }else{
    csv='SKU,Name,Price,Cost,Stock,Unit,Category,Barcode,VAT Status,Branch\n';
    getMyData('products').forEach(p=>{const b=p.branchId?DB.getById('branches',p.branchId):null;csv+=`${p.sku},${p.name},${p.price},${p.cost||0},${p.stock},${p.unit||'pcs'},${p.category||''},${p.barcode||''},${p.vatExempt?'VAT-Exempt':p.zeroRated?'Zero-Rated':'VAT'},${b?b.name:'Global'}\n`;});
  }
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${type}_${d}.csv`;a.click();
}
function exportBIRReport(){
  const m=new Date().toISOString().substring(0,7);const bir=getBIR();
  const ms=DB.getAll('sales').filter(s=>s.date.startsWith(m)&&!s.voided);
  let csv=`BIR SALES JOURNAL\nBusiness: ${bir.registeredName}\nTIN: ${bir.tin}\nPeriod: ${m}\nPTU: ${bir.ptuNo}\n\n`;
  csv+='OR/SI No.,Date,Cashier,Branch,VATable Sales,VAT Amount,VAT-Exempt,Zero-Rated,Total,Disc Type,Disc Amount,Payment\n';
  ms.forEach(s=>csv+=`${s.orNumber||s.id},${s.date},${s.cashierName||''},${s.branchName||''},${(s.vatableSales||0).toFixed(2)},${(s.tax||0).toFixed(2)},${(s.vatExemptSales||0).toFixed(2)},${(s.zeroRatedSales||0).toFixed(2)},${s.total.toFixed(2)},${s.discountType||'none'},${(s.discountAmount||0).toFixed(2)},${s.paymentMethod}\n`);
  csv+=`\nVoided\nOR/SI No.,Date,Amount,Voided By,Reason\n`;
  DB.getAll('sales').filter(s=>s.date.startsWith(m)&&s.voided).forEach(s=>csv+=`${s.orNumber||s.id},${s.date},${s.total.toFixed(2)},${s.voidedBy||''},${s.voidReason||''}\n`);
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`BIR_Report_${m}.csv`;a.click();
}

function getLowStockItems(){return getMyData('products').filter(p=>p.active&&p.stock<=lowStockThreshold)}
function showLowStockToast(){
  const low=getLowStockItems();if(!low.length)return;
  const ex=document.getElementById('lowStockToast');if(ex)ex.remove();
  const t=document.createElement('div');t.id='lowStockToast';
  t.style.cssText='position:fixed;bottom:48px;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid rgba(240,101,119,0.4);border-radius:var(--radius-md);padding:14px 18px;z-index:9999;display:flex;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,0.5);animation:slideUp .4s cubic-bezier(0.22,1,0.36,1);max-width:320px;width:90%';
  t.innerHTML=`<span style="font-size:1.4em">⚠️</span><div style="flex:1"><div style="font-family:var(--font-display);font-weight:700;font-size:.88em;color:var(--accent-rose)">${low.length} Low Stock Item${low.length>1?'s':''}</div><div style="font-size:.72em;color:var(--text-muted);margin-top:2px">${low.slice(0,2).map(p=>p.name+' ('+p.stock+' left)').join(', ')}${low.length>2?' +more':''}</div></div><button onclick="this.parentElement.remove();switchView('${currentUser.role==='admin'?'allProducts':'inventory'}')" style="background:var(--accent-rose-soft);border:1px solid rgba(240,101,119,0.3);color:var(--accent-rose);border-radius:var(--radius-sm);padding:6px 10px;cursor:pointer;font-size:.7em;font-weight:700;white-space:nowrap">View →</button><button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1em;padding:2px 4px">✕</button>`;
  document.body.appendChild(t);
  setTimeout(()=>{if(t.parentElement){t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400)}},7000);
}

// MODAL SYSTEM
// ══════════════════════════════════════════════
function showModal(type,id){
  const suppliers=DB.getAll('suppliers');
  const sup=`<select id="modalSelect"><option value="">No Supplier</option>${suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>`;
  const vatSel=`<select id="modalVatType"><option value="vat">VAT (12%)</option><option value="exempt">VAT-Exempt</option><option value="zero">Zero-Rated</option></select>`;
  let html='';
  switch(type){
    case 'addBranch':html=`<h4>Add Branch</h4><input type="text" id="modalInput1" placeholder="Branch Name *"><input type="text" id="modalInput2" placeholder="Address"><input type="tel" id="modalInput3" placeholder="Phone"><button class="btn btn-primary btn-block" onclick="addBranch()">Create Branch</button>`;break;
    case 'addSupplier':html=`<h4>Add Supplier</h4><input type="text" id="modalInput1" placeholder="Supplier Name *"><input type="text" id="modalInput2" placeholder="Contact Person"><input type="tel" id="modalInput3" placeholder="Phone"><input type="email" id="modalInput4" placeholder="Email"><input type="text" id="modalInput5" placeholder="Address"><button class="btn btn-primary btn-block" onclick="addSupplier()">Save Supplier</button>`;break;
    case 'editSupplier':{const sp=DB.getById('suppliers',id);html=`<h4>Edit Supplier</h4><input type="text" id="modalInput1" value="${sp.name}"><input type="text" id="modalInput2" value="${sp.contact||''}"><input type="tel" id="modalInput3" value="${sp.phone||''}"><input type="email" id="modalInput4" value="${sp.email||''}"><input type="text" id="modalInput5" value="${sp.address||''}"><button class="btn btn-primary btn-block" onclick="editSupplier(${id})">Save Changes</button>`;break;}
    case 'addProduct':{const bSel=currentUser.role==='admin'?`<select id="modalBranchSelect"><option value="">🌐 All Branches (Global)</option>${DB.getAll('branches').map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select>`:'';html=`<h4>Add Product</h4><input type="text" id="modalInput1" placeholder="Product Name *"><input type="number" id="modalInput2" placeholder="Selling Price *" step="0.01"><input type="number" id="modalInput3" placeholder="Cost Price" step="0.01"><input type="number" id="modalInput4" placeholder="Stock Quantity" value="0"><input type="text" id="modalInput5" placeholder="Category" value="General"><input type="text" id="modalInput6" placeholder="Barcode"><input type="text" id="modalInput7" placeholder="Unit (pcs, kg, box…)" value="pcs">${bSel}${vatSel}${sup}<button class="btn btn-primary btn-block" onclick="addProduct()">Save Product</button>`;break;}
    case 'editProduct':{const p=DB.getById('products',id);const cv=p.vatExempt?'exempt':p.zeroRated?'zero':'vat';html=`<h4>Edit Product</h4><input type="text" id="modalInput1" value="${p.name}"><input type="number" id="modalInput2" value="${p.price}" step="0.01"><input type="number" id="modalInput3" value="${p.cost||0}" step="0.01"><input type="number" id="modalInput4" value="${p.stock}"><input type="text" id="modalInput5" value="${p.category||''}"><input type="text" id="modalInput6" value="${p.barcode||''}"><input type="text" id="modalInput7" value="${p.unit||'pcs'}"><select id="modalVatType"><option value="vat" ${cv==='vat'?'selected':''}>VAT (12%)</option><option value="exempt" ${cv==='exempt'?'selected':''}>VAT-Exempt</option><option value="zero" ${cv==='zero'?'selected':''}>Zero-Rated</option></select><select id="modalSelect"><option value="">No Supplier</option>${suppliers.map(s=>`<option value="${s.id}" ${p.supplierId===s.id?'selected':''}>${s.name}</option>`).join('')}</select><button class="btn btn-primary btn-block" onclick="editProduct(${id})">Save Changes</button>`;break;}
    case 'addPO':html=`<h4>New Purchase Order</h4><select id="modalSelect"><option value="">Select Supplier *</option>${suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select><input type="text" id="modalInput1" placeholder="Item Name"><input type="number" id="modalInput2" placeholder="Quantity" value="1"><input type="number" id="modalInput3" placeholder="Cost per Unit" step="0.01"><button class="btn btn-primary btn-block" onclick="addPO()">Create Order</button>`;break;
    case 'newReturn':html=`<h4>↩️ New Return</h4><label style="font-size:.75em;color:var(--text-muted);display:block;margin-bottom:4px">Original OR/SI Number</label><input type="text" id="returnORInput" placeholder="e.g. OR-0000001"><label style="font-size:.75em;color:var(--text-muted);display:block;margin-bottom:4px">Reason</label><textarea id="returnReasonInput" placeholder="e.g. Defective item"></textarea><button class="btn btn-primary btn-block" onclick="processReturn()">Process Return & Refund</button>`;break;
  }
  document.getElementById('modalContent').innerHTML=html+'<button class="btn btn-danger btn-block" onclick="closeModal()" style="margin-top:8px">Cancel</button>';
  document.getElementById('modal').classList.add('active');
}
function closeModal(){document.getElementById('modal').classList.remove('active')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){
  if(document.getElementById('loginScreen').style.display!=='none'){
    if(!checkLockout()){if(e.key>='0'&&e.key<='9')enterPin(e.key);else if(e.key==='Enter')submitPin();else if(e.key==='Backspace'){pinEntry=pinEntry.slice(0,-1);updatePinDisplay();}}
  }
  if(e.key==='Escape')closeModal();
});

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
async function bootFirebase(){
  const config=getSetting('firebase_config','');const mode=getSetting('storageMode','local');
  if(mode==='firebase'&&config){
    try{const cfg=JSON.parse(config);const ok=await FirebaseDB.init(cfg);if(ok){storageMode='firebase';updateSyncBar();}else{storageMode='local';setSyncStatus('offline','Firebase unavailable, using local');}}
    catch(e){storageMode='local';}
  }
}

showLicenseGate();
// Patch initApp to also reconnect Firebase
const _origInit=initApp;
initApp=async function(){_origInit();await bootFirebase();updateSyncBar();};
</script>
</body>
</html>
