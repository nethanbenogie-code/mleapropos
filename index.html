// ======================== DIALOG SYSTEM (unchanged, but needed) ========================
function dlg(opts){
  return new Promise(resolve=>{
    const el=document.createElement('div');
    el.className='dlg-overlay';
    const icon=opts.icon||'💬';
    const type=opts.type||'alert';
    const color=opts.color||'var(--gold)';
    el.innerHTML=`<div class="dlg-box">
      <div class="dlg-icon">${icon}</div>
      <div class="dlg-title" style="color:${color}">${opts.title||''}</div>
      <div class="dlg-msg">${opts.msg||''}</div>
      ${type==='prompt'?`<div class="dlg-input"><input type="${opts.inputType||'text'}" id="dlgInput" placeholder="${opts.placeholder||''}" value="${opts.defaultVal||''}" style="margin-bottom:0"></div>`:''}
      <div class="dlg-btns">
        ${type!=='alert'?`<button class="btn bd" id="dlgCancel">${opts.cancelLabel||'Cancel'}</button>`:''}
        <button class="btn ${type==='confirm'&&opts.danger?'bd':'bp'}" id="dlgOk">${opts.okLabel||'OK'}</button>
      </div>
    </div>`;
    document.body.appendChild(el);
    setTimeout(()=>{
      const inp=el.querySelector('#dlgInput');if(inp)inp.focus();
      const ok=el.querySelector('#dlgOk');
      const cancel=el.querySelector('#dlgCancel');
      const finish=val=>{el.remove();resolve(val);};
      ok.onclick=()=>{
        if(type==='prompt'){const v=el.querySelector('#dlgInput').value;finish(v);}
        else finish(true);
      };
      if(cancel)cancel.onclick=()=>finish(type==='prompt'?null:false);
      el.addEventListener('keydown',e=>{if(e.key==='Enter')ok.click();if(e.key==='Escape'&&cancel)cancel.click();});
    },50);
  });
}
const alert2=(msg,icon='ℹ️',color='var(--blue)')=>dlg({type:'alert',icon,msg,color,okLabel:'OK'});
const confirm2=(msg,icon='⚠️',danger=false)=>dlg({type:'confirm',icon,msg,color:danger?'var(--rose)':'var(--gold)',danger,okLabel:'Confirm',cancelLabel:'Cancel'});
const prompt2=(msg,placeholder='',defaultVal='',inputType='text')=>dlg({type:'prompt',icon:'✏️',msg,placeholder,defaultVal,inputType,okLabel:'Save',cancelLabel:'Cancel',color:'var(--gold)'});

function toast(msg,color='gold',dur=3200){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast';
  const c={gold:'var(--gold)',rose:'var(--rose)',emerald:'var(--emerald)',blue:'var(--blue)',purple:'var(--purple)'}[color]||'var(--gold)';
  t.style.cssText=`background:var(--bg-elevated);border:1px solid ${c};color:${c}`;
  t.textContent=msg;wrap.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},dur);
}

// ======================== STORAGE (FIXED ID GENERATION) ========================
const STORES=['products','sales','users','settings','branches','activityLogs','suppliers','purchaseOrders','voidedSales','heldSales','returns'];
const LocalDB={
  init(){STORES.forEach(s=>{if(!localStorage.getItem('mlea_'+s))localStorage.setItem('mlea_'+s,'[]')})},
  getAll(k){try{return JSON.parse(localStorage.getItem('mlea_'+k)||'[]')}catch{return[]}},
  set(k,d){localStorage.setItem('mlea_'+k,JSON.stringify(d))},
  // FIX: ID generation using reduce to avoid -Infinity
  add(k,item){
    const items=this.getAll(k);
    const maxId = items.reduce((max,i)=>Math.max(max, i.id||0), 0);
    item.id = maxId + 1;
    item.createdAt=new Date().toISOString();
    items.push(item);this.set(k,items);return item.id;
  },
  update(k,item){
    const items=this.getAll(k);const idx=items.findIndex(i=>i.id===item.id);
    if(idx!==-1){item.updatedAt=new Date().toISOString();items[idx]=item;this.set(k,items);}
  },
  delete(k,id){this.set(k,this.getAll(k).filter(i=>i.id!==id))},
  getById(k,id){return this.getAll(k).find(i=>i.id===id)||null},
  getByBranch(k,bid){return this.getAll(k).filter(i=>i.branchId===bid)}
};
LocalDB.init();

// Firebase (same as original but with fixed ID generation)
let _fb=null;
const FirebaseDB={
  _cache:{},
  async init(config){
    try{
      const{initializeApp,getApps}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const fs=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const app=getApps().length===0?initializeApp(config):getApps()[0];
      _fb={...fs,db:fs.getFirestore(app)};
      for(const s of STORES)await this._load(s);
      setSyncStatus('cloud','Connected ✓');return true;
    }catch(e){setSyncStatus('offline','Firebase error: '+e.message);return false;}
  },
  async _load(k){
    try{
      const snap=await _fb.getDocs(_fb.collection(_fb.db,k));
      this._cache[k]=snap.docs.map(d=>({...d.data(),_did:d.id}));
    }catch{this._cache[k]=this._cache[k]||[];}
  },
  getAll(k){return this._cache[k]||[]},
  set(k,arr){this._cache[k]=arr},
  // FIX: ID generation using reduce
  add(k,item){
    const items=this.getAll(k);
    const maxId = items.reduce((max,i)=>Math.max(max, i.id||0), 0);
    item.id = maxId + 1;
    item.createdAt=new Date().toISOString();
    const did=k+'_'+item.id;item._did=did;items.push(item);this._cache[k]=items;
    this._write(k,did,item);
    const li=LocalDB.getAll(k);if(!li.find(i=>i.id===item.id)){li.push({...item});LocalDB.set(k,li);}
    return item.id;
  },
  update(k,item){
    const items=this.getAll(k);const idx=items.findIndex(i=>i.id===item.id);
    if(idx!==-1){item.updatedAt=new Date().toISOString();const did=item._did||k+'_'+item.id;item._did=did;items[idx]=item;this._cache[k]=items;
      this._write(k,did,item);
      const li=LocalDB.getAll(k);const li2=li.findIndex(i=>i.id===item.id);if(li2!==-1){li[li2]=item;LocalDB.set(k,li);}
    }
  },
  delete(k,id){
    const item=this.getById(k,id);this._cache[k]=(this._cache[k]||[]).filter(i=>i.id!==id);
    LocalDB.set(k,LocalDB.getAll(k).filter(i=>i.id!==id));
    if(item){const did=item._did||k+'_'+id;if(isOnline)this._del(k,did);else offQ.push({op:'del',col:k,did});}
  },
  getById(k,id){return(this._cache[k]||[]).find(i=>i.id===id)||null},
  getByBranch(k,bid){return(this._cache[k]||[]).filter(i=>i.branchId===bid)},
  async _write(col,did,data){
    if(!isOnline){offQ.push({op:'set',col,did,data});setSyncStatus('offline','Offline — queuing');return;}
    try{await _fb.setDoc(_fb.doc(_fb.db,col,did),data);setSyncStatus('cloud','Synced ✓');}
    catch(e){offQ.push({op:'set',col,did,data});setSyncStatus('offline','Sync error');}
  },
  async _del(col,did){
    try{await _fb.deleteDoc(_fb.doc(_fb.db,col,did));}
    catch(e){offQ.push({op:'del',col,did});}
  }
};

// ======================== BIR HELPERS (with product-level VAT support) ========================
function getBIR(){
  const g=k=>getSetting(k);
  return{
    tin:g('bir_tin')||'000-000-000-000',
    name:g('bir_name')||'MLEA Store',

    accExp:g('bir_accexp')||'2024-12-31',
    ptu:g('bir_ptu')||'PTU-000000',
    prefix:g('bir_prefix')||'OR',
    serFrom:g('bir_serfrom')||'0000001',
    serTo:g('bir_serto')||'9999999',
    vatType:g('bir_vattype')||'vat',
    docType:g('bir_doctype')||'or',
  };
}

// FIX: OR counter with offline-safe locking (simplified: use localStorage with versioning)
function getNextOR(){
  const all=LocalDB.getAll('settings');
  let e=all.find(s=>s.key==='bir_counter');
  let c=e?parseInt(e.value)||0:0;
  c++;
  if(e){e.value=c.toString();LocalDB.update('settings',e);}
  else LocalDB.add('settings',{key:'bir_counter',value:c.toString()});
  if(storageMode==='firebase'){
    const fa=FirebaseDB.getAll('settings'),fe=fa.find(s=>s.key==='bir_counter');
    if(fe){fe.value=c.toString();FirebaseDB.update('settings',fe);}
    else FirebaseDB.add('settings',{key:'bir_counter',value:c.toString()});
  }
  const bir=getBIR();const to=parseInt(bir.serTo)||9999999;
  if(c>=to-50)toast('⚠️ OR series almost exhausted! '+(to-c)+' receipts remaining','rose',6000);
  return bir.prefix+'-'+String(c).padStart(7,'0');
}

function updateGAT(amt){
  const all=LocalDB.getAll('settings');const e=all.find(s=>s.key==='bir_gat');
  const cur2=e?parseFloat(e.value)||0:0;const nv=(cur2+amt).toFixed(2);
  if(e){e.value=nv;LocalDB.update('settings',e);}else LocalDB.add('settings',{key:'bir_gat',value:nv});
  if(storageMode==='firebase'){
    const fa=FirebaseDB.getAll('settings'),fe=fa.find(s=>s.key==='bir_gat');
    if(fe){fe.value=nv;FirebaseDB.update('settings',fe);}else FirebaseDB.add('settings',{key:'bir_gat',value:nv});
  }
  return parseFloat(nv);
}
function getGAT(){return parseFloat(getSetting('bir_gat','0'))||0;}

// FIX: computeVAT accepts separate vatable, exempt, zero amounts
function computeVAT(vatableAmount, exemptAmount, zeroAmount, storeVatType, globalRate){
  if(storeVatType==='vat'){
    const vat = vatableAmount * globalRate;
    return { vatableSales: vatableAmount, vatAmount: vat, vatExempt: exemptAmount, zeroRated: zeroAmount, grandTotal: vatableAmount + vat + exemptAmount + zeroAmount };
  } else {
    return { vatableSales: 0, vatAmount: 0, vatExempt: vatableAmount + exemptAmount + zeroAmount, zeroRated: 0, grandTotal: vatableAmount + exemptAmount + zeroAmount };
  }
}

let sessionWarningTimer=null;

  clearTimeout(sesTimer);

  if(!currentUser)return;
  const mins=parseInt(getSetting('ses_timeout','30'))||30;
  const warningMs = (mins - 1) * 60 * 1000;
  if(warningMs > 0){
    sessionWarningTimer = setTimeout(()=>{
      toast(`Session will expire in 1 minute due to inactivity.`, 'gold', 10000);
    }, warningMs);
  }
  sesTimer=setTimeout(()=>{
    if(currentUser){
      toast('Session expired — please sign in again','gold');
      logout();
    }
  }, mins*60*1000);
}

function chkLock(){

    const lb=document.getElementById('lockoutBar');
    if(lb){lb.style.display='block';lb.textContent='🔒 Too many failed attempts. Try again in '+sec+'s';}
    document.querySelectorAll('.pbn').forEach(b=>b.disabled=true);
    setTimeout(chkLock,1000);return true;
  }
  const lb=document.getElementById('lockoutBar');if(lb)lb.style.display='none';
  document.querySelectorAll('.pbn').forEach(b=>b.disabled=false);
  pinFails=0;return false;
}

const LIC_SRV='https://script.google.com/macros/s/AKfycby1QlCg9jzpXmxtE1N-5w7b4CuGa0TT5gcfwYrx-0yetL4iI5s86ZX8NyLhDwo4tLJX/exec';
function devId(){return btoa(navigator.userAgent.slice(-15)+screen.width+'x'+screen.height+new Date().getTimezoneOffset()).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);}
function fmtLic(inp){let v=inp.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();if(v.length>16)v=v.slice(0,16);let p=[];for(let i=0;i<v.length;i+=4)p.push(v.slice(i,i+4));inp.value=p.join('-');}
function isActiv(){return localStorage.getItem('mlea_activated')==='true';}

async function doActivate(){
  const inp=document.getElementById('licenseInput'),s=document.getElementById('licStatus'),btn=document.getElementById('activateBtn');
  const key=inp.value.trim();if(!key){s.textContent='⚠ Enter license key';s.className='lic-status err';return;}
  btn.disabled=true;s.innerHTML='<span class="spinner"></span> Verifying…';s.className='lic-status';
  try{
    const r=await fetch(LIC_SRV+'?action=activate&licenseKey='+encodeURIComponent(key)+'&deviceId='+encodeURIComponent(devId()));
    const d=await r.json();
    if(d.success)setActiv(key,{d:d.deviceCount,m:d.maxDevices});
    else{s.textContent='✗ '+d.message;s.className='lic-status err';}
  }catch(e){
    // In a real system, you would not allow offline activation without a valid server response.
    // We'll keep the demo key removed for security.
    s.textContent='✗ Cannot reach server — offline activation not allowed for security.';s.className='lic-status err';
  }
  btn.disabled=false;
}

// FIX: Payment finalization with correct VAT and card payment fields
function doPay(method){
  if(!cart.length){toast('Cart is empty','rose');return;}
  // recompute totals using the same logic as renderPOS
  let vatableSub=0, exemptSub=0, zeroSub=0;
  cart.forEach(item=>{
    const amt = item.price * item.quantity;
    if(item.vatExempt) exemptSub += amt;
    else if(item.zeroRated) zeroSub += amt;
    else vatableSub += amt;
  });
  const subBD = vatableSub + exemptSub + zeroSub;
  const effDisc = Math.min(discAmt, subBD);
  let remainingDisc = effDisc;
  let discFromVatable = Math.min(remainingDisc, vatableSub);
  remainingDisc -= discFromVatable;
  let discFromExempt = Math.min(remainingDisc, exemptSub);
  remainingDisc -= discFromExempt;
  let discFromZero = remainingDisc;
  const finalVatable = vatableSub - discFromVatable;
  const finalExempt = exemptSub - discFromExempt;
  const finalZero = zeroSub - discFromZero;
  const bir=getBIR();
  const vatD = computeVAT(finalVatable, finalExempt, finalZero, bir.vatType, taxRate);
  const total = vatD.grandTotal;
  if(method==='cash'){
    const cashEl=document.getElementById('cashInput');
    const cash=parseFloat(cashEl?cashEl.value:0)||0;
    if(cash<=0){toast('Enter cash amount tendered','rose');return;}
    if(cash<total){toast('Cash ('+fc(cash)+') is less than total ('+fc(total)+')','rose');return;}
    _finalizePay('cash',cash,cash-total, vatD, finalVatable, finalExempt, finalZero, effDisc);
  }else if(method==='card'){
    _finalizePay('card',0,0, vatD, finalVatable, finalExempt, finalZero, effDisc);
  }
}

function _finalizePay(method,cashTendered,changeGiven, vatComputed, finalVatable, finalExempt, finalZero, discountAmount){
  if(!cart.length){toast('Cart is empty','rose');return;}
  const bir=getBIR();
  const total = vatComputed.grandTotal;
  const orNum=getNextOR();
  const branchObj=currentUser.branchId?LocalDB.getById('branches',currentUser.branchId):null;
  const gat=updateGAT(total);
  const sale={
    date:new Date().toISOString().split('T')[0],timestamp:new Date().toISOString(),
    total,subtotal: total - (bir.vatType==='vat'?vatComputed.vatAmount:0), subtotalBeforeDiscount: cart.reduce((s,i)=>s+(i.price*i.quantity),0),
    discountAmount, discountType: discType,
    tax:vatComputed.vatAmount, vatableSales:vatComputed.vatableSales, vatExemptSales:vatComputed.vatExempt, zeroRatedSales:vatComputed.zeroRated,
    paymentMethod:method, cashTendered, changeGiven, splitCard: method==='split' ? (cashTendered+changeGiven-total) : 0,
    cashierId:currentUser.id, cashierName:currentUser.name,
    branchId:currentUser.branchId, branchName:branchObj?branchObj.name:'HQ',
    currency:cur, orNumber:orNum, vatType:bir.vatType, docType:bir.docType,
    grandAccumulatedTotal:gat, voided:false,
    items:cart.map(i=>({productId:i.id,name:i.name,quantity:i.quantity,price:i.price,cost:i.cost||0,unit:i.unit||'pcs',vatExempt:i.vatExempt||false,zeroRated:i.zeroRated||false}))
  };
  const saleId=DB.add('sales',sale);
  cart.forEach(item=>{
    const p=LocalDB.getById('products',item.id);
    if(p){p.stock-=item.quantity;LocalDB.update('products',p);if(storageMode==='firebase')FirebaseDB.update('products',p);}
  });
  logAct('Sale',orNum+': '+fc(total));
  lastSale={...sale,id:saleId};
  discAmt=0;discType='none';
  showSaleComplete(saleId,total,method,orNum,cashTendered,changeGiven, sale.splitCard||0);
  cart=[];
}

// ======================== VOID (unchanged but uses branch-filtered getMyData if needed) ========================
async function voidSale(id){
  const sale=DB.getById('sales',id);
  if(!sale){toast('Sale not found','rose');return;}
  if(sale.voided){toast('Already voided','rose');return;}
  // enforce branch restriction: only admin or manager of same branch can void
  if(currentUser.role!=='admin' && sale.branchId !== currentUser.branchId){
    toast('You can only void sales from your branch','rose'); return;
  }
  const reason=await prompt2('Reason for void (required for BIR):','e.g. Wrong item entered');
  if(!reason||!reason.trim()){toast('Void reason is required','rose');return;}
  const ok=await confirm2(`Void ${sale.orNumber||'#'+id} for ${fc(sale.total)}?\nThis is permanent and logged for BIR audit.`,'🚫',true);
  if(!ok)return;
  (sale.items||[]).forEach(item=>{
    const p=LocalDB.getById('products',item.productId);
    if(p){p.stock+=item.quantity;LocalDB.update('products',p);if(storageMode==='firebase')FirebaseDB.update('products',p);}
  });
  sale.voided=true;sale.voidReason=reason;sale.voidedBy=currentUser.name;sale.voidedAt=new Date().toISOString();
  DB.update('sales',sale);
  const all=LocalDB.getAll('settings');const e=all.find(s=>s.key==='bir_gat');
  if(e){e.value=Math.max(0,parseFloat(e.value)-sale.total).toFixed(2);LocalDB.update('settings',e);if(storageMode==='firebase')FirebaseDB.update('settings',e);}
  DB.add('voidedSales',{originalSaleId:id,orNumber:sale.orNumber,amount:sale.total,reason,voidedBy:currentUser.name,timestamp:new Date().toISOString()});
  logAct('VOID',`${sale.orNumber||'#'+id}: ${fc(sale.total)} — ${reason}`);
  toast('Transaction voided and logged ✓','emerald');sw(currentView);
}

async function receivePO(id){
  const po=DB.getById('purchaseOrders',id); if(!po) return;
  const ok=await confirm2('Mark PO #'+id+' as received? This will add stock to matching products.','📦');
  if(!ok) return;
  po.status='received'; DB.update('purchaseOrders',po);
  for(const item of (po.items||[])){
    let product = null;
    if(item.productId) product = DB.getById('products', item.productId);
    if(!product) product = getMyData('products').find(p=>p.name.toLowerCase()===item.name.toLowerCase());
    if(product){
      product.stock += item.quantity;
      product.cost = item.cost; // update cost price
      DB.update('products', product);
    } else {
      toast(`Product "${item.name}" not found, stock not updated.`, 'rose');
    }
  }
  logAct('PO Received','#'+id); sw('purchaseOrders'); toast('PO received — stock updated ✓','emerald');
}
